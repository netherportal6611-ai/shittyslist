          points: game.points,
          xp: game.xp,
          xpRequired: game.xpRequired,
          xpLevel: game.xpLevel,
          up: false,
          down: false,
          left: false,
          right: false,
          dash: false,
          shoot: false,
          special: false,
          skipVoteWave: onlineIntermissionSkip.localRequested ? Number(onlineIntermissionSkip.wave || game.wave) : 0,
          xpChoiceOpen: !!game.xpChoiceOpen,
          orbBlocking: !!(game.waveState === "intermission" && (game.upgradePickup || game.upgradeShopOpen))
        }));
      } catch {}
    }

    function updateOnlineHeartbeat(dt) {
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return;
      onlineHeartbeatTimer -= dt;
      if (onlineHeartbeatTimer > 0) return;
      onlineHeartbeatTimer = 5;

      try {
        onlineRoom.socket.send(JSON.stringify({ type: "ping", at: Date.now() }));
      } catch {}
    }

    function sendOnlineRevive(targetId) {
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return false;
      if (!targetId) return false;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "revive_player",
          targetId,
          by: onlineRoom.playerId,
        }));
        return true;
      } catch {
        return false;
      }
    }

    function getRemoteDownedTargetForRevive() {
      if (!onlineRoom.playerId || !onlineRoom.players) return null;
      if (player.downed) return null;

      let best = null;
      for (const { id, player: remote } of getOnlineRemotePlayers()) {
        if (!remote.downed) continue;

        const pos = getRemoteOnlineTargetPosition(remote);
        if (!pos) continue;

        const dx = pos.x - player.x;
        const dy = pos.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist > onlineReviveState.range) continue;
        if (!best || dist < best.dist) best = { id, remote, x: pos.x, y: pos.y, dist };
      }

      return best;
    }

    function isReviveInputHeld() {
      const keyboard = keyDown("f") || keyDown("keyf");
      const mobile = !!mobileInput.revive;
      return keyboard || mobile;
    }

    function updateOnlineRevive(dt) {
      if (!isOnlineMatchActive() || game.state !== "playing") {
        onlineReviveState.targetId = "";
        onlineReviveState.progress = 0;
        return;
      }
      if (isOnlineVersusMode()) {
        onlineReviveState.targetId = "";
        onlineReviveState.progress = 0;
        mobileInput.revive = false;
        return;
      }

      const target = getRemoteDownedTargetForRevive();

      if (!target || !isReviveInputHeld()) {
        onlineReviveState.targetId = target ? target.id : "";
        onlineReviveState.progress = Math.max(0, onlineReviveState.progress - dt * 1.8);
        return;
      }

      if (onlineReviveState.targetId !== target.id) {
        onlineReviveState.targetId = target.id;
        onlineReviveState.progress = 0;
      }

      onlineReviveState.progress += dt;

      if (onlineReviveState.progress >= onlineReviveState.required) {
        if (sendOnlineRevive(target.id)) {
          game.reviveCooldown = game.reviveInterval;
        }
        mobileInput.revive = false;
        onlineReviveState.progress = 0;
      }
    }

    function checkOnlineCoopGameOver() {
      if (!isOnlineMatchActive() || game.state !== "playing") return;
      if (isOnlineVersusMode()) return;
      const connectedIds = getOnlineConnectedPlayerIds();
      if (!connectedIds.length) return;

      const allDowned = connectedIds.every(id => {
        if (id === onlineRoom.playerId) return !!player.downed;
        const remote = onlineRoom.players?.[id];
        return !!remote?.downed || Number(remote?.hp || 0) <= 0;
      });

      if (allDowned) {
        if (!requestOnlineGameOver("both_downed")) startGameOver();
      }
    }

    function applyOnlineDamageToLocalPlayer(amount = 1, source = "enemy") {
      if (game.state !== "playing") return;
      if (game.immortalMode || player.downed) return;
      damagePlayer(amount);
    }

    function getClosestOnlineEnemyTarget(enemy) {
      const localAlive = !player.downed && player.hp > 0;
      const localTarget = localAlive
        ? { x: player.x, y: player.y, id: onlineRoom.playerId || "p1", isLocal: true, name: game.playerName || "Jugador" }
        : null;

      // Offline o invitado: solo existe el jugador local para la simulacion.
      if (!isOnlineHost()) return localTarget;

      const targets = [];
      if (localTarget) targets.push(localTarget);
      targets.push(...getRemoteOnlinePlayerWorldPositionsForHost());

      if (!targets.length) return null;

      let best = targets[0];
      let bestD = (best.x - enemy.x) ** 2 + (best.y - enemy.y) ** 2;
      for (let i = 1; i < targets.length; i++) {
        const target = targets[i];
        const d = (target.x - enemy.x) ** 2 + (target.y - enemy.y) ** 2;
        if (d < bestD) {
          best = target;
          bestD = d;
        }
      }

      return best;
    }

    function serializeOnlineHostileProjectile(p) {
      const pos = normalizeRoomPoint(p.x, p.y);
      return {
        x: pos.x,
        y: pos.y,
        vx: p.vx || 0,
        vy: p.vy || 0,
        size: p.size || 10,
        hitboxSize: p.hitboxSize || p.size || 10,
        damage: p.damage || 1,
        rotation: p.rotation || 0,
        life: p.life || 0,
        color: p.color || game.ruby,
        enemyProjectile: true,
      };
    }

    function deserializeOnlineHostileProjectile(snap) {
      const pos = denormalizeRoomPoint(snap.x, snap.y);
      return {
        enemyProjectile: true,
        x: pos.x,
        y: pos.y,
        vx: Number(snap.vx) || 0,
        vy: Number(snap.vy) || 0,
        size: Number(snap.size) || 10,
        hitboxSize: Number(snap.hitboxSize) || Number(snap.size) || 10,
        damage: Number(snap.damage) || 1,
        rotation: Number(snap.rotation) || 0,
        rotateTimer: 0,
        life: Number(snap.life) || 0.1,
        color: snap.color || game.ruby,
      };
    }

    function serializeOnlinePulserRing(ring) {
      const pos = normalizeRoomPoint(ring.x, ring.y);
      const rr = room.getRect();
      const scale = Math.max(1, Math.min(rr.w || 1, rr.h || 1));

      return {
        id: getOrCreateOnlineRingId(ring),
        x: pos.x,
        y: pos.y,
        radius: (ring.radius || 0) / scale,
        maxRadius: (ring.maxRadius || 0) / scale,
        minRadius: (ring.minRadius || 0) / scale,
        speed: (ring.speed || 0) / scale,
        thickness: ring.thickness || 20,
        life: ring.life || 0,
        color: ring.color || game.ruby,
        alpha: ring.alpha ?? 1,
        damagePlayerAmount: ring.damagePlayerAmount || 1,
      };
    }

    function deserializeOnlinePulserRing(snap) {
      const pos = denormalizeRoomPoint(snap.x, snap.y);
      const rr = room.getRect();
      const scale = Math.max(1, Math.min(rr.w || 1, rr.h || 1));

      return {
        _onlineId: snap.id || "",
        x: pos.x,
        y: pos.y,
        radius: (Number(snap.radius) || 0) * scale,
        maxRadius: (Number(snap.maxRadius) || 0) * scale,
        minRadius: (Number(snap.minRadius) || 0) * scale,
        speed: (Number(snap.speed) || 0) * scale,
        thickness: Number(snap.thickness) || 20,
        life: Number(snap.life) || 0.1,
        color: snap.color || game.ruby,
        alpha: Number.isFinite(Number(snap.alpha)) ? Number(snap.alpha) : 1,
        damagePlayerAmount: Number(snap.damagePlayerAmount) || 1,
        hitPlayer: false,
      };
    }

    function serializeOnlineBossHazard(hazard) {
      const out = { ...hazard, id: getOrCreateOnlineHazardId(hazard) };

      if (Number.isFinite(Number(hazard.x)) && Number.isFinite(Number(hazard.y))) {
        const pos = normalizeRoomPoint(hazard.x, hazard.y);
        out.x = pos.x;
        out.y = pos.y;
      }

      if (Number.isFinite(Number(hazard.radius))) {
        const rr = room.getRect();
        const scale = Math.max(1, Math.min(rr.w || 1, rr.h || 1));
        out.radius = Number(hazard.radius) / scale;
      }

      if (hazard.type === "linebreakerLaser") {
        const rr = room.getRect();
        const isH = hazard.axis === "h";
        const axisSize = Math.max(1, isH ? rr.h : rr.w);
        const axisStart = isH ? rr.y : rr.x;
        const sweepSize = Math.max(1, isH ? canvas.height : canvas.width);

        out.posNormSpace = hazard.isSweep ? "canvas" : "room";
        if (Number.isFinite(Number(hazard.pos))) {
          out.posNorm = hazard.isSweep
            ? Number(hazard.pos) / sweepSize
            : (Number(hazard.pos) - axisStart) / axisSize;
        }
        if (Number.isFinite(Number(hazard.fromPos))) {
          out.fromPosNorm = hazard.isSweep
            ? Number(hazard.fromPos) / sweepSize
            : (Number(hazard.fromPos) - axisStart) / axisSize;
        }
        if (Number.isFinite(Number(hazard.toPos))) {
          out.toPosNorm = hazard.isSweep
            ? Number(hazard.toPos) / sweepSize
            : (Number(hazard.toPos) - axisStart) / axisSize;
        }
      }

      return out;
    }

    function deserializeOnlineBossHazard(snap) {
      const out = { ...snap, _onlineId: snap.id || "" };

      if (Number.isFinite(Number(snap.x)) && Number.isFinite(Number(snap.y))) {
        const pos = denormalizeRoomPoint(snap.x, snap.y);
        out.x = pos.x;
        out.y = pos.y;
      }

      if (Number.isFinite(Number(snap.radius))) {
        const rr = room.getRect();
        const scale = Math.max(1, Math.min(rr.w || 1, rr.h || 1));
        out.radius = Number(snap.radius) * scale;
      }

      if (snap.type === "linebreakerLaser") {
        const rr = room.getRect();
        const isH = snap.axis === "h";
        const useCanvasSpace = snap.posNormSpace === "canvas" || !!snap.isSweep;
        const axisSize = Math.max(1, useCanvasSpace ? (isH ? canvas.height : canvas.width) : (isH ? rr.h : rr.w));
        const axisStart = useCanvasSpace ? 0 : (isH ? rr.y : rr.x);

        if (Number.isFinite(Number(snap.posNorm))) out.pos = axisStart + Number(snap.posNorm) * axisSize;
        if (Number.isFinite(Number(snap.fromPosNorm))) out.fromPos = axisStart + Number(snap.fromPosNorm) * axisSize;
        if (Number.isFinite(Number(snap.toPosNorm))) out.toPos = axisStart + Number(snap.toPosNorm) * axisSize;
      }

      return out;
    }

    function applySyncedRingSnapshot(existing, incoming) {
      existing._onlineId = incoming._onlineId || existing._onlineId || "";
      existing._netTargetX = incoming.x;
      existing._netTargetY = incoming.y;
      existing._netTargetRadius = incoming.radius;
      existing.maxRadius = incoming.maxRadius;
      existing.minRadius = incoming.minRadius;
      existing.speed = incoming.speed;
      existing.thickness = incoming.thickness;
      existing.life = incoming.life;
      existing.color = incoming.color;
      existing.alpha = incoming.alpha;
      existing.damagePlayerAmount = incoming.damagePlayerAmount;
    }

    function applySyncedHazardSnapshot(existing, incoming) {
      existing._onlineId = incoming._onlineId || existing._onlineId || "";
      existing.type = incoming.type || existing.type;
      existing._netTargetX = Number.isFinite(Number(incoming.x)) ? Number(incoming.x) : existing.x;
      existing._netTargetY = Number.isFinite(Number(incoming.y)) ? Number(incoming.y) : existing.y;
      existing._netTargetRotation = Number.isFinite(Number(incoming.rotation)) ? Number(incoming.rotation) : existing.rotation;
      existing._netTargetRadius = Number.isFinite(Number(incoming.radius)) ? Number(incoming.radius) : existing.radius;

      if (incoming.type === "doupDroub") {
        existing.color = incoming.color || existing.color;
        existing.rotationSpeed = Number.isFinite(Number(incoming.rotationSpeed)) ? Number(incoming.rotationSpeed) : existing.rotationSpeed;
        existing.rays = Number.isFinite(Number(incoming.rays)) ? Number(incoming.rays) : existing.rays;
        existing.rayLength = Number.isFinite(Number(incoming.rayLength)) ? Number(incoming.rayLength) : existing.rayLength;
        existing.rayWidth = Number.isFinite(Number(incoming.rayWidth)) ? Number(incoming.rayWidth) : existing.rayWidth;
        existing.maxLife = Number.isFinite(Number(incoming.maxLife)) ? Number(incoming.maxLife) : existing.maxLife;
        existing.fadeStart = Number.isFinite(Number(incoming.fadeStart)) ? Number(incoming.fadeStart) : existing.fadeStart;
        existing.warningDuration = Number.isFinite(Number(incoming.warningDuration)) ? Number(incoming.warningDuration) : existing.warningDuration;
        existing.warningTimer = Number.isFinite(Number(incoming.warningTimer)) ? Number(incoming.warningTimer) : existing.warningTimer;
        existing.life = Number.isFinite(Number(incoming.life)) ? Number(incoming.life) : existing.life;
        existing.active = !!incoming.active;
        existing.hitTimer = Math.min(existing.hitTimer || 0, Number.isFinite(Number(incoming.hitTimer)) ? Number(incoming.hitTimer) : (existing.hitTimer || 0));
        return;
      }

      Object.assign(existing, incoming);
      existing._netTargetX = Number.isFinite(Number(incoming.x)) ? Number(incoming.x) : existing.x;
      existing._netTargetY = Number.isFinite(Number(incoming.y)) ? Number(incoming.y) : existing.y;
      existing._netTargetRotation = Number.isFinite(Number(incoming.rotation)) ? Number(incoming.rotation) : existing.rotation;
      existing._netTargetRadius = Number.isFinite(Number(incoming.radius)) ? Number(incoming.radius) : existing.radius;
    }

    function updateSyncedRingInterpolation(ring, dt) {
      const amount = Math.min(1, dt * 20);
      if (Number.isFinite(Number(ring._netTargetX))) ring.x = approachNumber(ring.x, ring._netTargetX, amount);
      if (Number.isFinite(Number(ring._netTargetY))) ring.y = approachNumber(ring.y, ring._netTargetY, amount);
      if (Number.isFinite(Number(ring._netTargetRadius))) ring.radius = approachNumber(ring.radius, ring._netTargetRadius, amount);
    }

    function updateSyncedHazardInterpolation(hazard, dt) {
      const amount = Math.min(1, dt * 18);
      if (Number.isFinite(Number(hazard._netTargetX))) hazard.x = approachNumber(hazard.x, hazard._netTargetX, amount);
      if (Number.isFinite(Number(hazard._netTargetY))) hazard.y = approachNumber(hazard.y, hazard._netTargetY, amount);
      if (Number.isFinite(Number(hazard._netTargetRadius))) hazard.radius = approachNumber(hazard.radius, hazard._netTargetRadius, amount);
      if (Number.isFinite(Number(hazard._netTargetRotation))) hazard.rotation = approachAngle(hazard.rotation || 0, hazard._netTargetRotation, Math.min(1, dt * 12));
    }

    function sendOnlineEnemyAttackEvent(event) {
      if (!isOnlineHost()) return;
      if (isOnlineVersusMode()) return;
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return;
      if (game.state !== "playing") return;
      if (!event || typeof event !== "object") return;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "enemy_attack_event",
          event: {
            ...event,
            id: event.id || `atk-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
            wave: game.wave,
            sentAt: Date.now(),
          }
        }));
      } catch {}
    }

    function playOnlineEnemyAttackEvent(event) {
      if (!isOnlineGuest()) return;
      if (!event || typeof event !== "object") return;

      const eventId = String(event.id || "");
      if (eventId && onlineAttackEventSeen.has(eventId)) return;
      if (eventId) {
        onlineAttackEventSeen.add(eventId);
        if (onlineAttackEventSeen.size > 240) {
          const first = onlineAttackEventSeen.values().next().value;
          onlineAttackEventSeen.delete(first);
        }
      }

      // Si llega tarde un ataque de otra oleada/intermisión, no lo reproducimos.
      if (Number.isFinite(Number(event.wave)) && Number(event.wave) !== Number(game.wave)) return;
      if (game.state !== "playing" || game.waveState !== "combat") return;

      const eventAge = getOnlineEnemyAttackEventAge(event);
      const pos = Number.isFinite(Number(event.x)) && Number.isFinite(Number(event.y))
        ? denormalizeRoomPoint(event.x, event.y)
        : { x: Number(event.worldX) || player.x, y: Number(event.worldY) || player.y };

      if (event.attack === "pulser_ring") {
        const ringKind = String(event.ringKind || "pulser");
        const color = event.color || game.ruby;
        if (ringKind === "miniPulser") spawnMiniPulserRing(pos.x, pos.y);
        else if (ringKind === "duopulser") spawnDuopulserRing(pos.x, pos.y);
        else if (ringKind === "boss19") spawnBoss19Ring(pos.x, pos.y, color, Number(event.speedMultiplier) || 1.3, Number(event.damagePlayerAmount) || 1);
        else if (ringKind === "secretBoss") spawnSecretBossRing(pos.x, pos.y, color);
        else if (ringKind === "magneto" && event.bossKind === "boss19") spawnBoss19MagnetoRing(pos.x, pos.y, color, Number(event.speedMultiplier) || 1.3);
        else if (ringKind === "magneto") spawnMagnetoRing(pos.x, pos.y, color, Number(event.speedMultiplier) || 1);
        else spawnPulserRing(pos.x, pos.y, color);
        return;
      }

      if (event.attack === "doup_droub") {
        if (event.bossKind === "boss19") spawnBoss19Droub(pos.x, pos.y, event.color || "#f0024e", Number(event.speedMultiplier) || 1.3);
        else spawnDoupulserDroub(pos.x, pos.y, event.color || "#f0024e");
        return;
      }

      if (event.attack === "doup_blaster") {
        if (event.bossKind === "boss19") spawnBoss19Blaster(pos.x, pos.y, event.color || "#f0024e", Number(event.speedMultiplier) || 1.3);
        else spawnDoupulserBlaster(pos.x, pos.y, event.color || "#f0024e");
        return;
      }

      if (String(event.attack || "").startsWith("linebreaker_laser")) {
        const attackName = String(event.attack || "");
        const axis = event.axis === "v" || attackName.endsWith("_v") || attackName.includes("_v_") ? "v" : "h";
        const lineKind = event.lineKind || (attackName.includes("_sweep_") ? "sweep" : "cut");
        if (lineKind === "sweep") {
          const phase2 = event.phase2 != null ? !!event.phase2 : attackName.includes("_p2");
          const reverse = event.reverse != null ? !!event.reverse : attackName.includes("_r");
          const hazard = spawnLinebreakerSweep(axis, phase2, reverse);
          applyLinebreakerEventAge(hazard, eventAge);
        } else {
          const rr = room.getRect();
          const fallbackNorm = axis === "h" ? Number(event.y) : Number(event.x);
          const normPos = Number.isFinite(Number(event.normPos))
            ? Number(event.normPos)
            : (Number.isFinite(fallbackNorm) ? fallbackNorm : 0.5);
          const linePos = axis === "h" ? rr.y + normPos * rr.h : rr.x + normPos * rr.w;
          const hazard = spawnLinebreakerCut(axis, linePos, {
            color: event.color || "#f0024e",
            width: Number(event.width) || 76,
            warningTime: Number(event.warningTime) || 0.7,
            activeTime: Number(event.activeTime) || 0.3,
            fadeTime: Number(event.fadeTime) || 0.18,
          });
          applyLinebreakerEventAge(hazard, eventAge);
        }
        return;
      }
    }

    function getOnlineEnemyAttackEventAge(event) {
      const sentAt = Number(event?.sentAt);
      if (!Number.isFinite(sentAt) || sentAt <= 0) return 0;
      const age = (Date.now() - sentAt) / 1000;
      return Math.max(0, Math.min(4, age));
    }

    function applyLinebreakerEventAge(hazard, age) {
      if (!hazard || hazard.type !== "linebreakerLaser" || !Number.isFinite(Number(age)) || age <= 0) return;
      const warning = Math.max(0.001, Number(hazard.warningTime) || 0.7);
      const active = Math.max(0.001, Number(hazard.activeTime) || 0.3);
      const fade = Math.max(0.001, Number(hazard.fadeTime) || 0.18);

      if (age < warning) {
        hazard.phase = "warning";
        hazard.timer = age;
        return;
      }

      if (age < warning + active) {
        hazard.phase = "active";
        hazard.timer = age - warning;
        hazard.hitTimer = 0;
        hazard.remoteHitTimer = 0;
        return;
      }

      if (age < warning + active + fade) {
        hazard.phase = "fade";
        hazard.timer = age - warning - active;
        return;
      }

      const idx = bossHazards.indexOf(hazard);
      if (idx >= 0) bossHazards.splice(idx, 1);
    }

    function clearGuestSyncedHostileAttacks() {
      // Limpia ataques hostiles sincronizados cuando cambia la oleada o entra intermisión.
      // Esto evita anillos/hazards fantasma que quedan dañando o dibujándose fuera de tiempo.
      for (let i = projectiles.length - 1; i >= 0; i--) {
        if (projectiles[i].enemyProjectile) projectiles.splice(i, 1);
      }
      pulserRings.length = 0;
      bossHazards.length = 0;
    }

    function syncGuestHostileAttacksFromSnapshot(msg) {
      if (!isOnlineGuest()) return;

      const hostileProjectiles = Array.isArray(msg.hostileProjectiles) ? msg.hostileProjectiles : [];

      // Proyectiles enemigos: se reemplazan siempre por el snapshot actual del host.
      // Si el host manda vacío, significa que ya no existen y no deben quedar hitboxes fantasma.
      for (let i = projectiles.length - 1; i >= 0; i--) {
        if (projectiles[i].enemyProjectile) projectiles.splice(i, 1);
      }
      for (const snap of hostileProjectiles) {
        projectiles.push(deserializeOnlineHostileProjectile(snap));
      }

      // Anillos, lasers y hazards cortos ahora se reproducen por enemy_attack_event.
      // No los rearmamos desde el snapshot porque eso mezclaba dibujos viejos con hitboxes nuevas.
      if ((msg.waveState || game.waveState) !== "combat") {
        pulserRings.length = 0;
        bossHazards.length = 0;
      }
    }

    function sendOnlineEnemySnapshot(dt) {
      if (!isOnlineHost()) return;
      if (isOnlineVersusMode()) return;
      if (game.state !== "playing") return;

      onlineEnemySendTimer -= dt;
      if (onlineEnemySendTimer > 0) return;
      onlineEnemySendTimer = 1 / 20;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "enemy_state",
          wave: game.wave,
          waveState: game.waveState,
          waveTimer: game.waveTimer,
          intermissionTimer: game.intermissionTimer,
          roomStartTimer: game.roomStartTimer,
          enemies: enemies.map(serializeOnlineEnemy),
          hostileProjectiles: projectiles.filter(p => p.enemyProjectile).map(serializeOnlineHostileProjectile),
          pulserRings: pulserRings.map(serializeOnlinePulserRing),
          bossHazards: bossHazards.map(serializeOnlineBossHazard),
          intermissionSkip: getOnlineIntermissionSkipStateForSnapshot()
        }));
      } catch {}
    }


    function shouldGiveLocalOnlinePostBossReward(wave, waveState) {
      return isOnlineGuest() &&
        waveState === "intermission" &&
        isBossWaveNumber(wave) &&
        wave !== 2000 &&
        !onlineLocalPostBossRewards[wave];
    }

    function giveLocalOnlinePostBossReward(wave) {
      onlineLocalPostBossRewards[wave] = true;

      // Recompensa local e independiente para el jugador que NO es host.
      // No afecta puntos/XP/drops del host.
      grantPostBossReward();
      spawnPostBossUpgradeOrb();

      if (game.upgradePickup) {
        showWaveBanner("RECOMPENSA", "elegí tu mejora");
      }
    }

    function applyOnlineEnemySnapshot(msg) {
      if (!isOnlineGuest()) return;

      onlineLastEnemySnapshotAt = performance.now();

      const prevWave = game.wave;
      const prevWaveState = game.waveState;
      const incomingWave = msg.wave ?? game.wave;
      const incomingWaveState = msg.waveState || game.waveState;

      game.wave = incomingWave;
      game.waveState = incomingWaveState;
      const waveChanged = Number(prevWave) !== Number(game.wave);
      if (waveChanged || game.waveState !== "combat") {
        clearGuestSyncedHostileAttacks();
        onlineAttackEventSeen.clear();
      }
      game.waveTimer = Number.isFinite(Number(msg.waveTimer)) ? Number(msg.waveTimer) : game.waveTimer;
      game.intermissionTimer = Number.isFinite(Number(msg.intermissionTimer)) ? Number(msg.intermissionTimer) : game.intermissionTimer;
      game.roomStartTimer = Number.isFinite(Number(msg.roomStartTimer)) ? Number(msg.roomStartTimer) : game.roomStartTimer;

      if (prevWaveState !== "intermission" && game.waveState === "intermission") {
        resetOnlineIntermissionSkipVotes(game.wave);
      }

      if (game.waveState === "intermission" && msg.intermissionSkip) {
        applyOnlineIntermissionSkipVoteState(msg.intermissionSkip);
      }
      if (game.waveState === "intermission") {
        mergeOnlineIntermissionSkipVotesFromPlayers(onlineRoom.players);
      }

      if (shouldGiveLocalOnlinePostBossReward(game.wave, game.waveState)) {
        giveLocalOnlinePostBossReward(game.wave);
      }

      if (prevWaveState === "intermission" && game.waveState === "combat") {
        resetOnlineIntermissionSkipVotes(game.wave);
        // El host ya empezó la próxima oleada: cerramos solo la recompensa local pendiente del invitado.
        clearUpgradePickup();
        clearHealPickup();
      }

      const rr = room.getRect();
      const incoming = Array.isArray(msg.enemies) ? msg.enemies : [];
      syncGuestHostileAttacksFromSnapshot(msg);

      const byId = new Map(enemies.map(e => [e._onlineId, e]));
      const next = [];

      for (const snap of incoming) {
        if (!snap || !snap.id) continue;

        let enemy = byId.get(snap.id);
        const wx = rr.x + Number(snap.x) * rr.w;
        const wy = rr.y + Number(snap.y) * rr.h;
        const prevX = enemy ? Number(enemy.x) : NaN;
        const prevY = enemy ? Number(enemy.y) : NaN;
        const prevSnapshotAt = enemy ? Number(enemy._guestSnapshotAt || 0) : 0;
        const now = performance.now();

        const wasNewEnemy = !enemy;
        if (!enemy) {
          enemy = createEnemyFromOnlineSnapshot(snap, wx, wy);
        }

        enemy._onlineId = snap.id;
        enemy.type = snap.type || enemy.type;
        enemy._isBoss = !!snap.isBoss;

        // FIX: en invitado, la interpolación anterior podía dejar enemigos/ataques desfasados
        // o directamente sin actualizar. Volvemos a usar el snapshot del host como fuente real.
        if (Number.isFinite(wx)) enemy.x = wx;
        if (Number.isFinite(wy)) enemy.y = wy;
        if (Number.isFinite(Number(snap.rotation))) enemy.rotation = Number(snap.rotation);
        if (Number.isFinite(Number(snap.innerRotation))) enemy.innerRotation = Number(snap.innerRotation);

        const snapVx = Number(snap.vx);
        const snapVy = Number(snap.vy);
        if (Number.isFinite(snapVx)) enemy.netVx = snapVx * rr.w;
        else if (Number.isFinite(prevX) && Number.isFinite(wx) && prevSnapshotAt > 0) {
          enemy.netVx = (wx - prevX) / Math.max(0.001, (now - prevSnapshotAt) / 1000);
        }
        if (Number.isFinite(snapVy)) enemy.netVy = snapVy * rr.h;
        else if (Number.isFinite(prevY) && Number.isFinite(wy) && prevSnapshotAt > 0) {
          enemy.netVy = (wy - prevY) / Math.max(0.001, (now - prevSnapshotAt) / 1000);
        }
        enemy._guestSnapshotAt = now;

        enemy._netTargetX = enemy.x;
        enemy._netTargetY = enemy.y;
        enemy._netTargetRotation = enemy.rotation || 0;
        if (Number.isFinite(Number(enemy.innerRotation))) enemy._netTargetInnerRotation = enemy.innerRotation;

        const prevPulseTimer = Number.isFinite(Number(enemy._guestLastPulseTimer)) ? Number(enemy._guestLastPulseTimer) : null;

        const prevHp = Number.isFinite(Number(enemy.hp)) ? Number(enemy.hp) : null;

        enemy.size = Number.isFinite(Number(snap.size)) ? Number(snap.size) : enemy.size;

        const incomingHp = Number.isFinite(Number(snap.hp)) ? Number(snap.hp) : enemy.hp;
        enemy.hp = incomingHp;
        enemy.maxHp = Number.isFinite(Number(snap.maxHp)) ? Number(snap.maxHp) : enemy.maxHp;

        // El host suaviza hpVisual, pero en invitado eso hacía que la barra pareciera atrasada.
        // Si el HP real baja, mostramos la barra bajando al instante y agregamos feedback.
        if (prevHp !== null && incomingHp < prevHp) {
          enemy.hitFlash = Math.max(enemy.hitFlash || 0, 1);
          enemy.hpVisual = incomingHp;
          spawnHitParticles(enemy.x, enemy.y, "#00ff8c", 5);
          spawnFloatingText(`-${Math.max(1, Math.round(prevHp - incomingHp))}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.55, "#00ff8c", 13);
        } else {
          const incomingHpVisual = Number.isFinite(Number(snap.hpVisual)) ? Number(snap.hpVisual) : (enemy.hpVisual ?? incomingHp);
          enemy.hpVisual = Math.min(incomingHpVisual, incomingHp);
        }

        enemy.color = snap.color || enemy.color;
        enemy.phase2 = !!snap.phase2;
        enemy.shieldHp = Number.isFinite(Number(snap.shieldHp)) ? Number(snap.shieldHp) : (enemy.shieldHp || 0);
        enemy.shieldMaxHp = Number.isFinite(Number(snap.shieldMaxHp)) ? Number(snap.shieldMaxHp) : (enemy.shieldMaxHp || 0);

        const numericKeys = [
          "pulseTimer", "pulseInterval", "rotationSpeed", "rayLength", "rayWidth",
          "attackTimer", "attackCooldown", "attackLockTimer", "moveTime", "shieldTimer", "shieldInterval",
          "preferredDistance", "minDistance", "maxDistance", "strafeDir", "strafeSwapTimer",
          "baseX", "baseY", "shootTimer", "shootInterval", "speed"
        ];

        for (const key of numericKeys) {
          if (Number.isFinite(Number(snap[key]))) enemy[key] = Number(snap[key]);
        }

        // Los ataques del Pulser/MiniPulser/Duopulser llegan por enemy_attack_event.
        // No generamos fallbacks locales desde pulseTimer porque eso podía crear hitboxes fantasma
        // o círculos buggeados cuando el snapshot llegaba fuera de orden.
        if (Number.isFinite(Number(enemy.pulseTimer))) enemy._guestLastPulseTimer = Number(enemy.pulseTimer);

        next.push(enemy);
      }

      enemies.length = 0;
      enemies.push(...next);
    }

    function createEnemyFromOnlineSnapshot(snap, x, y) {
      const type = snap.type || "kamikaze";
      const enemy = {
        _onlineId: snap.id,
        type,
        x,
        y,
        size: Number(snap.size) || 34,
        hp: Number(snap.hp) || 1,
        maxHp: Number(snap.maxHp) || 1,
        hpVisual: Number(snap.hpVisual) || Number(snap.hp) || 1,
        rotation: Number(snap.rotation) || 0,
        _isBoss: !!snap.isBoss,
        netVx: Number.isFinite(Number(snap.vx)) ? Number(snap.vx) * room.getRect().w : 0,
        netVy: Number.isFinite(Number(snap.vy)) ? Number(snap.vy) * room.getRect().h : 0,
        speed: Number(snap.speed) || 0,
        color: snap.color || game.ruby,
      };

      // Defaults necesarios para que cada dibujo/animación pueda correr aunque llegue un snapshot parcial.
      if (type === "pulser") {
        enemy.pulseTimer = 1;
        enemy.pulseInterval = 3.5;
      } else if (type === "miniPulser") {
        enemy.pulseTimer = 1;
        enemy.pulseInterval = 3.0;
        enemy.outlineOnly = true;
        enemy.fillAlpha = 0;
        enemy.drawMode = "rubyOutlineOnly";
      } else if (type === "duopulser") {
        enemy.pulseTimer = 1;
        enemy.pulseInterval = 3.25;
        enemy.color = enemy.color || "#ba0d7b";
      } else if (type === "drouber") {
        enemy.innerRotation = 0;
        enemy.rotationSpeed = 0.702;
        enemy.rayLength = 1200;
        enemy.rayWidth = 15;
      } else if (type === "doupulser") {
        enemy.attackTimer = 1;
        enemy.attackCooldown = 1;
        enemy.events = [];
        enemy.color = enemy.color || "#f0024e";
      } else if (type === "linebreaker") {
        enemy.name = "LINEBREAKER";
        enemy.innerRotation = 0;
        enemy.attackTimer = 1;
        enemy.attackCooldown = 1;
        enemy.events = [];
        enemy.color = enemy.color || "#f0024e";
        enemy.darkColor = "#92002f";
        enemy.shieldMaxHp = Number(snap.shieldMaxHp) || 20;
      } else if (type === "shooter") {
        enemy.shootTimer = 1;
        enemy.shootInterval = 2;
        enemy.preferredDistance = 280;
        enemy.minDistance = 215;
        enemy.maxDistance = 355;
      }

      return enemy;
    }

    function updateOnlinePlayerSend(dt) {
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return;
      if (!onlineRoom.playerId) return;
      if (game.state !== "playing") return;
      if (game.settingsOpen || game.paused) return;

      onlineSendTimer -= dt;
      if (onlineSendTimer > 0) return;
      onlineSendTimer = 1 / 20;

      const rr = room.getRect();
      const nx = rr.w > 0 ? (player.x - rr.x) / rr.w : 0.5;
      const ny = rr.h > 0 ? (player.y - rr.y) / rr.h : 0.5;

      const aimTarget = typeof getAimTarget === "function" ? getAimTarget() : null;
      const aimX = aimTarget ? aimTarget.x : mouse.x;
      const aimY = aimTarget ? aimTarget.y : mouse.y;

      const aimNX = rr.w > 0 ? (aimX - rr.x) / rr.w : 0.5;
      const aimNY = rr.h > 0 ? (aimY - rr.y) / rr.h : 0.5;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "input",

          // Posición normalizada dentro de la sala.
          // Así PC y celular se ven en el mismo lugar aunque tengan tamaños de pantalla distintos.
          x: nx,
          y: ny,
          aimX: aimNX,
          aimY: aimNY,

          rawX: player.x,
          rawY: player.y,
          hp: player.hp,
          maxHp: player.maxHp,
          points: game.points,
          xp: game.xp,
          xpRequired: game.xpRequired,
          xpLevel: game.xpLevel,
          downed: !!player.downed,
          invincible: !!player.invincible,
          wasDashing: !!player.wasDashing,
          hitTimer: player.hitTimer || 0,

          up: !player.downed && (keyDown("w") || keyDown("arrowup") || mobileInput.moveY < -0.15),
          down: !player.downed && (keyDown("s") || keyDown("arrowdown") || mobileInput.moveY > 0.15),
          left: !player.downed && (keyDown("a") || keyDown("arrowleft") || mobileInput.moveX < -0.15),
          right: !player.downed && (keyDown("d") || keyDown("arrowright") || mobileInput.moveX > 0.15),
          dash: !player.downed && player.dashTimer > 0,
          shoot: !player.downed && (!!mouse.down || !!mobileInput.rightFire),
          special: !player.downed && (!!mouse.rightDown || !!mobileInput.leftFire),
          skipVoteWave: onlineIntermissionSkip.localRequested ? Number(onlineIntermissionSkip.wave || game.wave) : 0,
          xpChoiceOpen: !!game.xpChoiceOpen,
          orbBlocking: !!(game.waveState === "intermission" && (game.upgradePickup || game.upgradeShopOpen))
        }));
      } catch {}
    }


    function getRemoteOnlinePlayerData() {
      return getOnlineRemotePlayers()[0] || null;
    }

    function getRemoteOnlineTargetPosition(remote) {
      let x = Number(remote.x);
      let y = Number(remote.y);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;

      const rr = room.getRect();
      if (x >= -0.25 && x <= 1.25 && y >= -0.25 && y <= 1.25) {
        x = rr.x + x * rr.w;
        y = rr.y + y * rr.h;
      }

      return { x, y };
    }

    function updateRemoteOnlineVisual(dt) {
      if (game.state !== "playing") {
        for (const id of Object.keys(remoteOnlineVisuals)) remoteOnlineVisuals[id].initialized = false;
        return;
      }

      const activeIds = new Set();
      for (const data of getOnlineRemotePlayers()) {
        const remoteId = data.id;
        const remote = data.player;
        const target = getRemoteOnlineTargetPosition(remote);
        if (!target) continue;

        activeIds.add(remoteId);
        const visual = remoteOnlineVisuals[remoteId] || (remoteOnlineVisuals[remoteId] = {
          initialized: false,
          x: 0,
          y: 0,
          targetX: 0,
          targetY: 0,
          dashPulse: 0,
          lastDash: false,
        });

        if (!visual.initialized) {
          visual.x = target.x;
          visual.y = target.y;
          visual.targetX = target.x;
          visual.targetY = target.y;
          visual.initialized = true;
          visual.dashPulse = 0;
          visual.lastDash = !!remote.input?.dash;
          continue;
        }

        visual.targetX = target.x;
        visual.targetY = target.y;

        const smoothing = 1 - Math.exp(-dt * 18);
        visual.x += (visual.targetX - visual.x) * smoothing;
        visual.y += (visual.targetY - visual.y) * smoothing;

        const isDashing = !!remote.input?.dash;
        if (isDashing && !visual.lastDash) {
          visual.dashPulse = 1;
        }
        visual.lastDash = isDashing;
        visual.dashPulse = Math.max(0, visual.dashPulse - dt * 3.6);
      }

      for (const id of Object.keys(remoteOnlineVisuals)) {
        if (!activeIds.has(id)) remoteOnlineVisuals[id].initialized = false;
      }
    }

    function drawRemoteOnlinePlayer() {
      if (game.state !== "playing") return;

      for (const data of getOnlineRemotePlayers()) {
        const target = getRemoteOnlineTargetPosition(data.player);
        if (!target) continue;

        const visual = remoteOnlineVisuals[data.id];
        const x = visual?.initialized ? visual.x : target.x;
        const y = visual?.initialized ? visual.y : target.y;
        const remoteColor = getOnlineRemoteColor(data.id);

        const name = getOnlinePlayerDisplayName(data.id, data.player);
        const isRemoteDowned = !!data.player.downed || Number(data.player.hp || 0) <= 0;
        const isDashing = !isRemoteDowned && !!data.player.input?.dash;
        const dashPulse = Math.max(visual?.dashPulse || 0, isDashing ? 0.55 : 0);

        const rr = room.getRect();
        let aimX = Number(data.player.aimX);
        let aimY = Number(data.player.aimY);

        if (Number.isFinite(aimX) && Number.isFinite(aimY)) {
          if (aimX >= -0.25 && aimX <= 1.25 && aimY >= -0.25 && aimY <= 1.25) {
            aimX = rr.x + aimX * rr.w;
            aimY = rr.y + aimY * rr.h;
          }
        } else {
          aimX = x + 1;
          aimY = y;
        }

        const angle = isRemoteDowned ? Math.PI / 4 : Math.atan2(aimY - y, aimX - x);
        const size = 28;
        const dashStretch = isDashing ? 1.42 : 1;

        ctx.save();

        if (dashPulse > 0) {
          ctx.globalAlpha = 0.16 + dashPulse * 0.20;
          ctx.strokeStyle = remoteColor;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(x, y, size * 1.05 + dashPulse * 16, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.globalAlpha = isRemoteDowned ? 0.45 + Math.sin(game.time * 8) * 0.08 : 0.96;
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(dashStretch, isDashing ? 0.82 : 1);

        ctx.fillStyle = isRemoteDowned ? colorWithAlpha(remoteColor, 0.42) : remoteColor;
        ctx.fillRect(-size / 2, -size / 2, size, size);

        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillRect(-size / 2, -size / 2, size, 6);

        ctx.restore();

        const hp = Math.max(0, Math.min(Number(data.player.maxHp || 3), Number(data.player.hp ?? data.player.maxHp ?? 3)));
        const maxHp = Math.max(1, Number(data.player.maxHp || 3));
        const hpW = 42;
        const hpH = 6;
        const hpX = x - hpW / 2;
        const hpY = y - size / 2 - 15;

        drawRoundedRect(hpX, hpY, hpW, hpH, 4);
        ctx.fillStyle = "rgba(0,0,0,0.72)";
        ctx.fill();

        drawRoundedRect(hpX, hpY, hpW, hpH, 4);
        ctx.strokeStyle = "rgba(236,0,116,0.95)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (hp > 0) {
          ctx.save();
          drawRoundedRect(hpX + 2, hpY + 2, hpW - 4, hpH - 4, 3);
          ctx.clip();
          ctx.fillStyle = "#ec0074";
          ctx.fillRect(hpX + 2, hpY + 2, (hpW - 4) * (hp / maxHp), hpH - 4);
          ctx.restore();
        }

        ctx.font = "900 11px Inter, Segoe UI, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.fillText(name.toUpperCase(), x, y - size / 2 - 27);
      }
    }

    function getOnlinePlayerName(fallback = "Jugador") {
      const name = (game.playerName || "").trim();
      return name || fallback;
    }

    function resetOnlineRoomState() {
      onlineRoom.socket = null;
      onlineRoom.connectMode = "none";
      onlineRoom.connected = false;
      onlineRoom.reconnecting = false;
      onlineRoom.playerId = "";
      onlineRoom.players = {};
      onlineRoom.roomMode = "normal";
      onlineRoom.versus = {
        score: { p1: 0, p2: 0, p3: 0 },
        round: 0,
        targetScore: 3,
        matchOver: false,
        config: getOnlineVersusConfig(),
      };
    }

    function clearOnlineReconnectTimer() {
      if (!onlineReconnectTimer) return;
      clearTimeout(onlineReconnectTimer);
      onlineReconnectTimer = null;
    }

    function scheduleOnlineReconnect(roomCode, playerName, mode) {
      if (!roomCode || !mode || game.menuMode === "joinRoom" || game.menuMode === "multiplayer") return;
      if (onlineReconnectTimer) return;
      if (onlineReconnectAttempts >= ONLINE_RECONNECT_MAX_ATTEMPTS) {
        onlineRoom.reconnecting = false;
        game.multiplayer.status = "Conexión perdida.";
        game.multiplayer.joinError = "No se pudo reconectar.";
        return;
      }

      onlineReconnectAttempts++;
      onlineRoom.reconnecting = true;
      game.multiplayer.status = `Reconectando... ${onlineReconnectAttempts}/${ONLINE_RECONNECT_MAX_ATTEMPTS}`;

      const delay = Math.min(5200, 450 + onlineReconnectAttempts * 420);
      onlineReconnectTimer = setTimeout(() => {
        onlineReconnectTimer = null;
        connectOnlineRoom(roomCode, playerName, mode, true, onlineRoom.roomMode || game.multiplayer.roomMode || "normal");
      }, delay);
    }

    function closeOnlineSocket(sendLeave = true) {
      clearOnlineReconnectTimer();
      onlineHeartbeatTimer = 0;
      const socket = onlineRoom.socket;
      if (socket) socket._expectedClose = true;
      if (socket && socket.readyState === WebSocket.OPEN && sendLeave) {
        try {
          socket.send(JSON.stringify({ type: "leave_room" }));
        } catch {}
      }
      if (socket && socket.readyState <= WebSocket.OPEN) {
        try {
          socket.close();
        } catch {}
      }
      resetOnlineRoomState();
    }

    function connectOnlineRoom(roomCode, playerName, mode, reconnecting = false, roomMode = "") {
      if (!reconnecting) {
        onlineReconnectAttempts = 0;
        clearOnlineReconnectTimer();
      }
      const previousPlayerId = onlineRoom.playerId;
      const previousPlayers = onlineRoom.players;
      const previousRoomMode = onlineRoom.roomMode || game.multiplayer.roomMode || roomMode;
      const cleanRoomMode = normalizeOnlineRoomMode(roomMode || previousRoomMode);
      closeOnlineSocket(false);
      if (reconnecting) {
        onlineRoom.playerId = previousPlayerId;
        onlineRoom.players = previousPlayers || {};
      }
      applyOnlineRoomMode(reconnecting ? previousRoomMode : cleanRoomMode);

      const cleanCode = String(roomCode || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
      const cleanName = String(playerName || "Jugador").trim().slice(0, 18) || "Jugador";

      if (!cleanCode) {
        game.multiplayer.joinError = "Código inválido.";
        game.multiplayer.status = "No se pudo conectar.";
        return;
      }

      onlineRoom.connectMode = mode;
      onlineRoom.reconnecting = !!reconnecting;
      game.multiplayer.status = reconnecting ? "Reconectando WebSocket..." : "Conectando WebSocket...";
      game.multiplayer.joinError = "";

      const resumeId = reconnecting && previousPlayerId ? previousPlayerId : "";
      const url = `${WS_LOCAL_URL}?room=${encodeURIComponent(cleanCode)}&name=${encodeURIComponent(cleanName)}&mode=${encodeURIComponent(cleanRoomMode)}${resumeId ? `&resume=${encodeURIComponent(resumeId)}` : ""}`;
      const socket = new WebSocket(url);
      onlineRoom.socket = socket;

      socket.addEventListener("open", () => {
        onlineReconnectAttempts = 0;
        onlineRoom.reconnecting = false;
        onlineRoom.connected = true;
        game.multiplayer.status = reconnecting ? "Reconectado." : "WebSocket conectado...";
      });

      socket.addEventListener("message", event => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch {
          return;
        }
        handleOnlineRoomMessage(msg);
      });

      socket.addEventListener("close", () => {
        if (socket !== onlineRoom.socket) return;
        onlineRoom.connected = false;
        if (!socket._expectedClose && (game.menuMode === "roomLobby" || game.state === "playing")) {
          scheduleOnlineReconnect(cleanCode, cleanName, mode);
          return;
        }
        onlineRoom.reconnecting = false;
        if (game.menuMode === "roomLobby" && !game.multiplayer.joinError) {
          game.multiplayer.status = "Conexión cerrada.";
        }
      });

      socket.addEventListener("error", () => {
        if (reconnecting) {
          game.multiplayer.status = "Reconexión en espera...";
          return;
        }
        game.multiplayer.joinError = "No se pudo conectar al WebSocket.";
        game.multiplayer.status = "Revisá la conexión o el Worker publicado.";
      });
    }

    function handleOnlineRoomMessage(msg) {
      if (msg.type === "pong") return;

      if (msg.type === "connected") {
        onlineRoom.playerId = msg.playerId || "";
        onlineRoom.players = msg.players || {};
        applyOnlineRoomMode(msg.roomMode || onlineRoom.roomMode || game.multiplayer.roomMode);
        applyOnlineVersusState(msg.versus || onlineRoom.versus);

        // Si intentás unirte a una sala inexistente, Cloudflare crea el objeto y te da p1.
        // Para el cliente, eso significa que la sala no existía todavía.
        if (onlineRoom.connectMode === "join" && onlineRoom.playerId === "p1") {
          game.multiplayer.joinError = "Sala no encontrada.";
          game.multiplayer.status = "Ese código no existe todavía.";
          closeOnlineSocket(true);
          setMenuMode("joinRoom");
          setTimeout(() => roomCodeInput.focus(), 50);
          return;
        }

        game.multiplayer.roomCode = msg.roomCode || game.multiplayer.roomCode;
        game.multiplayer.isHost = onlineRoom.playerId === "p1";
        syncOnlineLobbyPlayers(msg.players || {});
        game.multiplayer.status = "";
        setMenuMode("roomLobby");
        return;
      }

      if (msg.type === "room_update") {
        onlineRoom.players = msg.players || {};
        applyOnlineRoomMode(msg.roomMode || onlineRoom.roomMode || game.multiplayer.roomMode);
        applyOnlineVersusState(msg.versus || onlineRoom.versus);
        syncOnlineLobbyPlayers(onlineRoom.players);
        game.multiplayer.status = "";
        return;
      }

      if (msg.type === "game_started") {
        onlineRoom.players = msg.players || onlineRoom.players;
        applyOnlineRoomMode(msg.roomMode || onlineRoom.roomMode || game.multiplayer.roomMode);
        applyOnlineVersusState(msg.versus || onlineRoom.versus);
        syncOnlineLobbyPlayers(onlineRoom.players);
        game.multiplayer.status = "Partida online iniciada.";
        startGame();
        return;
      }

      if (msg.type === "room_error") {
        game.multiplayer.joinError = msg.message || "Error de sala.";
        game.multiplayer.status = "Error de WebSocket.";
        if (onlineRoom.connectMode === "join") {
          closeOnlineSocket(true);
          setMenuMode("joinRoom");
          setTimeout(() => roomCodeInput.focus(), 50);
        }
        return;
      }

      if (msg.type === "players_state") {
        onlineRoom.players = msg.players || {};

        if (game.state === "playing" && game.waveState === "intermission") {
          mergeOnlineIntermissionSkipVotesFromPlayers(onlineRoom.players);
          tryStartNextWaveFromOnlineSkipVotes();
        }

        return;
      }

      if (msg.type === "remote_shot") {
        spawnRemoteOnlineProjectile(msg.shot);
        return;
      }

      if (msg.type === "versus_pulse") {
        spawnRemoteVersusPulse(msg.pulse);
        return;
      }

      if (msg.type === "versus_config_update") {
        applyOnlineVersusConfig(msg.config || {});
        return;
      }

      if (msg.type === "versus_round_over") {
        handleOnlineVersusRoundOver(msg);
        return;
      }

      if (msg.type === "versus_match_over") {
        handleOnlineVersusMatchOver(msg);
        return;
      }

      if (msg.type === "enemy_state") {
        if (isOnlineVersusMode()) return;
        applyOnlineEnemySnapshot(msg);
        return;
      }

      if (msg.type === "enemy_attack_event") {
        playOnlineEnemyAttackEvent(msg.event);
        return;
      }

      if (msg.type === "player_damage") {
        if (msg.targetId === onlineRoom.playerId) {
          applyOnlineDamageToLocalPlayer(Number(msg.amount) || 1, msg.source || "enemy");
        }
        return;
      }

      if (msg.type === "enemy_hit_request") {
        applyOnlineEnemyHitRequest(msg);
        return;
      }

      if (msg.type === "player_reward") {
        applyOnlinePlayerReward(msg);
        return;
      }

      if (msg.type === "player_revived") {
        if (msg.players) onlineRoom.players = msg.players;
        if (msg.targetId === onlineRoom.playerId) {
          reviveLocalPlayer();
        }
        return;
      }

      if (msg.type === "intermission_skip_votes") {
        applyOnlineIntermissionSkipVoteState(msg);
        tryStartNextWaveFromOnlineSkipVotes();
        return;
      }

      if (msg.type === "game_over_started") {
        if (game.state !== "gameOver" && game.state !== "fadeOut") {
          startGameOver(true);
        } else {
          resetOnlineGameOverSkipVotes(true);
        }
        return;
      }

      if (msg.type === "game_over_skip_votes") {
        applyOnlineGameOverSkipVoteState(msg);
        return;
      }

      if (msg.type === "game_over_skipped") {
        if (msg.players) onlineRoom.players = msg.players;
        skipGameOver(true);
        sendOnlinePlayerStateNow();
        return;
      }
    }

    function syncOnlineLobbyPlayers(players) {
      const local = players?.[onlineRoom.playerId];
      const remoteNames = getOnlineRoomPlayerIds()
        .filter(id => id !== onlineRoom.playerId && players?.[id]?.connected)
        .map(id => getOnlinePlayerDisplayName(id, players[id]));

      if (onlineRoom.playerId === "p1") {
        game.multiplayer.localPlayerName = local?.name || getOnlinePlayerName("Jugador 1");
        game.multiplayer.remotePlayerName = remoteNames.length ? remoteNames.join(" + ") : "Esperando jugador...";
      } else if (onlineRoom.playerId) {
        game.multiplayer.localPlayerName = local?.name || getOnlinePlayerName(onlineRoom.playerId === "p2" ? "Jugador 2" : "Jugador 3");
        game.multiplayer.remotePlayerName = remoteNames.length ? remoteNames.join(" + ") : "Host";
      } else {
        game.multiplayer.localPlayerName = getOnlinePlayerName("Jugador");
        game.multiplayer.remotePlayerName = "Esperando jugador...";
      }
    }

    function startOnlineRoomGame() {
      const socket = onlineRoom.socket;
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        game.multiplayer.joinError = "WebSocket no conectado.";
        return;
      }
      socket.send(JSON.stringify({
        type: "start_game",
        roomMode: game.multiplayer.roomMode || "normal",
        versusConfig: getOnlineVersusConfig(),
      }));
    }

    function createMultiplayerRoom(roomMode = "normal") {
      const normalizedMode = normalizeOnlineRoomMode(roomMode);
      const code = generateRoomCode();
      const name = getOnlinePlayerName("Jugador 1");

      game.multiplayer.isHost = true;
      game.multiplayer.roomCode = code;
      applyOnlineRoomMode(normalizedMode);
      if (normalizedMode === "versus") setOnlineVersusConfig(getOnlineVersusConfig(), false);
      game.multiplayer.localPlayerName = name;
      game.multiplayer.remotePlayerName = "Esperando jugador...";
      game.multiplayer.status = normalizedMode === "versus" ? "Creando sala versus..." : "Creando sala real...";
      game.multiplayer.joinError = "";
      setMenuMode("roomLobby");

      connectOnlineRoom(code, name, "create", false, normalizedMode);
    }

    function joinMultiplayerRoomFromInput() {
      const code = roomCodeInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (!code) {
        game.multiplayer.joinError = "Ingresá un código.";
        return;
      }

      const name = getOnlinePlayerName("Jugador 2");

      game.multiplayer.isHost = false;
      game.multiplayer.roomCode = code;
      applyOnlineRoomMode("normal");
      game.multiplayer.localPlayerName = name;
      game.multiplayer.remotePlayerName = "Buscando host...";
      game.multiplayer.status = "Uniéndose por WebSocket...";
      game.multiplayer.joinError = "";
      setMenuMode("roomLobby");

      connectOnlineRoom(code, name, "join", false, "normal");
    }

    function leaveMultiplayerRoom() {
      closeOnlineSocket(true);
      game.multiplayer.isHost = false;
      game.multiplayer.roomCode = "";
      applyOnlineRoomMode("normal");
      game.multiplayer.localPlayerName = getOnlinePlayerName("Jugador");
      game.multiplayer.remotePlayerName = "";
      game.multiplayer.status = "Sin conexión";
      game.multiplayer.joinError = "";
      setMenuMode("multiplayer");
    }

    roomCodeJoin.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();
      joinMultiplayerRoomFromInput();
    });

    roomCodeCancel.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();
      roomCodeInput.value = "";
      setMenuMode("multiplayer");
    });

    roomCodeInput.addEventListener("input", () => {
      roomCodeInput.value = roomCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
      game.multiplayer.joinError = "";
    });

    roomCodeInput.addEventListener("keydown", e => {
      e.stopPropagation();
      if (e.key === "Enter") {
        e.preventDefault();
        joinMultiplayerRoomFromInput();
      }
      if (e.key === "Escape") {
        e.preventDefault();
        roomCodeInput.value = "";
        setMenuMode("multiplayer");
      }
    });

    function updateMouseButtons(e) {
      // Click izquierdo: arma principal. Click derecho: habilidad/arma secundaria.
      mouse.down = (e.buttons & 1) !== 0;
      mouse.rightDown = (e.buttons & 2) !== 0;
    }

    canvas.addEventListener("mousemove", e => {
      const p = getCanvasPoint(e);
      mouse.x = p.x;
      mouse.y = p.y;

      if (game.state === "playing" && !game.settingsOpen) {
        updateMouseButtons(e);
      }
    });

    canvas.addEventListener("mousedown", e => {
      e.preventDefault();
      canvas.focus();
      const p = getCanvasPoint(e);
      mouse.x = p.x;
      mouse.y = p.y;

      if ((game.state === "gameOver" || game.state === "fadeOut") && e.button === 0) {
        if (!requestOnlineGameOverSkip()) skipGameOver();
        return;
      }

      if (game.xpChoiceOpen && e.button === 0) {
        handleXPChoiceClick(p.x, p.y);
        return;
      }

      if (game.state === "menu") {
        if (e.button === 0) handleMenuClick(p.x, p.y);
        return;
      }

      if (e.button === 2 && game.state === "playing" && !game.settingsOpen && !game.upgradeShopOpen) {
        // No limpiamos inputs: permite seguir moviéndote mientras usás habilidades de click derecho.
        mouse.rightDown = true;
        if (game.rightAbility === "preciseShot") {
          shootPreciseSingleShot("right");
        } else {
          usePulsadorAbility();
        }
        return;
      }

      if (e.button === 0 && game.state === "playing" && game.upgradeShopOpen) {
        handleUpgradeShopClick(p.x, p.y);
        clearInputs();
        return;
      }

      const clickedUI = e.button === 0 && handleSettingsClick(p.x, p.y);

      if (!clickedUI && !game.settingsOpen && game.state === "playing" && !game.upgradeShopOpen) {
        if (game.weaponMode === "multiShot") {
          shootMultiShotBurst();
          mouse.down = false;
        } else if (game.weaponMode === "preciseShot") {
          updateMouseButtons(e);
        } else {

    function getRoomGridColumns() {
      // Base: 12 columnas. En mobile se alarga 3 celdas hacia la izquierda

      return isMobileLikeDevice() ? 18 : 12;

    function getRoomGridRows() {
      // Importante: en mobile NO achicamos las celdas metiendo más filas.
      // La altura conserva las 12 celdas originales; solo crece el ancho.

    function getCachedArenaRect() {
      if (layoutCache.dirty) {
        const mobileLike = isMobileLikeDevice();
        const margin = mobileLike ? 8 : Math.max(18, arena.padding);
        const maxW = Math.max(260, canvas.width - margin * 2);
        const maxH = Math.max(260, canvas.height - margin * 2);
        const g = window.__gameRef || null;
        const scale = Math.max(0.65, Math.min(1.05, (g && g.arenaScale) || 1));

        // FIX GRID/ROOM 3:
        // La habitación se calcula desde una celda cuadrada real.
        // PC: 12x12. Mobile: 18x12, o sea +3 celdas horizontales por lado,
        // manteniendo el MISMO tamaño de celda en vez de achicarla.
        const wall = mobileLike ? 4 : 6;
        const cols = getRoomGridColumns();
        const rows = getRoomGridRows();
        const availableW = maxW * scale;
        const availableH = maxH * scale;
        const cell = Math.max(16, Math.floor(Math.min(
          (availableW - wall * 2) / cols,
          (availableH - wall * 2) / rows
        )));
        const roomW = cell * cols + wall * 2;
        const roomH = cell * rows + wall * 2;

        layoutCache.arenaRect.w = roomW;
        layoutCache.arenaRect.h = roomH;
        layoutCache.arenaRect.x = Math.round(canvas.width / 2 - roomW / 2);
        layoutCache.arenaRect.y = Math.round(canvas.height / 2 - roomH / 2);
        layoutCache.dirty = false;
      }

      return layoutCache.arenaRect;
    }

    function updateFloatingTexts(dt) {
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.x += t.vx * dt;
        t.y += t.vy * dt;
        t.vx *= 1 - Math.min(1, dt * 5);
        t.vy *= 1 - Math.min(1, dt * 1.8);
        t.life -= dt;
        if (t.life <= 0) floatingTexts.splice(i, 1);
      }
    }

    function drawFloatingTexts() {
      if (!floatingTexts.length) return;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const t of floatingTexts) {
        const p = 1 - t.life / t.maxLife;
        const alpha = Math.max(0, Math.min(1, t.life / t.maxLife));
        ctx.globalAlpha = alpha;
        ctx.font = `900 ${t.size}px Inter, Montserrat, Arial, sans-serif`;
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.strokeText(t.text, t.x, t.y - p * 5);
        ctx.fillStyle = t.color;
        ctx.fillText(t.text, t.x, t.y - p * 5);
      }
      ctx.restore();
    }

    function drawRoomPulses() {
      if (!roomPulses.length) return;
      const r = room.getRect();
      const mobileSoft = mobileInput.enabled ? 0.72 : 1;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (const pulse of roomPulses) {
        const p = 1 - pulse.life / pulse.maxLife;
        const alpha = (1 - p) * 0.42 * mobileSoft;
        const inset = 8 + p * 18;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = pulse.color;
        ctx.lineWidth = Math.max(2, 7 * (1 - p));
        ctx.strokeRect(r.x + inset, r.y + inset, r.w - inset * 2, r.h - inset * 2);
      }
      ctx.restore();
    }

    function drawEnemySpawnWarning(enemy) {
      if (!enemy.spawnWarning || enemy.spawnWarning <= 0) return;
      const p = 1 - enemy.spawnWarning / enemy.spawnWarningMax;
      const alpha = Math.max(0, Math.min(1, enemy.spawnWarning / enemy.spawnWarningMax));
      const radius = enemy.size * (0.72 + p * 0.42);
      const color = enemy.color || game.ruby;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = alpha * (mobileInput.enabled ? 0.40 : 0.56);
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(2, 5 * alpha);
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, radius, 0, Math.PI * 2);
      ctx.stroke();

      ctx.setLineDash([]);
      ctx.globalAlpha = alpha * (mobileInput.enabled ? 0.08 : 0.12);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, Math.max(2, radius * 0.55), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemyHealthBar(enemy, barW, barH, barX, barY, fillColor) {
      if (enemy.hpBackVisual == null) enemy.hpBackVisual = enemy.maxHp;
      enemy.hpBackVisual += ((enemy.hpVisual ?? enemy.hp) - enemy.hpBackVisual) * 0.12;
      const backPercent = Math.max(0, enemy.hpBackVisual / enemy.maxHp);
      const hpPercent = Math.max(0, (enemy.hpVisual ?? enemy.hp) / enemy.maxHp);

      ctx.save();
      drawRoundedRect(barX, barY, barW, barH, barH / 2);
      ctx.fillStyle = "rgba(8,12,20,0.88)";
      ctx.fill();

      if (backPercent > 0) {
        drawRoundedRect(barX, barY, barW * backPercent, barH, barH / 2);
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fill();
      }

      if (hpPercent > 0) {
        drawRoundedRect(barX, barY, barW * hpPercent, barH, barH / 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
      }

      drawRoundedRect(barX, barY, barW, barH, barH / 2);
      ctx.strokeStyle = "rgba(255,255,255,0.10)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

      if (!enemy.pulseInterval) return;
      const charge = 1 - clamp(enemy.pulseTimer / enemy.pulseInterval, 0, 1);

      const pulse = 0.92 + Math.sin(game.time * 14) * 0.08;
      const radius = enemy.size * radiusScale * (0.72 + charge * 0.42) * pulse;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = (charge - 0.52) * 0.42;
      ctx.strokeStyle = color;
      ctx.lineWidth = 4 + charge * 6;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function getSpawnPoint(index, total) {
      const r = room.getRect();
      const margin = 86;
      const spots = [
        { x: r.x + r.w * 0.68, y: r.y + r.h * 0.32 },
        { x: r.x + r.w * 0.35, y: r.y + r.h * 0.66 },
        { x: r.x + r.w * 0.78, y: r.y + r.h * 0.72 },
        { x: r.x + r.w * 0.25, y: r.y + r.h * 0.30 },
      ];

      const spot = spots[index % spots.length];
      return {
        x: Math.max(r.x + margin, Math.min(r.x + r.w - margin, spot.x)),
        y: Math.max(r.y + margin, Math.min(r.y + r.h - margin, spot.y)),
      };
    }

    function spawnWaveEnemies(waveNumber) {
      const r = room.getRect();

      if (waveNumber === 1) {
        for (let i = 0; i < 2; i++) {
          const p = getSpawnPoint(i, 2);
          spawnKamikaze(p.x, p.y);
        }
        return;
      }

      if (waveNumber === 2) {
        for (let i = 0; i < 3; i++) {
          const p = getSpawnPoint(i, 3);
          spawnKamikaze(p.x, p.y);
        }
        return;
      }

      if (waveNumber === 3) {
        // Primer MiniPulser solo: enseña el pulso chico sin saturar la sala.
        spawnMiniPulser(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 4) {
        // Primer mix simple: pulso chico + presión móvil.
        spawnMiniPulser(r.x + r.w * 0.22, r.y + r.h * 0.78);
        spawnKamikaze(r.x + r.w * 0.74, r.y + r.h * 0.28);
        return;
      }

      if (waveNumber === 5) {
        // Miniboss 1: Pulser. La recompensa aparece en la intermisión post-5.
        spawnPulser(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 6) {
        // Post-miniboss suave: mismo lenguaje que la 4, pero con posiciones invertidas.
        spawnMiniPulser(r.x + r.w * 0.78, r.y + r.h * 0.22);
        spawnKamikaze(r.x + r.w * 0.26, r.y + r.h * 0.72);
        return;
      }

      if (waveNumber === 7) {
        // Movilidad pura antes de volver a mezclar patrones.
        for (let i = 0; i < 3; i++) {
          const p = getSpawnPoint(i, 3);
          spawnKamikaze(p.x, p.y);
        }
        return;
      }

      if (waveNumber === 8) {
        // Pulser con apoyo leve: obliga a usar dash sin llenar demasiado la sala.
        spawnPulser(r.x + r.w / 2, r.y + r.h / 2);
        spawnKamikaze(r.x + r.w * 0.78, r.y + r.h * 0.28);
        return;
      }

      if (waveNumber === 9) {
        // Presentación limpia del Drouber antes del primer boss real.
        spawnDrouber(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 10) {
        // Boss 1: Doupulser. La escopeta aparece en la intermisión post-10.
        spawnDoupulser(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 11) {
        const cornerMargin = 78;
        const corners = [
          { x: r.x + cornerMargin, y: r.y + cornerMargin },
          { x: r.x + r.w - cornerMargin, y: r.y + cornerMargin },
          { x: r.x + cornerMargin, y: r.y + r.h - cornerMargin },
          { x: r.x + r.w - cornerMargin, y: r.y + r.h - cornerMargin },
        ];
        for (const p of corners) spawnKamikaze(p.x, p.y);
        return;
      }

      if (waveNumber === 12) {
        spawnDrouber(r.x + r.w / 2, r.y + r.h / 2);
        spawnKamikaze(r.x + r.w * 0.24, r.y + r.h * 0.76);
        return;
      }

      if (waveNumber === 13) {
        // Dos MiniPulsers recién acá: ya hay práctica suficiente para este salto.
        spawnMiniPulser(r.x + r.w * 0.18, r.y + r.h * 0.18);
        spawnMiniPulser(r.x + r.w * 0.82, r.y + r.h * 0.82);
        return;
      }

      if (waveNumber === 14) {
        spawnPulser(r.x + r.w / 2, r.y + r.h / 2);
        spawnKamikaze(r.x + r.w * 0.20, r.y + r.h * 0.20);
        spawnKamikaze(r.x + r.w * 0.80, r.y + r.h * 0.80);
        return;
      }

      if (waveNumber === 15) {
        // Miniboss 2: Duopulser. Por ahora solo da cura/puntos en la intermisión.
        spawnDuopulser(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 16) {
        spawnMiniPulser(r.x + r.w * 0.18, r.y + r.h * 0.82);
        spawnKamikaze(r.x + r.w * 0.72, r.y + r.h * 0.28);
        spawnKamikaze(r.x + r.w * 0.28, r.y + r.h * 0.34);
        return;
      }

      if (waveNumber === 17) {
        spawnDrouber(r.x + r.w / 2, r.y + r.h / 2);
        spawnMiniPulser(r.x + r.w * 0.82, r.y + r.h * 0.18);
        return;
      }

      if (waveNumber === 18) {
        spawnDuopulser(r.x + r.w / 2, r.y + r.h / 2);
        spawnKamikaze(r.x + r.w * 0.22, r.y + r.h * 0.78);
        return;
      }

      if (waveNumber === 18.5) {
        // Oleada intermedia única: preparación fuerte antes del cierre.
        spawnPulser(r.x + r.w * 0.35, r.y + r.h / 2);
        spawnDrouber(r.x + r.w * 0.68, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 19) {
        spawnPulser(r.x + r.w / 2, r.y + r.h / 2);
        spawnMiniPulser(r.x + r.w * 0.18, r.y + r.h * 0.18);
        spawnKamikaze(r.x + r.w * 0.82, r.y + r.h * 0.82);
        return;
      }

      if (waveNumber === 20) {
        // Boss final: la orbe del Pulsador aparece en la intermisión post-20.
        spawnLinebreaker(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      if (waveNumber === 21) {
        // Capítulo 2: primer enemigo shooter.
        // Mantiene distancia y dispara 3 perdigones ruby cada 2 segundos.
        spawnShooter(r.x + r.w * 0.68, r.y + r.h * 0.34);
        return;
      }

      if (waveNumber === 2000) {
        spawnSecretBoss(r.x + r.w / 2, r.y + r.h / 2);
        return;
      }

      // Temporal para que el juego no se quede sin contenido después del final.
      for (let i = 0; i < 4; i++) {
        const p = getSpawnPoint(i, 4);
        spawnKamikaze(p.x, p.y);
      }
    }

    function clearHealPickup() {
      game.healPickup = null;

    function collectHealPickup() {
      if (!game.healPickup) return;

      const mode = game.healPickup.mode || "preDoupulser";

      if (mode === "afterBoss19") {
        if (player.hp >= player.maxHp) {
          game.points += 8;
        } else {
          const healedIndex = player.hp;
          player.hp = Math.min(player.maxHp, player.hp + 1);
          spawnLifePulse(healedIndex);
        }
      } else {
        if (player.hp >= player.maxHp) {
          game.points += 15;
        } else if (player.hp === player.maxHp - 1) {
          const healedIndex = player.hp;
          player.hp = Math.min(player.maxHp, player.hp + 1);
          spawnLifePulse(healedIndex);
          game.points += 5;
        } else {
          const startHp = player.hp;
          const healAmount = Math.min(2, player.maxHp - player.hp);
          player.hp += healAmount;

          for (let i = 0; i < healAmount; i++) {
            spawnLifePulse(startHp + i);
          }
        }
      }

      game.waveFlashTimer = game.waveFlashDuration;
      clearHealPickup();
    }

    function updateHealPickup(dt) {
      if (!game.healPickup || game.waveState !== "intermission") return;

      const pickup = game.healPickup;
      pickup.pulse += dt;

      const dx = player.x - pickup.x;
      const dy = player.y - pickup.y;
      const hitDist = player.radius + pickup.radius;

      if (dx * dx + dy * dy <= hitDist * hitDist) {
        collectHealPickup();
      }
    }


    function updateUpgradePickup(dt) {
      const pickup = game.upgradePickup;
      if (!pickup) return;

      pickup.pulse = (pickup.pulse || 0) + dt;

      // Las orbes de compra aparecen como recompensa en la intermisión post-boss.
      // También queda compatible con pickups de combate si se agregan más adelante.
      if (game.upgradeShopOpen) return;
      if (game.waveState !== "combat" && game.waveState !== "intermission") return;

      const dx = player.x - pickup.x;
      const dy = player.y - pickup.y;
      const hitDist = player.radius + pickup.radius;

      if (dx * dx + dy * dy <= hitDist * hitDist) {
        openUpgradeShop();
      }
    }
