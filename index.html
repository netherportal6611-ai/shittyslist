    }

    function updateShooting(dt) {
      if (player.downed) {
        game.shootTimer = 0;
        mouse.down = false;
        mouse.rightDown = false;
        clearPreciseAimLock();
        return;
      }

      if (!isPreciseFireHeld()) {
        if (game.preciseAimLockId) {
          game.preciseAimReleaseTimer += dt;
          if (game.preciseAimReleaseTimer >= (game.preciseAimReleaseGrace || 0.08)) {
            clearPreciseAimLock();
          }
        }
      } else {
        game.preciseAimReleaseTimer = 0;
      }

      if (game.rightAbility === "preciseShot" && mouse.rightDown && game.state === "playing") {
        shootPreciseSingleShot("right");
      }

      if (game.weaponMode === "multiShot") {
        if (mouse.down && game.state === "playing") {
          shootMultiShotBurst();
        } else {
          game.shootTimer = 0;
        }
        return;
      }

      if (game.weaponMode === "preciseShot") {
        if (!mouse.down || game.state !== "playing") {
          game.shootTimer = 0;
          return;
        }

        game.shootTimer -= dt;
        let preciseShotsThisFrame = 0;
        while (game.shootTimer <= 0 && preciseShotsThisFrame < 6) {
          preciseShotsThisFrame++;
          const shot = shootPreciseProjectile();
          if (!shot) break;
          game.shootTimer += Math.max(0.03, getAutoShootInterval());
        }
        if (preciseShotsThisFrame >= 6) game.shootTimer = Math.max(game.shootTimer, 0.03);
        return;
      }

      if (!mouse.down || game.state !== "playing") {
        game.shootTimer = 0;
        return;
      }

      game.shootTimer -= dt;

      let autoShotsThisFrame = 0;
      while (game.shootTimer <= 0 && autoShotsThisFrame < 6) {
        autoShotsThisFrame++;
        if (player.stamina <= 0) break;

        const shot = shootProjectile();
        if (!shot) break;

        game.shootTimer += Math.max(0.03, getAutoShootInterval());
      }
      if (autoShotsThisFrame >= 6) game.shootTimer = Math.max(game.shootTimer, 0.03);
    }

    function spawnImpactParticles(x, y, color = "#7eeaff") {
      for (let i = 0; i < 9; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 140;

        impactParticles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3.5,
          color,
          life: 0.24 + Math.random() * 0.16,
          maxLife: 0.42,
        });
      }
    }

    function projectileHitsWall(p) {
      const r = room.getRect();
      const left = r.x;
      const right = r.x + r.w;
      const top = r.y;
      const bottom = r.y + r.h;

      return (
        p.x - p.size / 2 <= left ||
        p.x + p.size / 2 >= right ||
        p.y - p.size / 2 <= top ||
        p.y + p.size / 2 >= bottom
      );
    }

    function projectileHitsEnemy(p) {
      if (p.enemyProjectile) return false;
      const projectileRadius = getPlayerProjectileHitHalfSize(p);

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const dx = p.x - enemy.x;
        const dy = p.y - enemy.y;
        const enemyRadius = getEnemyBodyHitRadius(enemy);
        const hit = dx * dx + dy * dy <= Math.pow(projectileRadius + enemyRadius, 2);

        if (hit) {
          // Invitado online: la bala puede explotar visualmente contra el enemigo sincronizado,
          // pero NO modifica vida/puntos/XP. Eso lo hará el host en la siguiente fase de daño compartido.
          if (isOnlineGuest()) {
            const damage = applyPlayerDamageModifiers(p.damage || 1);
            sendOnlineEnemyHit(enemy, p, damage);

            // Feedback visual local inmediato para el invitado.
            // El host sigue siendo autoridad, pero la barra/flash no quedan atrasados.
            enemy.hitFlash = Math.max(enemy.hitFlash || 0, 1);
            const predictedHp = Math.max(0, Number(enemy.hp || 0) - damage);
            enemy.hp = predictedHp;
            enemy.hpVisual = Math.min(Number(enemy.hpVisual ?? enemy.hp), predictedHp);
            spawnHitParticles(p.x, p.y, p.precise ? "#ffffff" : "#00ff8c", 8);
            spawnFloatingText(`-${damage}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.55, p.precise ? "#ffffff" : "#00ff8c", p.precise ? 15 : 13);
            return true;
          }

          const damage = applyPlayerDamageModifiers(p.damage || 1);

          if (damageEnemyShield(enemy, damage)) {
            spawnHitParticles(p.x, p.y, "#42dfff", 5);
            spawnFloatingText(`-${damage}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.72, "#42dfff", 12);
            return true;
          }

          enemy.hitFlash = 1;
          spawnHitParticles(p.x, p.y, p.precise ? "#ffffff" : "#42dfff", 6);
          spawnFloatingText(`-${damage}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.55, p.precise ? "#ffffff" : "#42dfff", p.precise ? 15 : 13);
          enemy.hp -= damage;

          if (enemy.hp <= 0) {
            addEnemyKillPoints(enemy);
            spawnEnemyDeathPulse(enemy.x, enemy.y);
            enemies.splice(i, 1);
          }

          return true;
        }
      }

      return false;
    }


    function projectileHitsPlayer(p) {
      if (!p.enemyProjectile) return false;

      const projectileRadius = getEnemyProjectileHitHalfSize(p);

      // Host local.
      const localDx = p.x - player.x;
      const localDy = p.y - player.y;
      const localHit = localDx * localDx + localDy * localDy <= Math.pow(projectileRadius + getPlayerHitRadius(), 2);

      if (localHit && !isPlayerDamageInvulnerable()) {
        damagePlayer(p.damage || 1);
        return true;
      }

      // Host dana al jugador remoto si el proyectil enemigo le pega.
      if (isOnlineHost()) {
        for (const remotePos of getRemoteOnlinePlayerWorldPositionsForHost()) {
          const remote = onlineRoom.players?.[remotePos.id];
          if (remote && remote.connected && !isRemoteOnlinePlayerDamageInvulnerable(remote)) {
            const dx = p.x - remotePos.x;
            const dy = p.y - remotePos.y;
            const hit = dx * dx + dy * dy <= Math.pow(projectileRadius + getPlayerHitRadius(), 2);

            if (hit && sendOnlinePlayerDamage(remotePos.id, p.damage || 1, "enemy_projectile")) {
              return true;
            }
          }
        }
      }
      return false;
    }

    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];

        if (isOnlineGuest() && p.enemyProjectile) continue;

        if (!p.enemyProjectile) updatePreciseProjectileHoming(p, dt);
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        p.rotateTimer = (p.rotateTimer || 0) + dt;
        if (p.rotateTimer >= 0.2) {
          p.rotateTimer -= 0.2;
          p.rotation += Math.PI / 2;
        }

        const hitSomething = p.enemyProjectile
          ? projectileHitsPlayer(p)
          : projectileHitsEnemy(p);

        if (p.life <= 0 || projectileHitsWall(p) || projectileHitsObstacle(p) || hitSomething) {
          spawnImpactParticles(p.x, p.y, p.color || (p.enemyProjectile ? game.ruby : "#42dfff"));
          projectiles.splice(i, 1);
        }
      }
    }

    function updateImpactParticles(dt) {
      for (let i = impactParticles.length - 1; i >= 0; i--) {
        const p = impactParticles[i];

        updatePreciseProjectileHoming(p, dt);
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 1 - Math.min(1, dt * 7);
        p.vy *= 1 - Math.min(1, dt * 7);
        p.life -= dt;

        if (p.life <= 0) {
          impactParticles.splice(i, 1);
        }
      }
    }

    function updateHazards(dt) {
      updatePulserRings(dt);

      if (game.roomStartTimer > 0 || game.waveState !== "combat") {
        // No disparamos fuera de combate, pero las balas ya existentes deben seguir moviéndose
        // para no quedar clavadas en paredes al cambiar de oleada/intermisión.
        updateProjectiles(dt);
        updateRemoteOnlineProjectiles(dt);
        updateImpactParticles(dt);
        return;
      }

      updateShooting(dt);
      updateProjectiles(dt);
      updateRemoteOnlineProjectiles(dt);
      updateBossHazards(dt);
      updateImpactParticles(dt);
    }

    function update(dt) {
      game.time += dt;
      updateOnlineHeartbeat(dt);
      updateOnlinePlayerSend(dt);
      updateRemoteOnlineVisual(dt);
      sendOnlineEnemySnapshot(dt);

      if (game.waveFlashTimer > 0) {
        game.waveFlashTimer = Math.max(0, game.waveFlashTimer - dt);
      }

      if (game.touchSkipCooldown > 0) {
        game.touchSkipCooldown = Math.max(0, game.touchSkipCooldown - dt);
      }

      if (game.reviveCooldown > 0) {
        game.reviveCooldown = Math.max(0, game.reviveCooldown - dt);
      }
      updateTouchSkipWaveButtonLabel();
      updateTouchSpecial1ButtonLabel();
      updateTouchReviveButtonLabel();
      updateStationaryFireHold(dt);

      if (game.multiShotCooldown > 0) {
        game.multiShotCooldown = Math.max(0, game.multiShotCooldown - dt);
      }

      if (game.versus.shootLockTimer > 0) {
        game.versus.shootLockTimer = Math.max(0, game.versus.shootLockTimer - dt);
      }

      if (game.versus.roundBannerTimer > 0) {
        game.versus.roundBannerTimer = Math.max(0, game.versus.roundBannerTimer - dt);
      }

      if (game.preciseShotCooldown > 0 && game.waveState === "combat" && !game.upgradeShopOpen) {
        game.preciseShotCooldown = Math.max(0, game.preciseShotCooldown - dt);
      }

      if (
        game.pulsadorCooldown > 0 &&
        game.state === "playing" &&
        game.waveState === "combat" &&
        game.roomStartTimer <= 0 &&
        !game.settingsOpen &&
        !game.upgradeShopOpen
      ) {
        game.pulsadorCooldown = Math.max(0, game.pulsadorCooldown - dt);
      }

      if (
        game.curadorCooldown > 0 &&
        game.state === "playing" &&
        (game.waveState === "combat" || game.waveState === "intermission") &&
        (game.waveState === "intermission" || game.roomStartTimer <= 0) &&
        !game.settingsOpen &&
        !game.upgradeShopOpen
      ) {
        game.curadorCooldown = Math.max(0, game.curadorCooldown - dt);
      }

      updateDashTrail(dt);
      updateDashBursts(dt);
      updateFloatingTexts(dt);
      updateRoomPulses(dt);
      updateSpawnWarnings(dt);
      updateLifePulses(dt);
      updateLifeFades(dt);
      updateStamina(dt);
      updateWaveBanner(dt);
      updateScreenShake(dt);
      const fearTarget = isFearModeActive() ? 1 : 0;
      const fearTransitionSpeed = fearTarget > game.fearVisual ? 2.7 : 4.2;
      game.fearVisual += (fearTarget - game.fearVisual) * Math.min(1, dt * fearTransitionSpeed);
      game.pointsVisual += (game.points - game.pointsVisual) * Math.min(1, dt * 10);
      game.pointsPulse = Math.max(0, game.pointsPulse - dt * 2.8);
      updateXPVisual(dt);

      if (game.state === "playing" && !game.settingsOpen && game.roomStartTimer > 0) {
        game.roomStartTimer -= dt;
        if (game.roomStartTimer < 0) game.roomStartTimer = 0;
      }

      if (game.state === "playing" && game.xpChoiceOpen) {
        mouse.down = false;
        mouse.rightDown = false;
      } else if (game.state === "playing" && !game.settingsOpen && !game.upgradeShopOpen && !isOnlineCoopXPChoiceBlocking()) {
        updateMobileAimTarget();
        if (!player.downed) {
          if (mobileInput.leftFire) mouse.down = true;
          if (mobileInput.rightFire) mouse.rightDown = true;
          updatePlayer(dt);
          updateUpgradePickup(dt);
          updateHealPickup(dt);
        } else {
          mouse.down = false;
          mouse.rightDown = false;
          player.dashTimer = 0;
          player.dashGraceTimer = 0;
          player.wasDashing = false;
        }

        if (isOnlineVersusMode()) {
          updateHazards(dt);
        } else if (shouldRunLocalEnemySimulation()) {
          updateOnlineRevive(dt);
          checkOnlineCoopGameOver();
          updateEnemies(dt);
          updateHazards(dt);
          updateWaveSystem(dt);
        } else {
          updateOnlineRevive(dt);
          checkOnlineCoopGameOver();
          // Invitado online: enemigos/oleada vienen del host por WebSocket.
          // Pero el jugador invitado SÍ puede disparar, actualizar sus propias balas
          // y ver partículas de impacto de forma local.
          updateGuestSyncedEnemyVisuals(dt);

          if (game.roomStartTimer <= 0 && game.waveState === "combat") {
            updateShooting(dt);
          }

          // Siempre movemos/limpiamos balas ya existentes, incluso si terminó la oleada.
          updateProjectiles(dt);
          updateGuestSyncedHostileVisuals(dt);
          // El contacto con kamikazes lo resuelve el host y llega como player_damage.
          // No calculamos contacto local en invitado para evitar hitboxes desfasadas.
          updateRemoteOnlineProjectiles(dt);
          updateImpactParticles(dt);
        }
      } else if (game.state === "playing" && game.upgradeShopOpen) {
        updateUpgradePickup(dt);
      } else if (game.state === "playing" && isOnlineCoopPauseBlocking()) {
        mouse.down = false;
        mouse.rightDown = false;
        updateOnlineRevive(dt);
      }

      if (game.state === "gameOver") {
        if (!isOnlineMatchActive()) {
          game.gameOverTimer -= dt;
        }
        game.gameOverTextTimer += dt;

        if (!isOnlineMatchActive() && game.gameOverTimer <= 0) {
          game.state = "fadeOut";
          syncMobileControlsState();
        }
      }

      if (game.state === "fadeOut") {
        if (isOnlineMatchActive()) {
          game.fade = 0;
          game.state = "gameOver";
          syncMobileControlsState();
        } else {
          game.fade += dt * 3.2;

          if (game.fade >= 1) {
            game.fade = 1;
            resetRunAfterDeath();
            game.state = "fadeIn";
            syncMobileControlsState();
          }
        }
      }

      if (game.state === "fadeIn") {
        game.fade -= dt * 3.2;

        if (game.fade <= 0) {
          game.fade = 0;
          game.state = "playing";
          syncMobileControlsState();
        }
      }

      // UI de vidas dibujada en canvas.
    }

    function drawStageBackground() {
      ctx.fillStyle = "#050509";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Fondo exterior limpio: ondas ruby suaves, sin líneas diagonales rotadas.
      ctx.save();
      ctx.strokeStyle = "rgba(236,0,116,0.16)";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.38;
      const cx = canvas.width * 0.5;
      const cy = canvas.height * 0.5;
      const base = Math.max(canvas.width, canvas.height) * 0.18;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(cx, cy, base + i * 92 + Math.sin(game.time * 0.8 + i) * 8, 0.2, Math.PI * 1.25);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRoom() {
      ctx.save();

      const r = room.getRect();
      const mobileRoomView = isMobileLikeDevice();
      const wall = mobileRoomView ? 4 : 6;
      const x = Math.round(r.x);
      const y = Math.round(r.y);
      const w = Math.round(r.w);
      const h = Math.round(r.h);

      // Fondo base de la habitación.
      ctx.fillStyle = "#080b13";
      ctx.fillRect(x, y, w, h);

      // FIX GRID PERFECTA 3:
      // La grid vive dentro de la pared ruby y ahora soporta rectángulo real:
      // PC = 12x12, mobile = 18x12. Las celdas siguen siendo cuadradas.
      const cols = getRoomGridColumns();
      const rows = getRoomGridRows();
      const gridX = x + wall;
      const gridY = y + wall;
      const gridW = w - wall * 2;
      const gridH = h - wall * 2;
      const cell = Math.min(gridW / cols, gridH / rows);

      ctx.save();
      ctx.beginPath();
      // Clip con un pelín de margen para que ninguna línea toque visualmente la pared.
      ctx.rect(gridX + 1, gridY + 1, gridW - 2, gridH - 2);
      ctx.clip();

      ctx.strokeStyle = mobileRoomView ? "rgba(255,255,255,0.026)" : "rgba(255,255,255,0.038)";
      ctx.lineWidth = 1;
      ctx.lineCap = "butt";

      const startX = Math.round(gridX) + 1.5;
      const startY = Math.round(gridY) + 1.5;
      const endX = Math.round(gridX + gridW) - 0.5;
      const endY = Math.round(gridY + gridH) - 0.5;

      for (let i = 1; i < cols; i++) {
        const gx = Math.round(gridX + i * cell) + 0.5;
        ctx.beginPath();
        ctx.moveTo(gx, startY);
        ctx.lineTo(gx, endY);
        ctx.stroke();
      }

      for (let i = 1; i < rows; i++) {
        const gy = Math.round(gridY + i * cell) + 0.5;
        ctx.beginPath();
        ctx.moveTo(startX, gy);
        ctx.lineTo(endX, gy);
        ctx.stroke();
      }
      ctx.restore();

      // Borde sólido ruby por encima. Sin marco interno: ese marco era la línea molesta
      // que quedaba cerca de la pared.
      ctx.strokeStyle = game.ruby;
      ctx.lineWidth = wall;
      ctx.lineCap = "square";
      ctx.lineJoin = "miter";
      ctx.strokeRect(x, y, w, h);

      ctx.restore();
    }

    function drawDashBursts() {
      for (const burst of dashBursts) {
        const progress = 1 - burst.life / burst.maxLife;
        const alpha = 1 - progress;
        const radius = 16 + progress * 42;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = alpha * 0.72;
        ctx.strokeStyle = burst.color;
        ctx.lineWidth = 7 * alpha;
        ctx.beginPath();
        ctx.arc(burst.x, burst.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawDashTrail() {
      if (dashTrail.length < 1) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.globalCompositeOperation = "screen";

      for (const seg of dashTrail) {
        const t = seg.life / seg.maxLife;
        const alpha = t * 0.32;
        const width = 6 + 18 * t;
        const mx = (seg.x1 + seg.x2) / 2;
        const my = (seg.y1 + seg.y2) / 2;

        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.quadraticCurveTo(mx, my, seg.x2, seg.y2);
        ctx.strokeStyle = `rgba(66,223,255,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.quadraticCurveTo(mx, my, seg.x2, seg.y2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.42})`;
        ctx.lineWidth = Math.max(1, width * 0.22);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();

      if (player.downed) {
        ctx.globalAlpha = 0.48 + Math.sin(game.time * 8) * 0.08;
      } else if (player.hitTimer > 0 && Math.floor(game.time * 20) % 2 === 0) {
        ctx.globalAlpha = 0.35;
      }

      const size = 28;
      const angle = player.downed ? Math.PI / 4 : Math.atan2(mouse.y - player.y, mouse.x - player.x);
      const dashStretch = player.downed ? 1 : (player.dashTimer > 0 ? 1 + (player.dashTimer / player.dashDuration) * 0.48 : 1);

      // Aura circular eliminada: deja solo el cuadrado del jugador.

      ctx.translate(player.x, player.y);
      ctx.rotate(angle);
      ctx.scale(dashStretch, player.dashTimer > 0 ? 0.82 : 1);

      ctx.fillStyle = player.downed ? "rgba(66,223,255,0.42)" : (player.invincible ? "#ffffff" : "#42dfff");
      ctx.fillRect(-size / 2, -size / 2, size, size);

      ctx.fillStyle = "rgba(255,255,255,0.22)";
      ctx.fillRect(-size / 2, -size / 2, size, 6);

      ctx.restore();
    }

    function isPreciseAimLockedEnemy(enemy) {
      return !!game.preciseAimLockId &&
        isPreciseAimTargetValid(enemy) &&
        getPreciseAimTargetId(enemy) === game.preciseAimLockId;
    }

    function drawPreciseAimLockIndicator(enemy) {
      if (!isPreciseAimLockedEnemy(enemy)) return;
      if (!isPreciseFireHeld() && game.preciseAimReleaseTimer <= 0) return;

      const pulse = 0.5 + Math.sin(game.time * 12) * 0.5;
      const radius = enemy.size * (0.78 + pulse * 0.08) + 10;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = mobileInput.enabled ? 0.42 : 0.58;
      ctx.strokeStyle = "#42dfff";
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = mobileInput.enabled ? 0.18 : 0.24;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, radius + 5, -Math.PI * 0.12, Math.PI * 0.34);
      ctx.stroke();
      ctx.restore();
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        const hitFlash = enemy.hitFlash || 0;
        drawEnemySpawnWarning(enemy);
        drawPreciseAimLockIndicator(enemy);

        if (enemy.type === "kamikaze") {
          // Aura circular eliminada: deja solo la silueta del enemigo.

          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          ctx.fillStyle = hitFlash > 0 ? "#ffffff" : game.ruby;
          ctx.fillRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.restore();

          drawEnemyHealthBar(enemy, enemy.size + 14, 7, enemy.x - (enemy.size + 14) / 2, enemy.y + enemy.size / 2 + 12, "#42dfff");
        } else if (enemy.type === "shooter") {
          drawShooter(enemy, hitFlash);
        } else if (enemy.type === "pulser") {
          drawPulseCharge(enemy, game.ruby, 0.95);
          // Aura circular eliminada: deja solo la silueta del enemigo.

          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          ctx.fillStyle = "#15151f";
          ctx.fillRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : game.ruby;
          ctx.lineWidth = 5;
          ctx.strokeRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.rotate(-enemy.rotation * 1.7);
          ctx.strokeStyle = "rgba(236,0,116,0.55)";
          ctx.lineWidth = 3;
          ctx.strokeRect(-enemy.size * 0.28, -enemy.size * 0.28, enemy.size * 0.56, enemy.size * 0.56);
          ctx.restore();
          drawEnemyHealthBar(enemy, 92, 8, enemy.x - 46, enemy.y + enemy.size / 2 + 16, enemy.color || game.ruby);
        } else if (enemy.type === "duopulser") {
          const borderColor = enemy.color || "#ba0d7b";
          drawPulseCharge(enemy, borderColor, 1.0);
          // Aura circular eliminada: deja solo la silueta del enemigo.

          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          ctx.fillStyle = "#15151f";
          ctx.fillRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : borderColor;
          ctx.lineWidth = 5;
          ctx.strokeRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.rotate(-enemy.rotation * 1.7);
          ctx.strokeStyle = "rgba(186,13,123,0.55)";
          ctx.lineWidth = 3;
          ctx.strokeRect(-enemy.size * 0.28, -enemy.size * 0.28, enemy.size * 0.56, enemy.size * 0.56);
          ctx.restore();
          drawEnemyHealthBar(enemy, 108, 8, enemy.x - 54, enemy.y + enemy.size / 2 + 16, borderColor);
        } else if (enemy.type === "doupulser" || enemy.type === "doupulserFinal") {
          const finalBoss = enemy.type === "doupulserFinal";
          const borderColor = finalBoss ? getBoss19Color(enemy) : (enemy.color || "#f0024e");
          const innerStroke = finalBoss && enemy.hp <= 50 ? "rgba(146,0,47,0.70)" : "rgba(240,2,78,0.66)";
          drawPulseCharge(enemy, borderColor, 1.08);

          // Silueta nueva: boss más complejo, con capas y puntas. La fase final se ve más amenazante.
          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          const s = enemy.size;
          ctx.fillStyle = finalBoss ? "#210612" : "#180712";
          ctx.beginPath();
          ctx.moveTo(0, -s * 0.68);
          ctx.lineTo(s * 0.30, -s * 0.34);
          ctx.lineTo(s * 0.68, 0);
          ctx.lineTo(s * 0.30, s * 0.34);
          ctx.lineTo(0, s * 0.68);
          ctx.lineTo(-s * 0.30, s * 0.34);
          ctx.lineTo(-s * 0.68, 0);
          ctx.lineTo(-s * 0.30, -s * 0.34);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : borderColor;
          ctx.lineWidth = finalBoss ? 7 : 6;
          ctx.stroke();

          ctx.rotate(-enemy.rotation * 1.7);
          ctx.strokeStyle = innerStroke;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(0, -s * 0.33);
          ctx.lineTo(s * 0.33, 0);
          ctx.lineTo(0, s * 0.33);
          ctx.lineTo(-s * 0.33, 0);
          ctx.closePath();
          ctx.stroke();

          if (finalBoss) {
            ctx.rotate(game.time * 0.8);
            ctx.strokeStyle = "rgba(255,255,255,0.22)";
            ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
              ctx.rotate(Math.PI / 2);
              ctx.beginPath();
              ctx.moveTo(s * 0.42, -s * 0.08);
              ctx.lineTo(s * 0.58, 0);
              ctx.lineTo(s * 0.42, s * 0.08);
              ctx.stroke();
            }
          }
          ctx.restore();

          if (enemy.type === "doupulserFinal" && enemy.shieldHp > 0) {
            drawDoupulserShield(enemy);
          }
        } else if (enemy.type === "miniPulser") {
          drawPulseCharge(enemy, game.ruby, 1.0);
          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : game.ruby;
          ctx.lineWidth = 4;
          ctx.strokeRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
          ctx.restore();
          drawEnemyHealthBar(enemy, 50, 6, enemy.x - 25, enemy.y + enemy.size / 2 + 14, "#42dfff");
        } else if (enemy.type === "linebreaker") {
          drawLinebreaker(enemy, hitFlash);
          if (enemy.shieldHp > 0) drawLinebreakerShield(enemy);
        } else if (enemy.type === "secretBoss") {
          drawSecretBoss(enemy);
        } else if (enemy.type === "drouber") {
          drawDrouber(enemy);
        }
      }

      for (const pulse of enemyDeathPulses) {
        const progress = 1 - pulse.life / pulse.maxLife;
        const alpha = 1 - progress;
        const radius = 18 + progress * 50;

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = pulse.color || "#f797bf";
        ctx.lineWidth = 8 * alpha;
        ctx.beginPath();
        ctx.arc(pulse.x, pulse.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawShooter(enemy, hitFlash = 0) {
      const s = enemy.size;
      const outer = s;
      const inner = s * 0.58;
      const tubeW = s * 0.30;
      const tubeL = s * 0.46;
      const color = hitFlash > 0 ? "#ffffff" : game.ruby;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      // El cuerpo tiene el tubo abajo en local; rotamos para que ese tubo mire al jugador.
      ctx.rotate(enemy.rotation - Math.PI / 2);

      // Tubo/cañón.
      ctx.fillStyle = color;
      ctx.fillRect(-tubeW / 2, outer * 0.32, tubeW, tubeL);

      // Marco cuadrado exterior.
      ctx.fillStyle = color;
      ctx.fillRect(-outer / 2, -outer / 2, outer, outer);

      // Hueco interior negro para que parezca el sprite de referencia.
      ctx.fillStyle = "#050509";
      ctx.fillRect(-inner / 2, -inner / 2, inner, inner);

      // Pequeño centro para que se lea como enemigo shooter, sin glow.
      ctx.fillStyle = "rgba(236,0,116,0.28)";
      ctx.fillRect(-inner * 0.22, -inner * 0.22, inner * 0.44, inner * 0.44);

      ctx.restore();

      drawEnemyHealthBar(enemy, 56, 6, enemy.x - 28, enemy.y + enemy.size / 2 + 18, "#42dfff");
    }

    function drawDrouber(enemy) {
      const vertices = getDrouberVertices(enemy);
      const hitFlash = enemy.hitFlash || 0;

      // Rayos activos sólidos: sin screen/lighter y sin transparencia para que
      // cuando dos ataques se crucen no se aclare la intersección.
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.strokeStyle = game.ruby;
      ctx.lineWidth = enemy.rayWidth || 15;
      ctx.lineCap = "round";

      for (const vertex of vertices) {
        ctx.beginPath();
        ctx.moveTo(vertex.x, vertex.y);
        ctx.lineTo(
          vertex.x + Math.cos(vertex.angle) * (enemy.rayLength || 1200),
          vertex.y + Math.sin(vertex.angle) * (enemy.rayLength || 1200)
        );
        ctx.stroke();
      }
      ctx.restore();

      // Cuerpo del Drouber: vuelve a existir la función que se perdió en el parche anterior.
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.rotation || 0);
      ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : game.ruby;
      ctx.lineWidth = 5;
      drawDiamondOutline(enemy.size, 1);
      ctx.restore();

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.innerRotation || 0);
      ctx.strokeStyle = "rgba(236,0,116,0.8)";
      ctx.lineWidth = 3;
      drawDiamondOutline(enemy.size * 0.62, 1);
      ctx.restore();

      drawEnemyHealthBar(enemy, 92, 8, enemy.x - 46, enemy.y + enemy.size / 2 + 18, game.ruby);
    }

    function drawDiamondOutline(size, alpha = 1) {
      const half = size / 2;
      ctx.globalAlpha *= alpha;
      ctx.beginPath();
      ctx.moveTo(0, -half);
      ctx.lineTo(half, 0);
      ctx.lineTo(0, half);
      ctx.lineTo(-half, 0);
      ctx.closePath();
      ctx.stroke();
    }


    function drawDoupulserShield(enemy) {
      const shieldRadius = enemy.size * 0.92;
      const hpPercent = Math.max(0, enemy.shieldHp / enemy.shieldMaxHp);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#42dfff";
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, shieldRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.48;
      ctx.strokeStyle = "#42dfff";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, shieldRadius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      const barW = 86;
      const barH = 6;
      const barX = enemy.x - barW / 2;
      const barY = enemy.y - shieldRadius - 18;
      ctx.save();
      drawRoundedRect(barX, barY, barW, barH, barH / 2);
      ctx.fillStyle = "#0d2c36";
      ctx.fill();
      if (hpPercent > 0) {
        drawRoundedRect(barX, barY, barW * hpPercent, barH, barH / 2);
        ctx.fillStyle = "#42dfff";
        ctx.fill();
      }
      ctx.restore();
    }

    function drawSecretBoss(enemy) {
      const half = enemy.size / 2;
      const color = enemy.color || "#42ffca";
      const secondary = enemy.secondaryColor || "#7b5cff";
      const hitFlash = enemy.hitFlash || 0;

      // Aura circular eliminada: deja solo la silueta del enemigo.

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.rotation);
      ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : color;
      ctx.lineWidth = 6;
      ctx.strokeRect(-half, -half, enemy.size, enemy.size);
      ctx.restore();

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.innerRotation);
      ctx.globalAlpha = 0.72;
      ctx.strokeStyle = secondary;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, -half * 0.72);
      ctx.lineTo(half * 0.72, 0);
      ctx.lineTo(0, half * 0.72);
      ctx.lineTo(-half * 0.72, 0);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      drawEnemyHealthBar(enemy, 114, 9, enemy.x - 57, enemy.y + enemy.size / 2 + 18, color);
    }


    function drawHexagonPath(radius) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 3;
        const x = Math.cos(a) * radius;
        const y = Math.sin(a) * radius;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function drawLinebreakerShield(enemy) {
      const shieldRadius = enemy.size * 0.98;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.20;
      ctx.fillStyle = "#42dfff";
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, shieldRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawLinebreaker(enemy, hitFlash = 0) {
      sanitizeLinebreakerShield(enemy);
      const color = getLinebreakerColor(enemy);
      const s = enemy.size;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.rotation);

      ctx.fillStyle = enemy.phase2 ? "#24040f" : "#170711";
      drawHexagonPath(s * 0.55);
      ctx.fill();
      ctx.strokeStyle = hitFlash > 0 ? "#ffffff" : color;
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.rotate(-enemy.rotation + enemy.innerRotation);
      ctx.fillStyle = enemy.phase2 ? "rgba(146,0,47,0.18)" : "rgba(240,2,78,0.14)";
      drawHexagonPath(s * 0.30);
      ctx.fill();
      ctx.strokeStyle = enemy.phase2 ? "rgba(146,0,47,0.88)" : "rgba(240,2,78,0.82)";
      ctx.lineWidth = 4;
      ctx.stroke();

      // Cortes internos: mantiene la identidad de líneas ruby sin parecer otro Pulser.
      ctx.strokeStyle = enemy.phase2 ? "rgba(146,0,47,0.92)" : "rgba(240,2,78,0.86)";
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      for (let i = 0; i < 3; i++) {
        ctx.rotate(Math.PI / 3);
        ctx.beginPath();
        ctx.moveTo(-s * 0.35, 0);
        ctx.lineTo(s * 0.35, 0);
        ctx.stroke();
      }

      ctx.restore();
      drawEnemyHealthBar(enemy, 92, 8, enemy.x - 46, enemy.y + enemy.size / 2 + 18, game.ruby);
    }

    function drawBossHazards() {
      for (const hazard of bossHazards) {
        if (hazard.type === "linebreakerLaser") {
          const pos = getLinebreakerHazardPos(hazard);
          if (!Number.isFinite(pos) || !Number.isFinite(hazard.width) || hazard.width <= 0) continue;
          const screenPad = 120;
          const ax = hazard.axis === "h" ? -screenPad : pos;
          const ay = hazard.axis === "h" ? pos : -screenPad;
          const bx = hazard.axis === "h" ? canvas.width + screenPad : pos;
          const by = hazard.axis === "h" ? pos : canvas.height + screenPad;
          let alpha = 1;
          let width = hazard.width * 0.52;
          if (hazard.phase === "warning") {
            const p = clamp(hazard.timer / Math.max(0.001, hazard.warningTime), 0, 1);
            // Los AVISOS pueden ser transparentes; solo los ataques activos son sólidos.
            alpha = 0.18 + p * 0.20;
            width = hazard.width * (0.28 + p * 0.16);
          } else if (hazard.phase === "active") {
            alpha = 1;
            width = hazard.width;
          } else {
            alpha = Math.max(0, 1 - hazard.timer / Math.max(0.001, hazard.fadeTime));
            width = hazard.width * 0.78;
          }

          ctx.save();
          ctx.globalCompositeOperation = "source-over";
          ctx.lineCap = "butt";
          ctx.strokeStyle = hazard.color;
          ctx.globalAlpha = alpha;

          // Señal visible para barridos: como la línea arranca fuera de pantalla,
          // marcamos el borde desde donde va a entrar antes de que se mueva.
          if (hazard.phase === "warning" && hazard.isSweep) {
            const comingFromStart = hazard.fromPos < hazard.toPos;
            const signalPos = hazard.axis === "h"
              ? (comingFromStart ? 24 : canvas.height - 24)
              : (comingFromStart ? 24 : canvas.width - 24);
            const sax = hazard.axis === "h" ? -screenPad : signalPos;
            const say = hazard.axis === "h" ? signalPos : -screenPad;
            const sbx = hazard.axis === "h" ? canvas.width + screenPad : signalPos;
            const sby = hazard.axis === "h" ? signalPos : canvas.height + screenPad;
            ctx.lineWidth = Math.max(8, hazard.width * 0.30);
            ctx.beginPath();
            ctx.moveTo(sax, say);
            ctx.lineTo(sbx, sby);
            ctx.stroke();

            ctx.fillStyle = hazard.color;
            const arrow = 18;
            const midX = canvas.width / 2;
            const midY = canvas.height / 2;
            ctx.beginPath();
            if (hazard.axis === "h") {
              const dir = comingFromStart ? 1 : -1;
              ctx.moveTo(midX, signalPos + dir * arrow);
              ctx.lineTo(midX - arrow, signalPos - dir * 6);
              ctx.lineTo(midX + arrow, signalPos - dir * 6);
            } else {
              const dir = comingFromStart ? 1 : -1;
              ctx.moveTo(signalPos + dir * arrow, midY);
              ctx.lineTo(signalPos - dir * 6, midY - arrow);
              ctx.lineTo(signalPos - dir * 6, midY + arrow);
            }
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.stroke();
          }
          ctx.restore();
          continue;
        }

        if (hazard.type === "doupDroub") {
          const fadeTime = Math.max(0.001, hazard.fadeStart);
          const activeAlpha = 1;
          const warningProgress = hazard.warningDuration > 0 ? 1 - hazard.warningTimer / hazard.warningDuration : 1;
          const warningAlpha = 0.12 + Math.max(0, Math.min(1, warningProgress)) * 0.18;
          const alpha = hazard.warningTimer > 0 ? warningAlpha : activeAlpha;

          ctx.save();
          ctx.globalCompositeOperation = "source-over";
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = hazard.color;
          ctx.lineWidth = hazard.warningTimer > 0 ? hazard.rayWidth * 0.72 : hazard.rayWidth;
          ctx.lineCap = "round";

          for (let i = 0; i < hazard.rays; i++) {
            const angle = hazard.rotation - Math.PI / 2 + i * Math.PI * 2 / hazard.rays;
            ctx.beginPath();
            ctx.moveTo(hazard.x, hazard.y);
            ctx.lineTo(
              hazard.x + Math.cos(angle) * hazard.rayLength,
              hazard.y + Math.sin(angle) * hazard.rayLength
            );
            ctx.stroke();
          }

          ctx.restore();
          continue;
        }

        if (hazard.type === "doupBlaster") {
          let alpha = 0.2;
          if (hazard.phase === "active") alpha = 1;
          if (hazard.phase === "fade") alpha = Math.max(0, 1 - hazard.timer / hazard.fadeTime);

          ctx.save();
          ctx.globalCompositeOperation = "source-over";
          ctx.globalAlpha = alpha;
          ctx.fillStyle = hazard.color;
          ctx.beginPath();
          ctx.arc(hazard.x, hazard.y, hazard.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function drawHazards() {
      for (const ring of pulserRings) {
        const fadeAlpha = Math.max(0, Math.min(1, ring.life * 1.8));
        const alpha = fadeAlpha * (ring.alpha ?? 1);

        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = ring.color || game.ruby;
        ctx.lineWidth = ring.thickness;
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, Math.max(0, ring.radius), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      for (const p of projectiles) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.enemyProjectile ? (p.color || game.ruby) : "#42dfff";
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      }

      drawRemoteOnlineProjectiles();

      for (const p of impactParticles) {
        const alpha = Math.max(0, p.life / p.maxLife);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color || "#7eeaff";
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        ctx.restore();
      }
    }

    

    function lerpColor(hexA, hexB, t) {
      const a = parseInt(hexA.slice(1), 16);
      const b = parseInt(hexB.slice(1), 16);

      const ar = (a >> 16) & 255;
      const ag = (a >> 8) & 255;
      const ab = a & 255;

      const br = (b >> 16) & 255;
      const bg = (b >> 8) & 255;
      const bb = b & 255;

      const r = Math.round(ar + (br - ar) * t);
      const g = Math.round(ag + (bg - ag) * t);
      const bl = Math.round(ab + (bb - ab) * t);

      return `rgb(${r},${g},${bl})`;
    }

    function getMobileVitalsLayout() {
      // Mismo tamaño y mismo estilo que PC, solo reubicado en mobile:
      // arriba a la derecha, a la izquierda del botón de configuración.
      const settingsX = canvas.width - 16 - 48;
      const totalW = 200;
      const gapFromSettings = 16;
      const x = Math.max(10, settingsX - gapFromSettings - totalW - 20);
      const y = 16;
      return { x, y, totalW };
    }

    function drawLives() {
      if (mobileInput.enabled) {
        // EXACTAMENTE el mismo tamaño/estilo que PC, solo movido arriba a la derecha.
        const layout = getMobileVitalsLayout();
        // Más chicos que PC, pero ahora subidos 20% respecto al parche anterior.
        // Conservan los mismos centros/separación: solo cambia el radio, no el espaciado.
        const spacing = 70;
        const outerRadius = 23.5;
        const borderWidth = 3.4;
        const gap = 2.7;
        const radius = outerRadius - borderWidth - gap;
        const startX = layout.x + layout.totalW / 2 - spacing * (player.maxHp - 1) / 2;
        const y = layout.y + 88;

        ctx.save();
        ctx.globalAlpha *= Math.max(0, Math.min(1, game.touchControlsOpacity ?? 1));
        for (let i = 0; i < player.maxHp; i++) {
          const x = startX + i * spacing;
          const alive = i < player.hp;
          const fadeAmount = alive ? 0 : getLifeFadeAmount(i);

          const innerColor = alive
            ? game.ruby
            : lerpColor(game.ruby, "#4f102d", fadeAmount);

          const borderColor = alive
            ? game.ruby
            : lerpColor(game.ruby, "#351322", fadeAmount);

          ctx.beginPath();
          ctx.arc(x, y, outerRadius, 0, Math.PI * 2);
          ctx.fillStyle = "#230b18";
          ctx.fill();

          ctx.beginPath();
          ctx.arc(x, y, outerRadius, 0, Math.PI * 2);
          ctx.strokeStyle = borderColor;
          ctx.lineWidth = borderWidth;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = innerColor;
          ctx.fill();
        }

        for (const pulse of lifePulses) {
          const x = startX + pulse.index * spacing;
          const progress = 1 - pulse.life / pulse.maxLife;
          const alpha = 1 - progress;
          const size = 5 + progress * 19;
          const curve = size * 0.85;

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = "#f797bf";
          ctx.lineWidth = 5 * alpha;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          ctx.beginPath();
          ctx.moveTo(x, y - size);
          ctx.quadraticCurveTo(x + curve, y - curve, x + size, y);
          ctx.quadraticCurveTo(x + curve, y + curve, x, y + size);
          ctx.quadraticCurveTo(x - curve, y + curve, x - size, y);
          ctx.quadraticCurveTo(x - curve, y - curve, x, y - size);
          ctx.closePath();
          ctx.stroke();

          ctx.restore();
        }
        ctx.restore();
        return;
      }

      const startX = 52;
      const y = canvas.height - 118;
      const spacing = 70;
      const outerRadius = 28;
      const borderWidth = 4;
      const gap = 3.45;
      const radius = outerRadius - borderWidth - gap;

      for (let i = 0; i < player.maxHp; i++) {
        const x = startX + i * spacing;
        const alive = i < player.hp;
        const fadeAmount = alive ? 0 : getLifeFadeAmount(i);

        const innerColor = alive
          ? game.ruby
          : lerpColor(game.ruby, "#4f102d", fadeAmount);

        const borderColor = alive
          ? game.ruby
          : lerpColor(game.ruby, "#351322", fadeAmount);

        ctx.beginPath();
        ctx.arc(x, y, outerRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#230b18";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, outerRadius, 0, Math.PI * 2);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = innerColor;
        ctx.fill();
      }

      for (const pulse of lifePulses) {
        const x = startX + pulse.index * spacing;
        const progress = 1 - pulse.life / pulse.maxLife;
        const alpha = 1 - progress;
        const size = 7 + progress * 27;
        const curve = size * 0.85;

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "#f797bf";
        ctx.lineWidth = 7 * alpha;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(x, y - size);
        ctx.quadraticCurveTo(x + curve, y - curve, x + size, y);
        ctx.quadraticCurveTo(x + curve, y + curve, x, y + size);
        ctx.quadraticCurveTo(x - curve, y + curve, x - size, y);
        ctx.quadraticCurveTo(x - curve, y - curve, x, y - size);
        ctx.closePath();
        ctx.stroke();

        ctx.restore();
      }
    }

    function drawRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function getStaminaBarLayoutForXP() {
      if (mobileInput.enabled) {
        const layout = getMobileVitalsLayout();
        return { x: layout.x, y: layout.y, totalW: layout.totalW, outerH: 24, innerH: 12, outerLineW: 4 };
      }

      const livesStartX = 52;
      const livesSpacing = 70;
      const lifeRadius = 23;
      const x = livesStartX - lifeRadius - 7;
      const totalW = livesSpacing * (player.maxHp - 1) + (lifeRadius + 7) * 2;
      return { x, y: canvas.height - 38, totalW, outerH: 24, innerH: 12, outerLineW: 4 };
    }

    function drawXPBar() {
      const base = getStaminaBarLayoutForXP();
      const x = base.x;
      const totalW = base.totalW;
      const outerH = base.outerH;
      const innerH = base.innerH;
      const outerLineW = base.outerLineW;
      const y = mobileInput.enabled ? base.y + 31 : base.y - 31;
      const outerR = outerH / 2;
      const innerR = innerH / 2;
      const required = Math.max(1, game.xpRequired || 10);
      const fillPercent = Math.max(0, Math.min(1, (game.xpVisual ?? game.xp) / required));
      const backPercent = Math.max(0, Math.min(1, (game.xpBackVisual ?? game.xp) / required));
      const pulse = Math.max(0, Math.min(1, game.xpPulse || 0));

      ctx.save();
      if (mobileInput.enabled) ctx.globalAlpha *= Math.max(0, Math.min(1, game.touchControlsOpacity ?? 1));

      drawRoundedRect(x, y, totalW, outerH, outerR);
      ctx.fillStyle = "#08241d";
      ctx.fill();

      drawRoundedRect(x, y, totalW, outerH, outerR);
      ctx.strokeStyle = "#00ffbb";
      ctx.lineWidth = outerLineW + pulse * 0.8;
      ctx.stroke();

      const innerX = x + 7;
      const innerY = y + (outerH - innerH) / 2;
      const innerMaxW = totalW - 14;

      if (backPercent > 0) {
        ctx.save();
        drawRoundedRect(innerX, innerY, innerMaxW, innerH, innerR);
        ctx.clip();
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(innerX, innerY, innerMaxW * backPercent, innerH);
        ctx.restore();
      }

      if (fillPercent > 0) {
        ctx.save();
        drawRoundedRect(innerX, innerY, innerMaxW, innerH, innerR);
        ctx.clip();
        ctx.fillStyle = "#00ffbb";
        ctx.fillRect(innerX, innerY, innerMaxW * fillPercent, innerH);
        ctx.restore();
      }

      ctx.restore();
    }

    function getXPChoiceRects() {
      const compact = mobileInput.enabled || canvas.width < 900 || canvas.height < 540;
      const panelW = Math.min(compact ? 620 : 760, canvas.width - (compact ? 52 : 44));
      const panelH = Math.min(compact ? 300 : 360, canvas.height - (compact ? 72 : 58));
      const panelX = canvas.width / 2 - panelW / 2;
      const panelY = canvas.height / 2 - panelH / 2;
      const gap = compact ? 9 : 14;
      const horizontal = panelW > 520;
      const cardAreaX = panelX + (compact ? 18 : 24);
      const cardAreaY = panelY + (compact ? 82 : 96);

      if (horizontal) {
        const sidePad = compact ? 36 : 48;
        const cardW = (panelW - sidePad - gap * 2) / 3;
        const cardH = panelH - (compact ? 106 : 124);
        return {
          panel: { x: panelX, y: panelY, w: panelW, h: panelH },
          compact,
          cards: [0, 1, 2].map(i => ({ x: cardAreaX + i * (cardW + gap), y: cardAreaY, w: cardW, h: cardH })),
        };
      }

      const cardW = panelW - (compact ? 36 : 48);
      const cardH = (panelH - (compact ? 98 : 112) - gap * 2) / 3;
      return {
        panel: { x: panelX, y: panelY, w: panelW, h: panelH },
        compact,
        cards: [0, 1, 2].map(i => ({ x: cardAreaX, y: cardAreaY + i * (cardH + gap), w: cardW, h: cardH })),
      };
    }

    function handleXPChoiceClick(x, y) {
      const rects = getXPChoiceRects();
      for (let i = 0; i < rects.cards.length; i++) {
        const r = rects.cards[i];
        if (pointInRect(x, y, r)) {
          chooseXPUpgrade(i);
          return true;
        }
      }
      return false;
    }

    function drawXPChoiceUI() {
      if (!game.xpChoiceOpen) return;
      const rects = getXPChoiceRects();
      const panel = rects.panel;
      const mx = mouse.x;
      const my = mouse.y;
      const compact = !!rects.compact;
      const accent = game.ruby || "#ec0074";

      ctx.save();
      ctx.fillStyle = compact ? "rgba(0,0,0,0.68)" : "rgba(0,0,0,0.76)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.shadowColor = "rgba(236,0,116,0.22)";
      ctx.shadowBlur = compact ? 10 : 18;
      drawRoundedRect(panel.x, panel.y, panel.w, panel.h, compact ? 20 : 24);
      const gradient = ctx.createLinearGradient(panel.x, panel.y, panel.x, panel.y + panel.h);
      gradient.addColorStop(0, "#17111f");
      gradient.addColorStop(0.55, "#0d0b14");
      gradient.addColorStop(1, "#050508");
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.restore();

      drawRoundedRect(panel.x, panel.y, panel.w, panel.h, compact ? 20 : 24);
      ctx.strokeStyle = "rgba(236,0,116,0.94)";
      ctx.lineWidth = compact ? 3 : 4;
      ctx.stroke();

      drawRoundedRect(panel.x + 12, panel.y + 12, panel.w - 24, panel.h - 24, compact ? 15 : 18);
      ctx.strokeStyle = "rgba(236,0,116,0.18)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.save();
      ctx.fillStyle = "rgba(236,0,116,0.20)";
      ctx.fillRect(panel.x + 16, panel.y + 16, 5, panel.h - 32);
      ctx.restore();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `950 ${compact ? 20 : 27}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.fillText("SUBIDA DE NIVEL", panel.x + panel.w / 2, panel.y + (compact ? 28 : 36));

      ctx.font = `900 ${compact ? 10 : 12}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = "rgba(236,0,116,0.92)";
      ctx.fillText("ELEGÍ UNA MEJORA", panel.x + panel.w / 2, panel.y + (compact ? 52 : 62));

      for (let i = 0; i < rects.cards.length; i++) {
        const r = rects.cards[i];
        const upgrade = game.xpChoices[i];
        const locked = upgrade ? isRogueUpgradeLocked(upgrade) : true;
        const hover = !locked && pointInRect(mx, my, r) && !mobileInput.enabled;
        const anim = hover ? 1 : 0;
        const lift = anim * (compact ? 3 : 6);
        const scalePad = anim * (compact ? 3 : 6);
        const rx = r.x - scalePad / 2;
        const ry = r.y - lift - scalePad / 2;
        const rw = r.w + scalePad;
        const rh = r.h + scalePad;
        const radius = compact ? 14 : 18;

        ctx.save();
        if (hover) {
          ctx.shadowColor = "rgba(236,0,116,0.30)";
          ctx.shadowBlur = 16;
          ctx.shadowOffsetY = 4;
        }

        drawRoundedRect(rx, ry, rw, rh, radius);
        const cg = ctx.createLinearGradient(rx, ry, rx, ry + rh);
        if (locked) {
          cg.addColorStop(0, "rgba(13,13,20,0.98)");
          cg.addColorStop(1, "rgba(6,6,10,0.98)");
        } else if (hover) {
          cg.addColorStop(0, "rgba(50,9,34,0.99)");
          cg.addColorStop(0.55, "rgba(30,7,24,0.99)");
          cg.addColorStop(1, "rgba(10,6,11,0.99)");
        } else {
          cg.addColorStop(0, "rgba(26,8,22,0.98)");
          cg.addColorStop(1, "rgba(8,7,12,0.98)");
        }
        ctx.fillStyle = cg;
        ctx.fill();

        drawRoundedRect(rx, ry, rw, rh, radius);
        ctx.strokeStyle = locked ? "rgba(255,255,255,0.16)" : "rgba(236,0,116,0.92)";
        ctx.lineWidth = hover ? 3.6 : (compact ? 2.2 : 2.7);
        ctx.stroke();

        drawRoundedRect(rx + 7, ry + 7, rw - 14, rh - 14, Math.max(8, radius - 6));
        ctx.strokeStyle = locked ? "rgba(255,255,255,0.055)" : "rgba(236,0,116,0.22)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();

        if (!upgrade) continue;

        const titleY = ry + (compact ? Math.min(25, rh * 0.25) : Math.min(36, rh * 0.24));
        const descY = ry + (compact ? Math.min(48, rh * 0.42) : Math.min(72, rh * 0.44));
        const footY = ry + rh - (compact ? 16 : 24);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `950 ${compact ? 11 : 15}px Inter, Segoe UI, Arial, sans-serif`;
        ctx.fillStyle = locked ? "rgba(255,255,255,0.35)" : "rgba(255,255,255,0.95)";
        ctx.fillText((locked ? "🔒 " : "") + upgrade.title.toUpperCase(), rx + rw / 2, titleY);

        ctx.font = `750 ${compact ? 9 : 11}px Inter, Segoe UI, Arial, sans-serif`;
        ctx.fillStyle = locked ? "rgba(255,255,255,0.28)" : "rgba(255,255,255,0.70)";
        wrapCanvasText(upgrade.desc, rx + (compact ? 12 : 18), descY, rw - (compact ? 24 : 36), compact ? 12 : 15);

        ctx.font = `950 ${compact ? 9 : 11}px Inter, Segoe UI, Arial, sans-serif`;
        ctx.fillStyle = locked ? "#ff5572" : (hover ? "#ffffff" : "rgba(236,0,116,0.96)");
        ctx.fillText(locked ? getRogueUpgradeLockLabel(upgrade) : "SELECCIONAR", rx + rw / 2, footY);
      }

      ctx.restore();
    }

    function wrapCanvasText(text, x, y, maxWidth, lineHeight) {
      const words = String(text).split(" ");
      let line = "";
      let yy = y;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + " ";
        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
          ctx.fillText(line.trim(), x + maxWidth / 2, yy);
          line = words[n] + " ";
          yy += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line.trim(), x + maxWidth / 2, yy);
    }

    function drawStaminaBar() {
      let x, y, totalW, outerH, innerH, outerLineW;

      if (mobileInput.enabled) {
        // EXACTAMENTE el mismo tamaño/estilo que PC, solo movido arriba a la derecha.
        const layout = getMobileVitalsLayout();
        x = layout.x;
        y = layout.y;
        totalW = layout.totalW;
        outerH = 24;
        innerH = 12;
        outerLineW = 4;
      } else {
        const livesStartX = 52;
        const livesSpacing = 70;
        const lifeRadius = 23;
        x = livesStartX - lifeRadius - 7;
        totalW = livesSpacing * (player.maxHp - 1) + (lifeRadius + 7) * 2;
        outerH = 24;
        innerH = 12;
        y = canvas.height - 38;
        outerLineW = 4;
      }

      const outerR = outerH / 2;
      const innerR = innerH / 2;
      const fillPercent = Math.max(0, Math.min(1, player.staminaVisual / player.staminaSegments));

      ctx.save();
      if (mobileInput.enabled) {
        ctx.globalAlpha *= Math.max(0, Math.min(1, game.touchControlsOpacity ?? 1));
      }

      drawRoundedRect(x, y, totalW, outerH, outerR);
      ctx.fillStyle = "#0d2c36";
      ctx.fill();

      drawRoundedRect(x, y, totalW, outerH, outerR);
      ctx.strokeStyle = "#42dfff";
      ctx.lineWidth = outerLineW;
      ctx.stroke();

      if (fillPercent > 0) {
        const innerX = x + 7;
        const innerY = y + (outerH - innerH) / 2;
        const innerMaxW = totalW - 14;
        const innerFillW = Math.max(0, innerMaxW * fillPercent);

        ctx.save();
        drawRoundedRect(innerX, innerY, innerMaxW, innerH, innerR);
        ctx.clip();
        ctx.fillStyle = "#42dfff";
        ctx.fillRect(innerX, innerY, innerFillW, innerH);
        ctx.restore();
      }

      ctx.restore();
    }

    function isPortraitMenuLayout() {
      return canvas.width < canvas.height * 0.78;
    }

    function isCompactLandscapeMenuLayout() {
      return !isPortraitMenuLayout() && (canvas.height < 520 || canvas.width < 920);
    }

    function getMenuLeftPanelRect() {
      const portrait = isPortraitMenuLayout();
      const compactLandscape = isCompactLandscapeMenuLayout();

      if (portrait) {
        const w = Math.min(canvas.width - 34, 430);
        const h = Math.min(canvas.height - 38, 360);
        return {
          x: canvas.width / 2 - w / 2,
          y: 28,
          w,
          h,
        };
      }

      if (compactLandscape) {
        const w = Math.min(380, canvas.width * 0.46);
        const h = Math.min(canvas.height - 34, 340);
        return {
          x: 28,
          y: canvas.height / 2 - h / 2,
          w,
          h,
        };
      }

      const w = Math.min(480, Math.max(410, canvas.width * 0.28));
      const h = Math.min(560, Math.max(470, canvas.height * 0.58));
      return {
        x: Math.max(78, canvas.width * 0.065),
        y: canvas.height / 2 - h / 2,
        w,
        h,
      };
    }

    function getMenuRoomPanelRect() {
      const portrait = isPortraitMenuLayout();
      const compactLandscape = isCompactLandscapeMenuLayout();

      if (portrait) {
        const w = Math.min(canvas.width - 28, 470);
        const h = Math.min(canvas.height - 36, 440);
        return { x: canvas.width / 2 - w / 2, y: canvas.height / 2 - h / 2, w, h };
      }

      const margin = compactLandscape ? 28 : 52;
      const w = Math.min(canvas.width - margin * 2, compactLandscape ? 560 : 680);
      const h = Math.min(canvas.height - margin * 2, compactLandscape ? 430 : 560);
      return { x: canvas.width / 2 - w / 2, y: canvas.height / 2 - h / 2, w, h };
    }

    function getMenuButtonRects() {
      const portrait = isPortraitMenuLayout();
      const compactLandscape = isCompactLandscapeMenuLayout();
      const panel = getMenuLeftPanelRect();
      const w = portrait ? Math.min(panel.w - 52, 300) : (compactLandscape ? Math.min(panel.w - 48, 220) : Math.min(panel.w - 80, 330));
      const h = portrait ? 44 : (compactLandscape ? 38 : 54);
      const gap = portrait ? 10 : (compactLandscape ? 10 : 14);
      const x = panel.x + panel.w / 2 - w / 2;
      const y = portrait ? panel.y + 184 : (compactLandscape ? panel.y + panel.h - h * 3 - gap * 2 - 24 : panel.y + panel.h - h * 3 - gap * 2 - 48);

      return {
        play: { x, y, w, h },
        multiplayer: { x, y: y + h + gap, w, h },
        settings: { x, y: y + (h + gap) * 2, w, h },
      };
    }

    function pointInRect(x, y, rect) {
      return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    function handleMenuClick(x, y) {
      const buttons = getMenuButtonRects();

      if (game.settingsOpen) {
        const panel = getSettingsPanelRect();
        if (pointInRect(x, y, panel)) return handleSettingsClick(x, y);
        game.settingsOpen = false;
        settingsCheatInput.blur();
        syncSettingsCheatBox();
        clearInputs();
        return true;
      }

      if (game.menuMode === "multiplayer") {
        const mp = getMultiplayerButtonRects();
        if (pointInRect(x, y, mp.createNormal || mp.create)) { createMultiplayerRoom("normal"); return true; }
        if (mp.createVersus && pointInRect(x, y, mp.createVersus)) { createMultiplayerRoom("versus"); return true; }
        if (pointInRect(x, y, mp.join)) { setMenuMode("joinRoom"); setTimeout(() => roomCodeInput.focus(), 50); return true; }
        if (pointInRect(x, y, mp.back)) { setMenuMode("main"); return true; }
        return false;
      }

      if (game.menuMode === "joinRoom") {
        const jr = getJoinRoomButtonRects();
        if (pointInRect(x, y, jr.cancel)) { roomCodeInput.value = ""; setMenuMode("multiplayer"); return true; }
        return true;
      }

      if (game.menuMode === "roomLobby") {
        if (handleVersusConfigClick(x, y)) return true;
        const lb = getRoomLobbyButtonRects();
        if (game.multiplayer.isHost && pointInRect(x, y, lb.start)) {
          startOnlineRoomGame();
          return true;
        }
        if (pointInRect(x, y, lb.cancel)) { leaveMultiplayerRoom(); return true; }
        return true;
      }

      if (pointInRect(x, y, buttons.play)) {
        startGame();
        return true;
      }

      if (pointInRect(x, y, buttons.multiplayer)) {
        setMenuMode("multiplayer");
        return true;
      }

      if (pointInRect(x, y, buttons.settings)) {
        game.settingsOpen = true;
        clearInputs();
        return true;
      }

      return false;
    }

    function drawMenuBackground() {
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, "#030307");
      bg.addColorStop(0.48, "#070711");
      bg.addColorStop(1, "#020204");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = "rgba(236,0,116,0.16)";
      ctx.lineWidth = 1.1;
      const grid = isCompactLandscapeMenuLayout() ? 56 : 64;
      const drift = (game.time * 5) % grid;
      for (let x = -grid + drift; x < canvas.width + grid; x += grid) {
        ctx.beginPath();
        ctx.moveTo(Math.round(x) + 0.5, 0);
        ctx.lineTo(Math.round(x) + 0.5, canvas.height);
        ctx.stroke();
      }
      for (let y = -grid; y < canvas.height + grid; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y) + 0.5);
        ctx.lineTo(canvas.width, Math.round(y) + 0.5);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.22;
      const orb = ctx.createRadialGradient(canvas.width * 0.72, canvas.height * 0.44, 10, canvas.width * 0.72, canvas.height * 0.44, Math.max(canvas.width, canvas.height) * 0.46);
      orb.addColorStop(0, "rgba(236,0,116,0.20)");
      orb.addColorStop(0.42, "rgba(236,0,116,0.055)");
      orb.addColorStop(1, "rgba(236,0,116,0)");
      ctx.fillStyle = orb;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.16;
      ctx.strokeStyle = "rgba(236,0,116,0.55)";
      ctx.lineWidth = 2;
      const baseX = canvas.width * 0.58;
      const baseY = canvas.height * 0.54;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(baseX, baseY, 190 + i * 120 + Math.sin(game.time * 0.28 + i) * 8, -0.28, Math.PI * 1.05);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "rgba(236,0,116,0.35)";
      ctx.beginPath();
      ctx.moveTo(canvas.width * 0.05, canvas.height);
      ctx.lineTo(canvas.width * 0.20, canvas.height);
      ctx.lineTo(canvas.width * 0.36, 0);
      ctx.lineTo(canvas.width * 0.30, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      const vignette = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.10, canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.72);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,0.78)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawMenuButton(rect, label, primary = false) {
      ctx.save();
      const hovered = mouse.x >= rect.x && mouse.x <= rect.x + rect.w && mouse.y >= rect.y && mouse.y <= rect.y + rect.h;
      const lift = hovered ? -2 : 0;
      const r = Math.min(18, rect.h * 0.36);

      drawRoundedRect(rect.x, rect.y + lift, rect.w, rect.h, r);
      const g = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
      if (primary) {
        g.addColorStop(0, hovered ? "#ff118a" : "#ec0074");
        g.addColorStop(0.55, "#a80054");
        g.addColorStop(1, "#350018");
      } else {
        g.addColorStop(0, hovered ? "rgba(28,18,34,0.98)" : "rgba(15,14,23,0.96)");
        g.addColorStop(1, "rgba(5,5,10,0.98)");
      }
      ctx.fillStyle = g;
      ctx.fill();

      ctx.strokeStyle = primary ? "rgba(255,255,255,0.16)" : "rgba(236,0,116,0.88)";
      ctx.lineWidth = primary ? 2 : 3;
      ctx.stroke();

      ctx.save();
      drawRoundedRect(rect.x + 6, rect.y + lift + 6, rect.w - 12, rect.h - 12, Math.max(8, r - 6));
      ctx.strokeStyle = primary ? "rgba(255,255,255,0.16)" : "rgba(236,0,116,0.28)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      ctx.font = `950 ${rect.h >= 56 ? 21 : 17}px Inter, Segoe UI, Arial, Helvetica, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = primary ? "rgba(255,255,255,0.98)" : "rgba(255,255,255,0.88)";
      ctx.fillText(label, rect.x + rect.w / 2, rect.y + lift + rect.h / 2);

      if (primary) {
        ctx.globalAlpha = hovered ? 0.55 : 0.38;
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.beginPath();
        ctx.moveTo(rect.x + rect.w - 42, rect.y + lift + rect.h / 2 - 8);
        ctx.lineTo(rect.x + rect.w - 25, rect.y + lift + rect.h / 2);
        ctx.lineTo(rect.x + rect.w - 42, rect.y + lift + rect.h / 2 + 8);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();
    }

    function drawMenuPreview() {
      const portrait = isPortraitMenuLayout();
      const compactLandscape = isCompactLandscapeMenuLayout();
      const left = getMenuLeftPanelRect();
      const buttons = getMenuButtonRects();
      const w = portrait ? Math.min(canvas.width - 36, 430) : (compactLandscape ? Math.min(410, canvas.width - left.x - left.w - 46) : Math.min(790, canvas.width * 0.45));
      const h = portrait ? Math.min(230, Math.max(170, w * 0.56)) : (compactLandscape ? Math.min(250, canvas.height - 72) : Math.min(470, w * 0.58));
      const x = portrait ? canvas.width / 2 - w / 2 : (compactLandscape ? canvas.width - w - 28 : canvas.width - w - Math.max(80, canvas.width * 0.055));
      const y = portrait ? buttons.settings.y + buttons.settings.h + 24 : (compactLandscape ? canvas.height / 2 - h / 2 : canvas.height / 2 - h / 2);

      ctx.save();
      ctx.shadowColor = "rgba(236,0,116,0.24)";
      ctx.shadowBlur = 24;
      drawRoundedRect(x, y, w, h, 24);
      ctx.fillStyle = "#0c0c15";
      ctx.fill();
      ctx.restore();

      drawRoundedRect(x, y, w, h, 24);
      ctx.strokeStyle = "rgba(236,0,116,0.95)";
      ctx.lineWidth = 4;
      ctx.stroke();

      const headerH = Math.max(34, Math.min(46, h * 0.12));
      ctx.save();
      drawRoundedRect(x + 10, y + 10, w - 20, h - 20, 16);
      ctx.clip();
      const inner = ctx.createLinearGradient(x, y, x + w, y + h);
      inner.addColorStop(0, "#151522");
      inner.addColorStop(0.62, "#0a0b13");
      inner.addColorStop(1, "#05060b");
      ctx.fillStyle = inner;
      ctx.fillRect(x + 10, y + 10, w - 20, h - 20);

      ctx.fillStyle = "rgba(236,0,116,0.14)";
      ctx.fillRect(x + 10, y + 10, w - 20, headerH);
      ctx.fillStyle = "rgba(255,255,255,0.74)";
      ctx.font = `900 ${Math.max(10, Math.min(13, w * 0.018))}px Inter, Segoe UI, Arial, Helvetica, sans-serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("ARENA PREVIEW", x + 28, y + 10 + headerH / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = "rgba(66,223,255,0.74)";
      ctx.fillText("WAVE SIM", x + w - 28, y + 10 + headerH / 2);

      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      const grid = Math.max(30, Math.round(w / 12));
      for (let gx = x + 10; gx <= x + w - 10; gx += grid) {
        ctx.beginPath();
        ctx.moveTo(Math.round(gx) + 0.5, y + 10 + headerH);
        ctx.lineTo(Math.round(gx) + 0.5, y + h - 10);
        ctx.stroke();
      }
      for (let gy = y + 10 + headerH; gy <= y + h - 10; gy += grid) {
        ctx.beginPath();
        ctx.moveTo(x + 10, Math.round(gy) + 0.5);
        ctx.lineTo(x + w - 10, Math.round(gy) + 0.5);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      const px = x + w * 0.50;
      const py = y + h * 0.57;
      ctx.strokeStyle = "rgba(66,223,255,0.24)";
      ctx.lineWidth = Math.max(9, w * 0.020);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(px - w * 0.30, py + h * 0.22);
      ctx.quadraticCurveTo(px - w * 0.12, py - h * 0.02, px, py);
      ctx.stroke();

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(Math.PI / 4 + game.time * 0.75);
      ctx.fillStyle = "#42dfff";
      ctx.fillRect(-14, -14, 28, 28);
      ctx.restore();

      ctx.save();
      ctx.translate(x + w * 0.73, y + h * 0.40);
      ctx.rotate(Math.PI / 4 + game.time * 1.15);
      ctx.fillStyle = game.ruby;
      ctx.fillRect(-18, -18, 36, 36);
      ctx.restore();

      for (let i = 0; i < 3; i++) {
        ctx.save();
        ctx.translate(x + w * 0.13 + i * w * 0.095, y + h * 0.82);
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(20,5,14,0.92)";
        ctx.fill();
        ctx.strokeStyle = game.ruby;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(236,0,116,0.88)";
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
    }

      const rect = canvas.getBoundingClientRect();
      const sx = rect.width / Math.max(1, canvas.width);
      const sy = rect.height / Math.max(1, canvas.height);

      roomCodeBox.style.left = `${Math.round(rect.left + x * sx)}px`;
      roomCodeBox.style.top = `${Math.round(rect.top + y * sy)}px`;
      roomCodeBox.style.width = `${Math.round(w * sx)}px`;
      roomCodeBox.style.transformOrigin = "top left";

    function getVersusConfigPanelRect(roomPanel = getMenuRoomPanelRect()) {
      if (game.multiplayer?.roomMode !== "versus") return null;
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      if (portrait) {
        return { x: roomPanel.x + 18, y: roomPanel.y + 18, w: Math.min(roomPanel.w - 36, 420), h: 140 };
      }
      const gap = compact ? 12 : 18;
      const w = Math.max(240, Math.min(330, roomPanel.x - gap - 24));
      const h = compact ? 286 : 332;
      return { x: Math.max(18, roomPanel.x - gap - w), y: roomPanel.y + (compact ? 8 : 28), w, h };
    }

    function getVersusConfigButtonRects(panel = getVersusConfigPanelRect()) {
      if (!panel) return {};
      const compact = isCompactLandscapeMenuLayout() || isPortraitMenuLayout();
      const pad = compact ? 12 : 16;
      const rowH = compact ? 28 : 34;
      const gap = compact ? 8 : 10;
      let y = panel.y + (compact ? 48 : 58);
      const x = panel.x + pad;
      const w = panel.w - pad * 2;
      const split2 = (yy) => {
        const bw = (w - gap) / 2;
        return [{ x, y: yy, w: bw, h: rowH }, { x: x + bw + gap, y: yy, w: bw, h: rowH }];
      };
      const split3 = (yy) => {
        const bw = (w - gap * 2) / 3;
        return [{ x, y: yy, w: bw, h: rowH }, { x: x + bw + gap, y: yy, w: bw, h: rowH }, { x: x + (bw + gap) * 2, y: yy, w: bw, h: rowH }];
      };
      const weapon = split2(y); y += rowH + (compact ? 24 : 28);
      const ability = split2(y); y += rowH + (compact ? 24 : 28);
      const lives = split3(y); y += rowH + (compact ? 24 : 28);
      const scoreMinus = { x, y, w: rowH, h: rowH };
      const scorePlus = { x: x + w - rowH, y, w: rowH, h: rowH };
      const scoreBox = { x: scoreMinus.x + rowH + gap, y, w: w - rowH * 2 - gap * 2, h: rowH };
      return { weapon, ability, lives, scoreMinus, scorePlus, scoreBox };
    }

    function handleVersusConfigClick(x, y) {
      if (game.menuMode !== "roomLobby" || game.multiplayer?.roomMode !== "versus") return false;
      const panel = getVersusConfigPanelRect();
      if (!panel || !pointInRect(x, y, panel)) return false;
      if (!game.multiplayer.isHost) return true;
      const r = getVersusConfigButtonRects(panel);
      const cfg = getOnlineVersusConfig();
      if (pointInRect(x, y, r.weapon?.[0])) { setOnlineVersusConfig({ weapon: "multiShot" }); return true; }
      if (pointInRect(x, y, r.weapon?.[1])) { setOnlineVersusConfig({ weapon: "normal" }); return true; }
      if (pointInRect(x, y, r.ability?.[0])) { setOnlineVersusConfig({ ability: "pulsador" }); return true; }
      if (pointInRect(x, y, r.ability?.[1])) { setOnlineVersusConfig({ ability: "curador" }); return true; }
      for (let i = 0; i < (r.lives || []).length; i++) {
        if (pointInRect(x, y, r.lives[i])) { setOnlineVersusConfig({ lives: [3,5,7][i] }); return true; }
      }
      if (pointInRect(x, y, r.scoreMinus)) { setOnlineVersusConfig({ targetScore: Math.max(1, cfg.targetScore - 1) }); return true; }
      if (pointInRect(x, y, r.scorePlus)) { setOnlineVersusConfig({ targetScore: Math.min(100, cfg.targetScore + 1) }); return true; }
      if (pointInRect(x, y, r.scoreBox)) {
        const raw = window.prompt("Puntos para terminar el versus (1-100):", String(cfg.targetScore));
        if (raw !== null) {
          const value = clamp(Math.floor(Number(raw) || cfg.targetScore), 1, 100);
          setOnlineVersusConfig({ targetScore: value });
        }
        return true;
      }
      return true;
    }

      drawVersusConfigOption(r.scoreMinus, "−", false, !host);
      drawVersusConfigOption(r.scorePlus, "+", false, !host);
      drawVersusConfigOption(r.scoreBox, String(cfg.targetScore), true, !host);

      ctx.font = "750 8px Inter, Segoe UI, Arial, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.34)";
      ctx.textAlign = "center";
      ctx.fillText("click para ingresar", r.scoreBox.x + r.scoreBox.w / 2, r.scoreBox.y + r.scoreBox.h + 10);

      ctx.textAlign = "left";
      ctx.font = "850 9px Inter, Segoe UI, Arial, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.42)";

      ctx.restore();

    function drawMainMenu() {
