<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050509" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Dungeon Shapes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Roguelike Room Base</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050509;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: white;
      letter-spacing: 0.01em;
    }

    html.ios-fullscreen-fallback,
    body.ios-fullscreen-fallback {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--ios-app-height, 100dvh);
      min-height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      background: #050509;
    }

    body.ios-fullscreen-fallback canvas,
    body.ios-fullscreen-fallback #mobile-controls {
      width: 100vw;
      height: var(--ios-app-height, 100dvh);
      min-height: -webkit-fill-available;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: radial-gradient(circle at center, #151524 0%, #080812 48%, #050509 100%);
      outline: none;
      touch-action: none;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      font-size: 14px;
      color: #ddd;
      pointer-events: none;
      text-shadow: 0 0 8px #000;
    }

    #title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    #settings-cheat-box {
      position: fixed;
      z-index: 40;
      display: none;
      align-items: center;
      gap: 10px;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      pointer-events: auto;
    }

    #settings-cheat-input {
      width: 230px;
      height: 38px;
      border: 2px solid rgba(236, 0, 116, 0.78);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(14, 16, 26, 0.98), rgba(7, 8, 14, 0.98));
      color: rgba(255, 255, 255, 0.94);
      outline: none;
      padding: 0 13px;
      font: 800 14px Inter, "Segoe UI", Arial, sans-serif;
      box-shadow: 0 0 18px rgba(236, 0, 116, 0.18);
    }

    #settings-cheat-input::placeholder {
      color: rgba(255, 255, 255, 0.32);
    }

    #settings-cheat-apply {
      height: 38px;
      min-width: 98px;
      border: 2px solid #ec0074;
      border-radius: 16px;
      background: linear-gradient(180deg, #321124, #180812);
      color: rgba(255, 255, 255, 0.94);
      cursor: pointer;
      font: 900 13px Inter, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0.04em;
      box-shadow: 0 0 18px rgba(236, 0, 116, 0.22);
    }

    #settings-cheat-apply:active {
      transform: translateY(1px);
    }


    #mobile-controls {
      --touch-ruby: #ec0074;
      --touch-ruby-soft: rgba(236, 0, 116, 0.18);
      --touch-ruby-mid: rgba(236, 0, 116, 0.62);
      --touch-cyan: #42dfff;
      --touch-cyan-soft: rgba(66, 223, 255, 0.18);
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      pointer-events: none;
      touch-action: none;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      opacity: var(--touch-controls-opacity, 1);
      filter: saturate(0.92);
    }

    body.mobile-enabled.show-mobile-controls #mobile-controls {
      display: block;
    }

    body.game-over-screen #mobile-controls,
    body.game-over-screen #settings-cheat-box {
      display: none !important;
    }

    body.versus-mode #touch-skip-wave,
    body.versus-mode #touch-special1,
    body.versus-mode #touch-revive {
      display: none !important;
    }

    .touch-button,
    #touch-joystick-base {
      position: absolute;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #touch-joystick-base {
      left: 28px;
      bottom: 28px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 2px solid rgba(236, 0, 116, 0.52);
      background:
        radial-gradient(circle at 50% 50%, rgba(236,0,116,0.18), rgba(236,0,116,0.05) 58%, rgba(6,8,14,0.36) 100%);
      box-shadow:
        0 8px 30px rgba(0,0,0,0.24),
        0 0 18px rgba(236,0,116,0.14),
        inset 0 0 18px rgba(236,0,116,0.10);
    }

    #touch-joystick-knob {
      position: absolute;
      left: 42px;
      top: 42px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(236,0,116,0.88));
      box-shadow: 0 8px 24px rgba(0,0,0,0.28), 0 0 18px rgba(236,0,116,0.42);
      transform: translate(0px, 0px);
    }

    .touch-button {
      right: 24px;
      width: 82px;
      height: 82px;
      border-radius: 22px;
      border: 2px solid rgba(236, 0, 116, 0.58);
      background: linear-gradient(180deg, rgba(29,9,24,0.76), rgba(10,9,16,0.58));
      color: rgba(255,255,255,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      font-size: 11px;
      line-height: 1.06;
      letter-spacing: 0.045em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.65);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.26),
        0 0 16px rgba(236,0,116,0.12),
        inset 0 0 14px rgba(236,0,116,0.08);
    }

    #touch-fire-left {
      right: 22px;
      bottom: 28px;
      width: 100px;
      height: 100px;
      border-radius: 30px;
      border-color: rgba(236, 0, 116, 0.82);
      background: linear-gradient(180deg, rgba(52,8,31,0.82), rgba(15,8,18,0.68));
      box-shadow:
        0 10px 28px rgba(0,0,0,0.28),
        0 0 24px rgba(236,0,116,0.18),
        inset 0 0 18px rgba(236,0,116,0.12);
    }

    /* Único botón celeste de la UI mobile. */
    #touch-fire-right {
      right: 136px;
      bottom: 50px;
      width: 74px;
      height: 74px;
      border-radius: 22px;
      border-color: rgba(66, 223, 255, 0.76);
      background: linear-gradient(180deg, rgba(7,30,38,0.74), rgba(5,12,18,0.58));
      box-shadow:
        0 10px 24px rgba(0,0,0,0.24),
        0 0 20px rgba(66,223,255,0.18),
        inset 0 0 14px rgba(66,223,255,0.10);
    }

    #touch-dash {
      right: 76px;
      bottom: 148px;
      width: 74px;
      height: 74px;
      border-radius: 22px;
      border-color: rgba(236, 0, 116, 0.70);
    }

    #touch-fullscreen,
    #touch-restart,
    #touch-settings,
    #touch-skip-wave,
    #touch-special1 {
      width: 118px;
      height: 46px;
      border-radius: 17px;
      font-size: 10.5px;
    }

    #touch-fullscreen {
      right: 24px;
      top: 22px;
      border-color: rgba(236, 0, 116, 0.74);
      background: rgba(31, 8, 24, 0.72);
    }

    #touch-restart {
      right: 24px;
      top: 22px;
      border-color: rgba(236, 0, 116, 0.74);
      background: rgba(31, 8, 24, 0.70);
    }

    #touch-settings {
      right: 154px;
      top: 22px;
      border-color: rgba(236, 0, 116, 0.74);
      background: rgba(31, 8, 24, 0.70);
    }

    #touch-skip-wave {
      right: 24px;
      top: 78px;
      border-color: rgba(236, 0, 116, 0.62);
      background: rgba(31, 8, 24, 0.62);
    }

    #touch-special1 {
      left: 16px;
      top: 142px;
      width: 116px;
      height: 42px;
      border-radius: 16px;
      border-color: rgba(236, 0, 116, 0.78);
      background: rgba(31, 8, 24, 0.72);
      font-size: 10px;
    }

    #touch-revive {
      left: 16px;
      top: 190px;
      width: 116px;
      height: 42px;
      border-radius: 16px;
      border-color: rgba(0, 255, 187, 0.78);
      background: rgba(4, 26, 22, 0.72);
      font-size: 10px;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-fullscreen {
      display: none;
    }

    body.mobile-menu #touch-joystick-base,
    body.mobile-menu #touch-settings,
    body.mobile-menu #touch-skip-wave,
    body.mobile-menu #touch-special1,
    body.mobile-menu #touch-revive,
    body.mobile-menu #touch-dash,
    body.mobile-menu #touch-fire-left,
    body.mobile-menu #touch-fire-right,
    body.mobile-menu #touch-restart {
      display: none;
    }

    body.mobile-menu #touch-fullscreen {
      right: 24px;
      top: 22px;
      display: flex;
    }

    /* Panel limpio: en ajustes no se dibuja la botonera encima del menú. */
    body.mobile-settings-open #touch-joystick-base,
    body.mobile-settings-open #touch-settings,
    body.mobile-settings-open #touch-skip-wave,
    body.mobile-settings-open #touch-special1,
    body.mobile-settings-open #touch-revive,
    body.mobile-settings-open #touch-dash,
    body.mobile-settings-open #touch-fire-left,
    body.mobile-settings-open #touch-fire-right,
    body.mobile-settings-open #touch-restart {
      display: none;
    }

    body.mobile-settings-open #touch-fullscreen,
    body.mobile-settings-open #touch-joystick-base,
    body.mobile-settings-open #touch-settings,
    body.mobile-settings-open #touch-skip-wave,
    body.mobile-settings-open #touch-special1,
    body.mobile-settings-open #touch-revive,
    body.mobile-settings-open #touch-dash,
    body.mobile-settings-open #touch-fire-left,
    body.mobile-settings-open #touch-fire-right,
    body.mobile-settings-open #touch-restart {
      display: none !important;
    }

    body.settings-panel-open canvas {
      cursor: default;
    }

    .touch-button.active,
    #touch-joystick-base.active {
      transform: scale(0.96);
      filter: brightness(1.25);
    }

    @media (max-width: 610px), (max-height: 520px) {
      #touch-joystick-base {
        left: 18px;
        bottom: 18px;
        width: 112px;
        height: 112px;
      }

      #touch-joystick-knob {
        left: 36px;
        top: 36px;
        width: 40px;
        height: 40px;
      }

      #touch-fire-left {
        right: 16px;
        bottom: 18px;
        width: 88px;
        height: 88px;
        border-radius: 28px;
      }

      #touch-fire-right {
        right: 112px;
        bottom: 36px;
        width: 66px;
        height: 66px;
        border-radius: 22px;
      }

      #touch-dash {
        right: 58px;
        bottom: 124px;
        width: 66px;
        height: 66px;
        border-radius: 22px;
      }

      #touch-fullscreen,
      #touch-restart,
      #touch-settings,
      #touch-skip-wave,
      #touch-special1 {
        width: 104px;
        height: 42px;
        font-size: 9.5px;
      }

      #touch-settings {
        right: 132px;
      }

      #touch-special1 {
        left: 12px;
        top: 126px;
        width: 104px;
        height: 40px;
      }
    }

    @media (min-width: 901px) and (hover: hover) and (pointer: fine) {
      body.mobile-enabled #mobile-controls { display: none; }
    }


    /* MOBILE UI PATCH: botones sólidos, gruesos y sin glow para no mezclarse con el mapa. */
    body.mobile-gameplay:not(.mobile-settings-open) #touch-restart {
      display: none !important;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #mobile-controls {
      opacity: calc(var(--touch-controls-opacity, 1) * 0.98);
      filter: saturate(0.95);
    }

    body.mobile-gameplay:not(.mobile-settings-open) .touch-button,
    body.mobile-gameplay:not(.mobile-settings-open) #touch-joystick-base {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) .touch-button {
      border-width: 3px;
      background: #0b0c13;
      box-shadow: none;
      text-shadow: none;
      color: rgba(255,255,255,0.86);
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-settings {
      right: 16px;
      top: 16px;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      font-size: 0;
      background: #0b0c13;
      border-color: rgba(236,0,116,0.88);
      box-shadow: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-settings::before {
      content: "⚙";
      font-size: 23px;
      line-height: 1;
      color: rgba(255,255,255,0.90);
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-joystick-base {
      border-width: 3px;
      border-color: rgba(236,0,116,0.62);
      background: #100811;
      box-shadow: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-joystick-knob {
      background: #ec0074;
      box-shadow: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-fire-left,
    body.mobile-gameplay:not(.mobile-settings-open) #touch-dash {
      border-color: rgba(236,0,116,0.88);
      background: #190817;
      box-shadow: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-fire-right {
      border-color: rgba(66,223,255,0.90);
      background: #07181f;
      box-shadow: none;
    }

    body.mobile-gameplay:not(.mobile-settings-open) #touch-skip-wave {
      display: flex !important;
      left: 16px;
      right: auto;
      top: 92px;
      width: 116px;
      height: 42px;
      border-radius: 16px;
      font-size: 10px;
      border-color: rgba(236,0,116,0.88);
      background: #190817;
      box-shadow: none;
    }

    @media (max-width: 610px), (max-height: 520px) {
      body.mobile-gameplay:not(.mobile-settings-open) #touch-skip-wave {
        left: 12px;
        top: 78px;
        width: 104px;
        height: 40px;
      }
    }


    #room-code-box {
      position: fixed;
      z-index: 45;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: auto;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    #room-code-input {
      width: 180px;
      height: 44px;
      border: 2.5px solid rgba(236, 0, 116, 0.92);
      border-radius: 17px;
      background: linear-gradient(180deg, rgba(15, 17, 28, 0.98), rgba(5, 6, 12, 0.98));
      color: rgba(255,255,255,0.96);
      outline: none;
      padding: 0 14px;
      font: 950 18px Inter, "Segoe UI", Arial, sans-serif;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 0.16em;
      box-shadow: 0 10px 26px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    #room-code-input:focus {
      border-color: #42dfff;
      box-shadow: 0 10px 26px rgba(0,0,0,0.32), 0 0 0 3px rgba(66,223,255,0.14);
    }

    #room-code-input::placeholder {
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
      text-transform: none;
    }

    #room-code-join,
    #room-code-cancel {
      height: 44px;
      min-width: 92px;
      border: 2.5px solid #ec0074;
      border-radius: 17px;
      background: linear-gradient(180deg, #ec0074, #75003a);
      color: rgba(255,255,255,0.94);
      cursor: pointer;
      font: 950 12px Inter, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    #room-code-cancel {
      display: none;
    }

    #room-code-join:active,
    #room-code-cancel:active {
      transform: translateY(1px);
    }

  
    /* FIREBASE AUTH PATCH */
    #auth-screen{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,rgba(236,0,116,.12),transparent 42%),linear-gradient(180deg,rgba(0,0,0,.74),rgba(0,0,0,.94));font-family:Inter,"Segoe UI",Arial,sans-serif;color:white}
    #auth-screen.visible{display:flex}
    .auth-panel{width:min(430px,calc(100vw - 34px));border:2px solid rgba(236,0,116,.95);border-radius:26px;background:linear-gradient(180deg,rgba(20,18,30,.98),rgba(7,8,14,.98));box-shadow:0 0 34px rgba(236,0,116,.20);padding:28px;position:relative;overflow:hidden}
    .auth-panel::before{content:"";position:absolute;left:22px;top:26px;width:6px;height:72px;background:#ec0074}
    .auth-title{margin-left:22px;font-size:30px;line-height:.95;font-weight:1000;letter-spacing:.045em;text-transform:uppercase}
    .auth-subtitle{margin:10px 0 22px 22px;color:#ec0074;font-size:12px;font-weight:1000;letter-spacing:.09em;text-transform:uppercase}
    .auth-field-label{display:block;margin:12px 0 6px;font-size:11px;font-weight:1000;color:rgba(255,255,255,.64);letter-spacing:.08em;text-transform:uppercase}
    .auth-input{width:100%;height:42px;border:2px solid rgba(236,0,116,.65);border-radius:16px;background:rgba(5,7,13,.94);color:white;outline:none;padding:0 14px;font:850 14px Inter,"Segoe UI",Arial,sans-serif}
    .auth-input:focus{border-color:#ec0074;box-shadow:0 0 0 3px rgba(236,0,116,.18)}
    .auth-row{display:flex;gap:10px;margin-top:18px}
    .auth-button{flex:1;height:42px;border:2px solid #ec0074;border-radius:16px;background:#180812;color:rgba(255,255,255,.94);cursor:pointer;font:1000 12px Inter,"Segoe UI",Arial,sans-serif;letter-spacing:.06em;text-transform:uppercase}
    .auth-button.primary{background:linear-gradient(180deg,#ec0074,#8d0047)}
    .auth-button:active{transform:translateY(1px)}
    .auth-status{min-height:18px;margin-top:14px;font-size:12px;font-weight:800;color:rgba(255,255,255,.60);text-align:center}
    .auth-status.error{color:#ff5572}.auth-status.ok{color:#00ffbb}
    #auth-user-badge{position:fixed;left:18px;bottom:18px;z-index:42;display:none;align-items:center;gap:10px;height:38px;max-width:min(420px,calc(100vw - 36px));padding:0 12px;border:2px solid rgba(236,0,116,.72);border-radius:15px;background:rgba(7,8,14,.92);color:rgba(255,255,255,.86);font:900 11px Inter,"Segoe UI",Arial,sans-serif;letter-spacing:.04em;text-transform:uppercase;pointer-events:auto}
    #auth-user-badge.visible{display:flex}
    body.gameplay-active #auth-user-badge{display:none!important}
    #auth-logout-btn{height:24px;padding:0 9px;border:1.5px solid rgba(236,0,116,.88);border-radius:10px;background:transparent;color:white;font:900 10px Inter,"Segoe UI",Arial,sans-serif;cursor:pointer}

  </style>
</head>
<body>
  <canvas id="game" tabindex="0"></canvas>

  <div id="auth-screen" class="visible">
    <div class="auth-panel">
      <div class="auth-title">DUNGEON<br>SHAPES</div>
      <div class="auth-subtitle">Inicio de sesión online</div>
      <label class="auth-field-label" for="auth-name">Nombre visible</label>
      <input id="auth-name" class="auth-input" type="text" autocomplete="nickname" placeholder="Tu nombre" maxlength="18" />
      <label class="auth-field-label" for="auth-email">Correo electrónico</label>
      <input id="auth-email" class="auth-input" type="email" autocomplete="email" placeholder="correo@email.com" />
      <label class="auth-field-label" for="auth-password">Contraseña</label>
      <input id="auth-password" class="auth-input" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres" />
      <div class="auth-row">
        <button id="auth-login-btn" class="auth-button primary" type="button">Entrar</button>
        <button id="auth-register-btn" class="auth-button" type="button">Registrarse</button>
      </div>
      <div id="auth-status" class="auth-status">Conectando con Firebase...</div>
    </div>
  </div>
  <div id="auth-user-badge">
    <span id="auth-user-label">SIN USUARIO</span>
    <button id="auth-logout-btn" type="button">SALIR</button>
  </div>

  <div id="settings-cheat-box">
    <input id="settings-cheat-input" type="text" autocomplete="off" spellcheck="false" placeholder="Oleada / comando" />
    <button id="settings-cheat-apply" type="button">APLICAR</button>
  </div>

  <div id="room-code-box">
    <input id="room-code-input" type="text" maxlength="6" autocomplete="off" spellcheck="false" placeholder="Código" />
    <button id="room-code-join" type="button">UNIRSE</button>
    <button id="room-code-cancel" type="button">CANCELAR</button>
  </div>

<div id="mobile-controls" aria-hidden="true">
    <div id="touch-joystick-base"><div id="touch-joystick-knob"></div></div>
    <div id="touch-fullscreen" class="touch-button">PANTALLA<br>COMPLETA</div>
    <div id="touch-restart" class="touch-button">REINICIAR</div>
    <div id="touch-settings" class="touch-button">AJUSTES</div>
    <div id="touch-skip-wave" class="touch-button">SALTAR<br>OLEADA</div>
    <div id="touch-special1" class="touch-button">ESPECIAL 1</div>
    <div id="touch-revive" class="touch-button">REVIVIR</div>
    <div id="touch-dash" class="touch-button">DASH</div>
    <div id="touch-fire-right" class="touch-button">ATAQUE<br>SEC.</div>
    <div id="touch-fire-left" class="touch-button">ATAQUE<br>PRINC.</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d", { alpha: false });

    function resizeCanvasToDisplay() {

          document.documentElement.style.setProperty("--ios-app-height", `${viewportH}px`);
          document.body.style.height = `${viewportH}px`;
        }
      } catch (_) {}

      const rect = canvas.getBoundingClientRect();
      const nextW = Math.max(1, Math.round(rect.width || window.innerWidth));
      const nextH = Math.max(1, Math.round(rect.height || window.innerHeight));

      if (canvas.width !== nextW || canvas.height !== nextH) {
        canvas.width = nextW;
        canvas.height = nextH;
        ctx.imageSmoothingEnabled = false;
        try { invalidateLayoutCache(); } catch (_) {}
      }
    }

    function updateJoystickFromClient(clientX, clientY) {
      const rect = touchJoystickBase.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const max = rect.width * 0.34;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      const clamped = Math.min(max, dist);

      if (dist > 0.001) {
        dx = dx / dist * clamped;
        dy = dy / dist * clamped;
      } else {
        dx = 0;
        dy = 0;
      }

      mobileInput.moveX = dx / max;
      mobileInput.moveY = dy / max;
      mobileInput.magnitude = Math.min(1, dist / max);

      if (mobileInput.magnitude > 0.12) {
        mobileInput.lastAimX = mobileInput.moveX / Math.max(0.001, mobileInput.magnitude);
        mobileInput.lastAimY = mobileInput.moveY / Math.max(0.001, mobileInput.magnitude);
      }

      touchJoystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    }

    function resetJoystick() {
      mobileInput.joystickPointerId = null;
      mobileInput.moveX = 0;

      setTouchButtonActive(touchJoystickBase, false);
    }

    function updateMobileAimTarget() {
      // Auto-apunte SOLO para celular/tablet. En PC se sigue usando el mouse real.
      if (!mobileInput.enabled) return;

      let ax = mobileInput.lastAimX || player.lastMoveX || 1;
      let ay = mobileInput.lastAimY || player.lastMoveY || 0;

      // En mobile el joystick queda dedicado al movimiento/dash.
      // El apuntado busca automáticamente al enemigo más cercano.
      let best = null;
      let bestD = Infinity;
      for (const enemy of enemies) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const d = dx * dx + dy * dy;
        if (d < bestD) {
          bestD = d;
          best = enemy;
        }
      }

      if (best) {
        const dx = best.x - player.x;
        const dy = best.y - player.y;
        const len = Math.hypot(dx, dy) || 1;
        ax = dx / len;
        ay = dy / len;
      } else if (mobileInput.magnitude > 0.12) {
        // Si no hay enemigos, el apuntado visual usa la dirección del joystick.
        ax = mobileInput.moveX / Math.max(0.001, mobileInput.magnitude);
        ay = mobileInput.moveY / Math.max(0.001, mobileInput.magnitude);
      }

      mouse.x = player.x + ax * 220;
      mouse.y = player.y + ay * 220;
    }

    function isIOSDevice() {
      const ua = navigator.userAgent || "";
      return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isIOSStandaloneMode() {
      return !!navigator.standalone || window.matchMedia?.("(display-mode: standalone)")?.matches;
    }

    function shouldUseIOSFullscreenFallback() {
      // Safari en iPhone/iPad no permite fullscreen real para canvas/páginas normales.
      // Aunque existan prefijos webkit, suelen aplicar solo a video; por eso en iOS usamos fallback.
      return isIOSDevice() && !isIOSStandaloneMode();
    }

    function setIOSFullscreenFallback(active) {
      const on = !!active;
      const viewportH = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, 1);
      document.documentElement.style.setProperty("--ios-app-height", `${viewportH}px`);
      document.documentElement.classList.toggle("ios-fullscreen-fallback", on);
      document.body.classList.toggle("ios-fullscreen-fallback", !!active);
      document.body.style.position = on ? "fixed" : "";
      document.body.style.width = on ? "100vw" : "";
      document.body.style.height = on ? `${viewportH}px` : "";
      window.scrollTo(0, 1);
      setTimeout(() => {
        resizeCanvasToDisplay();
        invalidateLayoutCache();
        refreshMobileControlsVisibility();
        window.scrollTo(0, 1);
      }, 80);
    }

    async function toggleFullscreenMode() {
      try {
        const root = document.documentElement;
        if (shouldUseIOSFullscreenFallback()) {
          setIOSFullscreenFallback(!isIOSFullscreenFallbackActive());
          return;
        }
        if (isIOSStandaloneMode()) {
          setIOSFullscreenFallback(!isIOSFullscreenFallbackActive());
          return;
        }
        if (!document.fullscreenElement) {
          if (root.requestFullscreen) await root.requestFullscreen();
          else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
          else setIOSFullscreenFallback(!isIOSFullscreenFallbackActive());
        } else {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      } catch (_) {
        // Algunos previews/browsers bloquean fullscreen. No rompe el juego.
        setIOSFullscreenFallback(!isIOSFullscreenFallbackActive());
      }

      setTimeout(() => {
        resizeCanvasToDisplay();
        refreshMobileControlsVisibility();
      }, 60);
    }

        el.setPointerCapture(e.pointerId);
        setTouchButtonActive(el, true);
        onDown(e);
      });
      const end = e => {
        e.preventDefault();
        e.stopPropagation();
        setTouchButtonActive(el, false);
        onUp(e);
      };
      el.addEventListener("pointerup", end);
      el.addEventListener("pointercancel", end);
      el.addEventListener("lostpointercapture", e => {
        setTouchButtonActive(el, false);
        onUp(e);
      });
    }

    function getCanvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / Math.max(1, rect.width);
      const scaleY = canvas.height / Math.max(1, rect.height);

      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY,
      };
    }

    function canvasToClientPoint(x, y) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: rect.left + (x / Math.max(1, canvas.width)) * rect.width,
        y: rect.top + (y / Math.max(1, canvas.height)) * rect.height,
      };
    }

      onlineGameOverSkip.count = 0;

      onlineGameOverSkip.active = !!active;

    function applyOnlineGameOverSkipVoteState(state = {}) {
      const requiredFallback = Math.max(1, getOnlineConnectedPlayerIds().length || 2);
      const required = Math.max(1, Number(state.required) || requiredFallback);
      const voted = (state.voted && typeof state.voted === "object") ? { ...state.voted } : {};
      const count = Number.isFinite(Number(state.count))
        ? Number(state.count)
        : getOnlineConnectedPlayerIds().filter(id => voted[id]).length;

      onlineGameOverSkip.required = required;
      onlineGameOverSkip.voted = voted;
      onlineGameOverSkip.count = Math.max(0, Math.min(required, count));
      onlineGameOverSkip.localRequested = !!voted[onlineRoom.playerId];
      onlineGameOverSkip.active = true;
    }

    function markLocalOnlineGameOverSkipVote() {
      if (!onlineRoom.playerId) return;
      onlineGameOverSkip.voted[onlineRoom.playerId] = true;
      onlineGameOverSkip.localRequested = true;
      onlineGameOverSkip.required = Math.max(1, getOnlineConnectedPlayerIds().length || 2);
      onlineGameOverSkip.count = getOnlineConnectedPlayerIds().filter(id => onlineGameOverSkip.voted[id]).length;
      onlineGameOverSkip.active = true;

      return true;

    function sanitizeOnlineVersusConfig(config = {}) {
      const weapon = String(config.weapon || config.weaponMode || "multiShot") === "normal" ? "normal" : "multiShot";
      const ability = String(config.ability || config.rightAbility || "pulsador") === "curador" ? "curador" : "pulsador";
      const livesRaw = Math.floor(Number(config.lives ?? config.maxHp ?? 3) || 3);
      const lives = [3, 5, 7].includes(livesRaw) ? livesRaw : 3;
      const targetScore = clamp(Math.floor(Number(config.targetScore ?? config.pointsToWin ?? 3) || 3), 1, 100);
      return { weapon, ability, lives, targetScore };
    }

    function getOnlineVersusConfig() {
      return sanitizeOnlineVersusConfig(game.versus?.config || onlineRoom.versus?.config || {});
    }

    function setOnlineVersusConfig(patch = {}, send = true) {
      const next = sanitizeOnlineVersusConfig({ ...getOnlineVersusConfig(), ...patch });
      if (!game.versus) game.versus = {};
      game.versus.config = next;
      game.versus.targetScore = next.targetScore;
      if (!onlineRoom.versus) onlineRoom.versus = { score: { p1: 0, p2: 0, p3: 0 }, round: 0, targetScore: next.targetScore, matchOver: false };
      onlineRoom.versus.config = next;
      onlineRoom.versus.targetScore = next.targetScore;

      if (send && isOnlineHost() && game.menuMode === "roomLobby" && game.multiplayer?.roomMode === "versus") {
        try {
          onlineRoom.socket?.send(JSON.stringify({ type: "versus_config_update", config: next }));
        } catch {}
      }
      return next;
    }

    function applyOnlineVersusConfig(config = {}) {
      return setOnlineVersusConfig(config, false);
    }

    function applyOnlineVersusState(versus = {}) {
      const score = versus.score || {};
      const config = sanitizeOnlineVersusConfig(versus.config || game.versus?.config || onlineRoom.versus?.config || {});
      onlineRoom.versus = {
        score: {
          p1: Math.max(0, Number(score.p1) || 0),
          p2: Math.max(0, Number(score.p2) || 0),
          p3: Math.max(0, Number(score.p3) || 0),
        },
        round: Math.max(0, Math.floor(Number(versus.round) || 0)),
        targetScore: Math.max(1, Math.min(100, Math.floor(Number(versus.targetScore ?? config.targetScore) || 3))),
        matchOver: !!versus.matchOver,
        config,
      };
      onlineRoom.versus.config.targetScore = onlineRoom.versus.targetScore;
      if (game.versus) {
        game.versus.score = { ...onlineRoom.versus.score };
        game.versus.round = onlineRoom.versus.round;
        game.versus.targetScore = onlineRoom.versus.targetScore;
        game.versus.config = { ...onlineRoom.versus.config };
        game.versus.matchOver = onlineRoom.versus.matchOver;
      }
    }

    function getOnlineConnectedPlayerIds() {
      const ids = [];
      const players = onlineRoom.players || {};
      for (const id of getOnlineRoomPlayerIds()) {
        if (players[id]?.connected || onlineRoom.playerId === id) ids.push(id);
      }
      return ids.length ? ids : (onlineRoom.playerId ? [onlineRoom.playerId] : []);
    }

    function getOnlineRemotePlayerIds() {
      if (!isOnlineMatchActive() || !onlineRoom.playerId) return [];
      return getOnlineConnectedPlayerIds().filter(id => id !== onlineRoom.playerId);
    }

    function getOnlineRemotePlayers() {
      if (!isOnlineMatchActive() || !onlineRoom.players) return [];
      return getOnlineRemotePlayerIds()
        .map(id => ({ id, player: onlineRoom.players[id] }))
        .filter(entry => entry.player && entry.player.connected);
    }

    function getOnlineRemoteColor(remoteId) {
      const remoteIds = ONLINE_PLAYER_IDS.filter(id => id !== onlineRoom.playerId);
      return remoteIds.indexOf(remoteId) <= 0 ? ONLINE_REMOTE_PRIMARY_COLOR : ONLINE_REMOTE_SECONDARY_COLOR;
    }

    function colorWithAlpha(hex, alpha = 1) {
      const clean = String(hex || "").replace("#", "");
      if (!/^[0-9a-fA-F]{6}$/.test(clean)) return `rgba(0,255,140,${alpha})`;
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function getOnlinePlayerDisplayName(playerId, data = null) {
      const playerData = data || onlineRoom.players?.[playerId] || null;
      if (playerData?.name) return playerData.name;
      if (playerId === "p1") return "Host";
      if (playerId === "p2") return "Jugador 2";
      if (playerId === "p3") return "Jugador 3";
      return "Jugador";
    }

    function applyOnlineIntermissionSkipVoteState(state = {}) {
      const wave = Number(state.wave) || game.wave;
      const requiredFallback = Math.max(1, getOnlineConnectedPlayerIds().length || 2);
      const required = Math.max(1, Number(state.required) || requiredFallback);
      const voted = (state.voted && typeof state.voted === "object") ? { ...state.voted } : {};
      const count = Number.isFinite(Number(state.count))
        ? Number(state.count)
        : getOnlineConnectedPlayerIds().filter(id => voted[id]).length;

      onlineIntermissionSkip.wave = wave;
      onlineIntermissionSkip.required = required;
      onlineIntermissionSkip.voted = voted;
      onlineIntermissionSkip.count = Math.max(0, Math.min(required, count));
      onlineIntermissionSkip.localRequested = !!voted[onlineRoom.playerId];
    }

    function mergeOnlineIntermissionSkipVotesFromPlayers(players = onlineRoom.players || {}) {
      if (!isOnlineMatchActive() || game.state !== "playing" || game.waveState !== "intermission") return;

      if (Number(onlineIntermissionSkip.wave) !== Number(game.wave)) {
        resetOnlineIntermissionSkipVotes(game.wave);
      }

      for (const id of ONLINE_PLAYER_IDS) {
        const p = players[id];
        if (!p || !p.connected) continue;
        if (Number(p.skipVoteWave || 0) === Number(game.wave)) {
          onlineIntermissionSkip.voted[id] = true;
        }
      }

      const connectedIds = getOnlineConnectedPlayerIds();
      onlineIntermissionSkip.required = Math.max(1, connectedIds.length || 2);
      onlineIntermissionSkip.count = connectedIds.filter(id => onlineIntermissionSkip.voted[id]).length;
      onlineIntermissionSkip.localRequested = !!onlineIntermissionSkip.voted[onlineRoom.playerId];
    }

    function markLocalOnlineIntermissionSkipVote() {
      if (!onlineRoom.playerId) return;
      if (Number(onlineIntermissionSkip.wave) !== Number(game.wave)) {
        resetOnlineIntermissionSkipVotes(game.wave);
      }

      onlineIntermissionSkip.voted[onlineRoom.playerId] = true;
      onlineIntermissionSkip.localRequested = true;
      onlineIntermissionSkip.required = Math.max(1, getOnlineConnectedPlayerIds().length || 2);
      onlineIntermissionSkip.count = getOnlineConnectedPlayerIds().filter(id => onlineIntermissionSkip.voted[id]).length;
    }

    function getOnlineIntermissionSkipStateForSnapshot() {
      return {
        wave: Number(onlineIntermissionSkip.wave) || Number(game.wave) || 0,
        count: Number(onlineIntermissionSkip.count) || 0,
        required: Math.max(1, Number(onlineIntermissionSkip.required) || 2),
        voted: { ...(onlineIntermissionSkip.voted || {}) },
      };
    }

    function requestOnlineIntermissionSkip() {
      if (!isOnlineMatchActive()) return false;
      if (game.state !== "playing" || game.waveState !== "intermission") return true;
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return true;

      markLocalOnlineIntermissionSkipVote();

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "intermission_skip_vote",
          wave: game.wave,
        }));

    function tryStartNextWaveFromOnlineSkipVotes() {
      if (!isOnlineHost()) return false;
      if (game.state !== "playing" || game.waveState !== "intermission") return false;
      if (Number(onlineIntermissionSkip.wave) !== Number(game.wave)) return false;

      const required = Math.max(1, Number(onlineIntermissionSkip.required) || 2);
      const count = Math.max(0, Number(onlineIntermissionSkip.count) || 0);
      if (count < required) return false;

      resetOnlineIntermissionSkipVotes(Number(game.wave) + 1);
      startNextWave();
      return true;
    }

      if (!isOnlineMatchActive() || game.waveState !== "intermission") return "";
      const required = Math.max(1, Number(onlineIntermissionSkip.required) || 2);
      const count = Math.max(0, Math.min(required, Number(onlineIntermissionSkip.count) || 0));
      return `SALTEAR ${count}/${required}`;
    }

    function normalizeRoomPoint(x, y) {
      const rr = room.getRect();
      return {
        x: rr.w > 0 ? (x - rr.x) / rr.w : 0.5,
        y: rr.h > 0 ? (y - rr.y) / rr.h : 0.5,
      };
    }

    function denormalizeRoomPoint(nx, ny) {
      const rr = room.getRect();
      return {
        x: rr.x + Number(nx) * rr.w,
        y: rr.y + Number(ny) * rr.h,
      };
    }

    function sendOnlineProjectileShotFromWorld(x, y, vx, vy, size = 11, damage = 1, options = {}) {
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return;
      if (!onlineRoom.playerId) return;
      if (game.state !== "playing") return;

      const pos = normalizeRoomPoint(x, y);
      const angle = Math.atan2(vy, vx);
      const speed = Math.hypot(vx, vy) || 680;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "player_shot",
          id: `${onlineRoom.playerId}-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
          x: pos.x,
          y: pos.y,
          angle,
          speed,
          size,
          damage,
          precise: !!options.precise,
          weapon: options.weapon || "normal",
          life: options.life || 1.8
        }));
      } catch {}
    }

    function spawnRemoteOnlineProjectile(shot) {
      if (!shot || shot.owner === onlineRoom.playerId) return;

      const pos = denormalizeRoomPoint(shot.x, shot.y);
      const angle = Number(shot.angle) || 0;
      const speed = Math.max(80, Math.min(1600, Number(shot.speed) || 680));
      const size = Math.max(4, Math.min(32, Number(shot.size) || 11));

      onlineRemoteProjectiles.push({
        id: shot.id || "",
        owner: shot.owner || "",
        x: pos.x,
        y: pos.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size,
        damage: Number(shot.damage) || 1,
        precise: !!shot.precise,
        weapon: shot.weapon || "normal",
        color: getOnlineRemoteColor(shot.owner || ""),
        rotation: 0,
        rotateTimer: 0,
        life: Math.max(0.2, Math.min(3, Number(shot.life) || 1.8)),
      });
    }

    function updateGuestSyncedHostileVisuals(dt) {
      // Pulser rings/boss hazards/projectiles del host se mueven visualmente en el invitado,
      // pero el daño real lo calcula el host para evitar desync.
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        if (!p.enemyProjectile) continue;

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        p.rotateTimer = (p.rotateTimer || 0) + dt;
        if (p.rotateTimer >= 0.2) {
          p.rotateTimer -= 0.2;
          p.rotation += Math.PI / 2;
        }

        const hitPlayer =
          !player.downed &&
          !isPlayerDamageInvulnerable() &&
          ((p.x - player.x) ** 2 + (p.y - player.y) ** 2 <= Math.pow(getEnemyProjectileHitHalfSize(p) + getPlayerHitRadius(), 2));

        if (hitPlayer) {
          damagePlayer(p.damage || 1);
          spawnImpactParticles(p.x, p.y, p.color || game.ruby);
          projectiles.splice(i, 1);
          continue;
        }

        if (p.life <= 0 || projectileHitsWall(p) || projectileHitsObstacle(p)) {
          spawnImpactParticles(p.x, p.y, p.color || game.ruby);
          projectiles.splice(i, 1);
        }
      }

      for (let i = pulserRings.length - 1; i >= 0; i--) {
        const ring = pulserRings[i];
        ring.radius += ring.speed * dt;
        ring.life -= dt;

        if (!ring.hitPlayer && !player.downed && !isPlayerDamageInvulnerable()) {
          const dx = player.x - ring.x;
          const dy = player.y - ring.y;
          const dist = Math.hypot(dx, dy);
          const band = getRingHitHalfThickness(ring) + getPlayerHitRadius();

          if (Math.abs(dist - ring.radius) <= band) {
            ring.hitPlayer = true;
            if (isOnlineVersusMode() && ring.owner) game.versus.lastDamageOwner = ring.owner;
            damagePlayer(ring.damagePlayerAmount || 1);
          }
        }

        if (ring.life <= 0 || ring.radius > ring.maxRadius || ring.radius < ring.minRadius) {
          pulserRings.splice(i, 1);
        }
      }

      for (let i = bossHazards.length - 1; i >= 0; i--) {
        const hazard = bossHazards[i];
        hazard.timer = (hazard.timer || 0) + dt;
        if (hazard.type === "doupDroub") {
          hazard.rotation += (hazard.rotationSpeed || 0) * dt;
          hazard.warningTimer = Math.max(0, (hazard.warningTimer || 0) - dt);
          hazard.life -= dt;
          if (hazard.life <= 0) bossHazards.splice(i, 1);
        } else if (hazard.type === "doupBlaster") {
          if (hazard.phase === "warning" && hazard.timer >= hazard.warningTime) {
            hazard.phase = "active";
            hazard.timer = 0;
            hazard.exploded = true;
          } else if (hazard.phase === "active" && hazard.timer >= hazard.activeTime) {
            hazard.phase = "fade";
            hazard.timer = 0;
          } else if (hazard.phase === "fade" && hazard.timer >= hazard.fadeTime) {
            bossHazards.splice(i, 1);
          }
        } else if (hazard.type === "linebreakerLaser") {
          if (hazard.phase === "warning" && hazard.timer >= hazard.warningTime) {
            hazard.phase = "active";
            hazard.timer = 0;
          } else if (hazard.phase === "active" && hazard.timer >= hazard.activeTime) {
            hazard.phase = "fade";
            hazard.timer = 0;
          } else if (hazard.phase === "fade" && hazard.timer >= hazard.fadeTime) {
            bossHazards.splice(i, 1);
          }
        }
      }
    }


    function updateGuestSyncedEnemyContactDamage() {
      if (!isOnlineGuest() || player.downed || game.state !== "playing") return;
      if (game.roomStartTimer > 0 || game.waveState !== "combat") return;
      if (isPlayerDamageInvulnerable()) return;

      for (const enemy of enemies) {
        if (!enemy) continue;

        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const hitDist = getPlayerHitRadius() + getEnemyContactHitRadius(enemy);

        if (dx * dx + dy * dy <= hitDist * hitDist) {
          damagePlayer(enemy.contactDamage || 1);
          return;
        }
      }
    }

    function remoteOnlineProjectileHitsEnemyVisual(p) {
      if (isOnlineVersusMode()) return false;
      const projectileRadius = getPlayerProjectileHitHalfSize(p);

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (!enemy || enemy.hp <= 0) continue;

        const dx = p.x - enemy.x;
        const dy = p.y - enemy.y;
        const enemyRadius = getEnemyBodyHitRadius(enemy);
        const hit = dx * dx + dy * dy <= Math.pow(projectileRadius + enemyRadius, 2);

        if (hit) {
          enemy.hitFlash = Math.max(enemy.hitFlash || 0, 0.65);
          spawnHitParticles(p.x, p.y, p.precise ? "#ffffff" : (p.color || "#00ff8c"), 6);
          return true;
        }
      }

      return false;
    }

    function remoteOnlineProjectileHitsLocalPlayer(p) {
      if (!isOnlineVersusMode() || player.downed || game.versus.pendingRoundLost) return false;
      if (isPlayerDamageInvulnerable()) return false;

      const projectileRadius = getPlayerProjectileHitHalfSize(p);
      const dx = p.x - player.x;
      const dy = p.y - player.y;
      const hit = dx * dx + dy * dy <= Math.pow(projectileRadius + getPlayerHitRadius(), 2);
      if (!hit) return false;

      game.versus.lastDamageOwner = p.owner || "";
      damagePlayer(Math.max(1, Math.round(Number(p.damage) || 1)));
      return true;
    }

    function updateRemoteOnlineProjectiles(dt) {
      for (let i = onlineRemoteProjectiles.length - 1; i >= 0; i--) {
        const p = onlineRemoteProjectiles[i];

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        p.rotateTimer = (p.rotateTimer || 0) + dt;
        if (p.rotateTimer >= 0.2) {
          p.rotateTimer -= 0.2;
          p.rotation += Math.PI / 2;
        }

        const hitWall = projectileHitsWall(p);
        const hitObstacle = projectileHitsObstacle(p);
        const hitEnemy = remoteOnlineProjectileHitsEnemyVisual(p);
        const hitPlayer = remoteOnlineProjectileHitsLocalPlayer(p);
        const farOutside = remoteProjectileOutOfRoom(p, 48);

        if (p.life <= 0 || hitWall || hitObstacle || hitEnemy || hitPlayer || farOutside) {
          if (hitWall || farOutside) {
            const rr = room.getRect();
            p.x = clamp(p.x, rr.x + p.size / 2, rr.x + rr.w - p.size / 2);
            p.y = clamp(p.y, rr.y + p.size / 2, rr.y + rr.h - p.size / 2);
          }
          spawnImpactParticles(p.x, p.y, p.color || "#00ff8c");
          onlineRemoteProjectiles.splice(i, 1);
        }
      }
    }

    function drawRemoteOnlineProjectiles() {
      for (const p of onlineRemoteProjectiles) {
        if (remoteProjectileOutOfRoom(p, 4)) continue;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color || "#00ff8c";
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);

        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, Math.max(2, p.size * 0.22));
        ctx.restore();
      }
    }


    function isOnlineMatchActive() {
      return !!onlineRoom.playerId && !!onlineRoom.socket && onlineRoom.socket.readyState === WebSocket.OPEN;
    }

    function isOnlineSessionActive() {
      return isOnlineMatchActive() || (!!onlineRoom.playerId && !!onlineRoom.reconnecting);
    }

    function isOnlineHost() {
      return isOnlineSessionActive() && onlineRoom.playerId === "p1";
    }

    function isOnlineGuest() {
      return isOnlineSessionActive() && onlineRoom.playerId && onlineRoom.playerId !== "p1";
    }

    function getRemoteOnlinePlayer() {
      const first = getOnlineRemotePlayers()[0];
      return first ? first.player : null;
    }

    function isOnlineCoopXPChoiceBlocking() {
      if (!isOnlineMatchActive() || game.state !== "playing") return false;
      if (isOnlineVersusMode()) return false;
      return !!game.xpChoiceOpen || getOnlineRemotePlayers().some(entry => !!entry.player.xpChoiceOpen);
    }

    function isOnlineCoopOrbBlocking() {
      if (!isOnlineMatchActive() || game.state !== "playing") return false;
      if (isOnlineVersusMode()) return false;
      if (game.waveState !== "intermission") return false;
      return !!game.upgradePickup || !!game.upgradeShopOpen || getOnlineRemotePlayers().some(entry => !!entry.player.orbBlocking);
    }

    function isOnlineCoopPauseBlocking() {
      return isOnlineCoopXPChoiceBlocking() || isOnlineCoopOrbBlocking();
    }

    function sendOnlineLocalChoiceStateNow() {
      sendOnlinePlayerStateNow();
    }

    function shouldRunLocalEnemySimulation() {
      // Offline: el juego funciona igual que siempre.
      // Online: solo el host simula enemigos/oleadas; el invitado recibe snapshots.
      if (isOnlineVersusMode()) return false;
      if (onlineRoom.reconnecting && onlineRoom.playerId && onlineRoom.playerId !== "p1") return false;
      return !isOnlineMatchActive() || isOnlineHost();
    }

    function getOrCreateOnlineEnemyId(enemy) {
      if (!enemy._onlineId) {
        enemy._onlineId = `e${onlineEnemyIdCounter++}`;
      }
      return enemy._onlineId;
    }

    function getOrCreateOnlineHazardId(hazard) {
      if (!hazard._onlineId) {
        hazard._onlineId = `h${onlineHazardIdCounter++}`;
      }
      return hazard._onlineId;
    }

    function getOrCreateOnlineRingId(ring) {
      if (!ring._onlineId) {
        ring._onlineId = `r${onlineRingIdCounter++}`;
      }
      return ring._onlineId;
    }

    function normalizeAngleDelta(delta) {
      while (delta > Math.PI) delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      return delta;
    }

    function approachAngle(current, target, amount) {
      return current + normalizeAngleDelta(target - current) * amount;
    }

    function approachNumber(current, target, amount) {
      if (!Number.isFinite(Number(current))) return Number.isFinite(Number(target)) ? Number(target) : 0;
      if (!Number.isFinite(Number(target))) return Number(current);
      return Number(current) + (Number(target) - Number(current)) * amount;
    }

    function serializeOnlineEnemy(enemy) {
      const rr = room.getRect();
      const nx = rr.w > 0 ? (enemy.x - rr.x) / rr.w : 0.5;
      const ny = rr.h > 0 ? (enemy.y - rr.y) / rr.h : 0.5;
      const now = performance.now();
      let vx = 0;
      let vy = 0;

      if (
        Number.isFinite(Number(enemy._onlineLastSnapshotNx)) &&
        Number.isFinite(Number(enemy._onlineLastSnapshotNy)) &&
        Number.isFinite(Number(enemy._onlineLastSnapshotAt))
      ) {
        const dt = Math.max(0.001, (now - Number(enemy._onlineLastSnapshotAt)) / 1000);
        vx = clamp((nx - Number(enemy._onlineLastSnapshotNx)) / dt, -3.5, 3.5);
        vy = clamp((ny - Number(enemy._onlineLastSnapshotNy)) / dt, -3.5, 3.5);
      }

      enemy._onlineLastSnapshotNx = nx;
      enemy._onlineLastSnapshotNy = ny;
      enemy._onlineLastSnapshotAt = now;

      const out = {
        id: getOrCreateOnlineEnemyId(enemy),
        type: enemy.type,
        x: nx,
        y: ny,
        vx,
        vy,
        size: enemy.size,
        hp: enemy.hp,
        maxHp: enemy.maxHp,
        hpVisual: enemy.hpVisual ?? enemy.hp,
        rotation: enemy.rotation || 0,
        color: enemy.color || "",
        phase2: !!enemy.phase2,
        isBoss: !!enemy._isBoss,
        shieldHp: enemy.shieldHp || 0,
        shieldMaxHp: enemy.shieldMaxHp || 0,
      };

      // Campos visuales/mecánicos seguros para que el dibujo del invitado no se rompa.
      const numericKeys = [
        "pulseTimer", "pulseInterval", "innerRotation", "rotationSpeed", "rayLength", "rayWidth",
        "attackTimer", "attackCooldown", "attackLockTimer", "moveTime", "shieldTimer", "shieldInterval",
        "preferredDistance", "minDistance", "maxDistance", "strafeDir", "strafeSwapTimer",
        "baseX", "baseY", "shootTimer", "shootInterval", "speed"
      ];

      for (const key of numericKeys) {
        if (Number.isFinite(Number(enemy[key]))) out[key] = Number(enemy[key]);
      }

      return out;
    }


    function getRemoteOnlinePlayerWorldPositionsForHost() {
      if (!isOnlineHost() || !onlineRoom.players) return [];

      const rr = room.getRect();
      const positions = [];

      for (const remoteId of ONLINE_PLAYER_IDS) {
        if (remoteId === onlineRoom.playerId) continue;
        const remote = onlineRoom.players[remoteId];
        if (!remote || !remote.connected || remote.downed || Number(remote.hp || 0) <= 0) continue;

        let x = Number(remote.x);
        let y = Number(remote.y);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

        if (x >= -0.25 && x <= 1.25 && y >= -0.25 && y <= 1.25) {
          x = rr.x + x * rr.w;
          y = rr.y + y * rr.h;
        }

        positions.push({ x, y, id: remoteId, isLocal: false, name: getOnlinePlayerDisplayName(remoteId, remote) });
      }

      return positions;
    }

    function getRemoteOnlinePlayerWorldPositionForHost() {
      return getRemoteOnlinePlayerWorldPositionsForHost()[0] || null;
    }


    function isRemoteOnlinePlayerDamageInvulnerable(remote) {
      if (!remote || !remote.connected || remote.downed) return true;
      const input = remote.input || {};
      const hitTimer = Number(remote.hitTimer) || 0;
      // Dash sí protege. La invencibilidad por hit solo se respeta mientras hitTimer siga activo,
      // para evitar que un estado viejo deje al invitado inmortal.
      return !!input.dash || !!remote.wasDashing || hitTimer > 0.05;
    }

    function canSendOnlineDamage(targetId, cooldown = 0.72) {
      const now = performance.now() / 1000;
      const last = onlineDamageCooldowns[targetId] || 0;
      if (now - last < cooldown) return false;
      onlineDamageCooldowns[targetId] = now;
      return true;
    }

    function sendOnlinePlayerDamage(targetId, amount = 1, source = "enemy") {
      if (!isOnlineHost()) return false;
      if (!targetId || targetId === onlineRoom.playerId) return false;
      if (!canSendOnlineDamage(targetId)) return false;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "player_damage",
          targetId,
          amount,
          source,
          time: Date.now()
        }));
        return true;
      } catch {
        return false;
      }
    }



    function sendOnlinePlayerReward(targetId, enemy, includeXP = true) {
      if (!isOnlineHost()) return false;
      if (!targetId || targetId === onlineRoom.playerId) return false;
      if (!enemy) return false;

      const points = getEnemyPointReward(enemy);
      const xp = includeXP ? getEnemyXPReward(enemy) : 0;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "player_reward",
          targetId,
          points,
          xp,
          enemyType: enemy.type || "",
        }));
        return true;
      } catch {
        return false;
      }
    }

    function sendOnlinePlayerRewardToRemotePlayers(enemy, includeXP = true) {
      if (!isOnlineHost()) return;
      for (const id of getOnlineConnectedPlayerIds()) {
        if (id === onlineRoom.playerId) continue;
        sendOnlinePlayerReward(id, enemy, includeXP);
      }
    }

    function addSharedKillRewards(enemy) {
      const reward = getEnemyPointReward(enemy);
      if (reward > 0) {
        game.points += reward;
        game.pointsPulse = 1;
        game.pointsPulseValue = reward;
      }

      const xp = getEnemyXPReward(enemy);
      if (xp > 0) {
        game.xp += xp;
        game.xpPulse = Math.max(game.xpPulse || 0, 1);
        while (!game.xpChoiceOpen && game.xp >= game.xpRequired) {
          openXPChoiceUI();
        }
      }
    }

    function applyOnlinePlayerReward(msg) {
      if (!msg || msg.targetId !== onlineRoom.playerId) return;

      const points = Math.max(0, Number(msg.points) || 0);
      const xp = Math.max(0, Number(msg.xp) || 0);

      if (points > 0) {
        game.points += points;
        game.pointsPulse = 1;
        game.pointsPulseValue = points;
      }

      if (xp > 0) {
        game.xp += xp;
        game.xpPulse = Math.max(game.xpPulse || 0, 1);
        while (!game.xpChoiceOpen && game.xp >= game.xpRequired) {
          openXPChoiceUI();
        }
      }

      if (hasRogueUpgrade("recargaEnergetica")) {
        player.stamina = Math.min(player.staminaSegments, player.stamina + player.staminaSegments * 0.05);
        player.staminaVisual = Math.max(player.staminaVisual, player.stamina);
      }
    }

    function sendOnlineEnemyHit(enemy, projectile, damage = 1) {
      if (!isOnlineGuest()) return false;
      if (!enemy || !enemy._onlineId) return false;
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return false;

      const pos = normalizeRoomPoint(projectile.x, projectile.y);

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "enemy_hit",
          enemyId: enemy._onlineId,
          damage,
          x: pos.x,
          y: pos.y,
          precise: !!projectile.precise,
          weapon: projectile.weapon || "projectile"
        }));
        return true;
      } catch {
        return false;
      }
    }

    function applyOnlineEnemyHitRequest(msg) {
      if (!isOnlineHost()) return;

      const enemyId = msg.enemyId;
      if (!enemyId) return;

      const enemy = enemies.find(e => e._onlineId === enemyId);
      if (!enemy) return;

      const damage = Math.max(0, Math.min(999, Number(msg.damage) || 1));

      const hitPos = denormalizeRoomPoint(
        Number.isFinite(Number(msg.x)) ? Number(msg.x) : 0.5,
        Number.isFinite(Number(msg.y)) ? Number(msg.y) : 0.5
      );

      if (damage <= 0) return;

      if (damageEnemyShield(enemy, damage)) {
        spawnHitParticles(hitPos.x, hitPos.y, "#00ff8c", 5);
        spawnFloatingText(`-${damage}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.72, "#00ff8c", 12);
        sendOnlineEnemySnapshot(999);
        return;
      }

      enemy.hitFlash = 1;
      spawnHitParticles(hitPos.x, hitPos.y, msg.precise ? "#ffffff" : "#00ff8c", 6);
      spawnFloatingText(`-${damage}`, enemy.x + (Math.random() - 0.5) * enemy.size * 0.35, enemy.y - enemy.size * 0.55, msg.precise ? "#ffffff" : "#00ff8c", msg.precise ? 15 : 13);
      enemy.hp -= damage;

      if (enemy.hp <= 0) {
        const killerId = msg.playerId || "p2";

        if (killerId === onlineRoom.playerId) {
          addEnemyKillPoints(enemy);
        } else {
          // Kill de invitado: todos reciben puntos+XP, pero el host conserva la autoridad.
          addSharedKillRewards(enemy);
          sendOnlinePlayerRewardToRemotePlayers(enemy, true);
        }

        spawnEnemyDeathPulse(enemy.x, enemy.y);
        const idx = enemies.indexOf(enemy);
        if (idx >= 0) enemies.splice(idx, 1);
      }

      // Fuerza snapshot pronto para que el invitado vea el HP/death rápido.
      onlineEnemySendTimer = 0;
      sendOnlineEnemySnapshot(999);
    }


    function setLocalPlayerDowned() {
      if (player.downed) return;
      player.hp = 0;
      player.downed = true;
      player.invincible = true;
      player.hitTimer = 0;
      player.dashTimer = 0;
      player.dashGraceTimer = 0;
      player.wasDashing = false;
      mouse.down = false;
      mouse.rightDown = false;
      mobileInput.leftFire = false;
      mobileInput.rightFire = false;
      spawnFloatingText("CAÍDO", player.x, player.y - 42, game.ruby, 18);
      triggerScreenShake(5.5, 0.16);

    function reviveLocalPlayer() {
      player.downed = false;
      player.hp = Math.max(1, player.hp || 0);
      player.invincible = true;
      player.hitTimer = 3.5;
      spawnLifePulse(0);
      spawnFloatingText("REVIVIDO", player.x, player.y - 42, "#00ffbb", 16);
      triggerRoomPulse("#00ffbb", 0.54);

      sendOnlinePlayerStateNow();

    function sendOnlinePlayerStateNow() {
      if (!onlineRoom.socket || onlineRoom.socket.readyState !== WebSocket.OPEN) return;
      if (!onlineRoom.playerId) return;

      const rr = room.getRect();
      const nx = rr.w > 0 ? (player.x - rr.x) / rr.w : 0.5;
      const ny = rr.h > 0 ? (player.y - rr.y) / rr.h : 0.5;

      try {
        onlineRoom.socket.send(JSON.stringify({
          type: "input",
          x: nx,
          y: ny,
          aimX: nx,

          maxHp: player.maxHp,
