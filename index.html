    /* MENU POLISH PATCH v1: estética nueva para menú principal / multiplayer / lobby.
       No cambia lógica, WebSocket, Firebase ni click-rects. */
    function drawMenuPanelDecor(panel) {
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 34;
      ctx.shadowOffsetY = 18;
      drawRoundedRect(panel.x, panel.y, panel.w, panel.h, 28);
      const g = ctx.createLinearGradient(panel.x, panel.y, panel.x + panel.w, panel.y + panel.h);
      g.addColorStop(0, "rgba(18,18,30,0.92)");
      g.addColorStop(0.52, "rgba(9,10,18,0.88)");
      g.addColorStop(1, "rgba(5,6,12,0.94)");
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();

      ctx.save();
      drawRoundedRect(panel.x, panel.y, panel.w, panel.h, 28);
      const border = ctx.createLinearGradient(panel.x, panel.y, panel.x + panel.w, panel.y + panel.h);
      border.addColorStop(0, "rgba(236,0,116,0.92)");
      border.addColorStop(0.55, "rgba(255,255,255,0.10)");
      border.addColorStop(1, "rgba(66,223,255,0.38)");
      ctx.strokeStyle = border;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      drawRoundedRect(panel.x + 12, panel.y + 12, panel.w - 24, panel.h - 24, 22);
      ctx.strokeStyle = "rgba(255,255,255,0.055)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.globalAlpha = 0.16;
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const px = panel.x + panel.w * (0.20 + i * 0.13) + Math.sin(game.time * 0.35 + i) * 8;
        ctx.beginPath();
        ctx.moveTo(px, panel.y + 18);
        ctx.lineTo(px - panel.h * 0.42, panel.y + panel.h - 18);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      const accentH = Math.max(98, panel.h * 0.30);
      const accent = ctx.createLinearGradient(panel.x + 24, panel.y + 30, panel.x + 24, panel.y + 30 + accentH);
      accent.addColorStop(0, game.ruby);
      accent.addColorStop(1, "rgba(66,223,255,0.62)");
      ctx.fillStyle = accent;
      drawRoundedRect(panel.x + 24, panel.y + 30, 7, accentH, 6);
      ctx.fill();
      ctx.restore();
    }

    function drawMenuButton(rect, label, primary = false) {
      ctx.save();
      const hovered = mouse.x >= rect.x && mouse.x <= rect.x + rect.w && mouse.y >= rect.y && mouse.y <= rect.y + rect.h;
      const lift = hovered ? -2 : 0;
      const r = Math.min(18, rect.h * 0.38);

      ctx.shadowColor = primary ? "rgba(236,0,116,0.30)" : "rgba(0,0,0,0.35)";
      ctx.shadowBlur = primary ? 18 : 10;
      ctx.shadowOffsetY = 8;
      drawRoundedRect(rect.x, rect.y + lift, rect.w, rect.h, r);
      const g = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
      if (primary) {
        g.addColorStop(0, hovered ? "#ff2b9c" : "#f00078");
        g.addColorStop(0.55, "#a90055");
        g.addColorStop(1, "#43001f");
      } else {
        g.addColorStop(0, hovered ? "rgba(28,27,42,0.98)" : "rgba(16,17,27,0.96)");
        g.addColorStop(1, hovered ? "rgba(13,15,24,0.98)" : "rgba(7,8,14,0.98)");
      }
      ctx.fillStyle = g;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      const border = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y);
      border.addColorStop(0, primary ? "rgba(255,255,255,0.30)" : "rgba(236,0,116,0.82)");
      border.addColorStop(1, primary ? "rgba(66,223,255,0.28)" : "rgba(66,223,255,0.34)");
      ctx.strokeStyle = border;
      ctx.lineWidth = primary ? 2 : 2.4;
      ctx.stroke();

      ctx.save();
      drawRoundedRect(rect.x + 7, rect.y + lift + 7, rect.w - 14, rect.h - 14, Math.max(8, r - 7));
      ctx.strokeStyle = primary ? "rgba(255,255,255,0.16)" : "rgba(255,255,255,0.075)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      ctx.font = `950 ${rect.h >= 52 ? 18 : 14}px Inter, Segoe UI, Arial, Helvetica, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = primary ? "rgba(255,255,255,0.98)" : "rgba(255,255,255,0.86)";
      ctx.fillText(label, rect.x + rect.w / 2, rect.y + lift + rect.h / 2 + 0.5);

      if (primary) {
        ctx.globalAlpha = hovered ? 0.62 : 0.42;
        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.beginPath();
        ctx.moveTo(rect.x + rect.w - 40, rect.y + lift + rect.h / 2 - 7);

        ctx.lineTo(rect.x + rect.w - 40, rect.y + lift + rect.h / 2 + 7);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function getSettingsButtonRect() {
      return {
        x: canvas.width - 58,
        y: 24,
        w: 34,
        h: 34,
      };
    }

    function getSettingsPanelRect() {
      const isPhoneView = canvas.width < 820 || canvas.height < 520;
      const margin = isPhoneView ? 18 : 28;
      const w = Math.min(isPhoneView ? 560 : 760, canvas.width - margin * 2);
      const h = Math.min(isPhoneView ? 430 : 620, canvas.height - margin * 2);

      return {
        x: canvas.width / 2 - w / 2,
        y: canvas.height / 2 - h / 2,
        w,
        h,
      };
    }

    function getSettingsLayout(panel = getSettingsPanelRect()) {
      // En celular mantenemos un layout compacto. En PC dejamos que escale un poco más
      // para que el panel no se vea tan chico ni tan vacío.
      const isPhoneView = canvas.width < 820 || canvas.height < 520;
      const virtualW = 520;
      const virtualH = 390;
      const maxScale = isPhoneView ? 1 : 1.22;
      const scale = Math.min(maxScale, (panel.w - 34) / virtualW, (panel.h - 30) / virtualH);
      const x = panel.x + (panel.w - virtualW * scale) / 2;
      const yOffset = isPhoneView ? -4 : -2;
      const y = panel.y + (panel.h - virtualH * scale) / 2 + yOffset;

      const commandRect = isPhoneView
        ? { x: 18, y: 344, w: 198, h: 30 }
        : { x: 18, y: 344, w: 210, h: 30 };
      const applyRect = isPhoneView
        ? { x: 228, y: 344, w: 82, h: 30 }
        : { x: 242, y: 344, w: 70, h: 30 };
      const fullscreenRect = isPhoneView
        ? { x: 322, y: 344, w: 160, h: 30 }
        : { x: 324, y: 344, w: 176, h: 30 };

      return {
        panel,
        virtualW,
        virtualH,
        scale,
        x,
        y,
        rects: {
          closeX: { x: 478, y: 14, w: 28, h: 28 },
          fullscreen: fullscreenRect,
          wasd: { x: 18, y: 56, w: 484, h: 30 },
          cursor: { x: 18, y: 94, w: 484, h: 30 },
          mobileToggle: { x: 18, y: 158, w: 484, h: 28 },
          fieldMinus: { x: 18, y: 222, w: 112, h: 28 },
          fieldPlus: { x: 390, y: 222, w: 112, h: 28 },
          opacityMinus: { x: 18, y: 286, w: 112, h: 28 },
          opacityPlus: { x: 390, y: 286, w: 112, h: 28 },
          command: commandRect,
          apply: applyRect,
        }
      };
    }

    function pointInLocalRect(x, y, layout, rect) {
      const lx = (x - layout.x) / layout.scale;
      const ly = (y - layout.y) / layout.scale;
      return lx >= rect.x && lx <= rect.x + rect.w && ly >= rect.y && ly <= rect.y + rect.h;
    }

    function closeSettingsPanel() {
      game.settingsOpen = false;
      settingsCheatInput.blur();
      syncSettingsCheatBox();
      clearInputs();
      canvas.focus();
      syncMobileControlsState();
    }

    function handleSettingsClick(x, y) {
      const btn = getSettingsButtonRect();

      const clickedButton =
        x >= btn.x &&
        x <= btn.x + btn.w &&
        y >= btn.y &&
        y <= btn.y + btn.h;

      if (clickedButton) {
        game.settingsOpen = !game.settingsOpen;
        if (!game.settingsOpen) {
          closeSettingsPanel();
        } else {
          clearInputs();
          syncMobileControlsState();
        }
        return true;
      }

      if (!game.settingsOpen) {
        return false;
      }

      const panel = getSettingsPanelRect();
      const layout = getSettingsLayout(panel);
      const r = layout.rects;

      if (pointInLocalRect(x, y, layout, r.closeX)) {
        closeSettingsPanel();
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.fullscreen)) {
        toggleFullscreenMode();
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.wasd)) {
        game.dashMode = "wasd";
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.cursor)) {
        game.dashMode = "cursor";
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.mobileToggle)) {
        game.mobileControlsEnabled = !game.mobileControlsEnabled;
        mobileControlsUserEnabled = game.mobileControlsEnabled;
        refreshMobileControlsVisibility();
        showSettingsCommandMessage(game.mobileControlsEnabled ? "Controles móviles: ON" : "Controles móviles: OFF");
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.fieldMinus)) {
        game.arenaScale = Math.max(0.65, Math.round((game.arenaScale - 0.05) * 100) / 100);
        invalidateLayoutCache();
        keepPlayerInsideRoom();
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.fieldPlus)) {
        game.arenaScale = Math.min(1.05, Math.round((game.arenaScale + 0.05) * 100) / 100);
        invalidateLayoutCache();
        keepPlayerInsideRoom();
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.opacityMinus)) {
        game.touchControlsOpacity = Math.max(0, Math.round((game.touchControlsOpacity - 0.1) * 100) / 100);
        syncMobileControlsOpacity();
        return true;
      }

      if (pointInLocalRect(x, y, layout, r.opacityPlus)) {
        game.touchControlsOpacity = Math.min(1, Math.round((game.touchControlsOpacity + 0.1) * 100) / 100);
        syncMobileControlsOpacity();
        return true;
      }

      return true;
    }

    function drawSettingsIcon() {
      if (mobileInput.enabled) return;
      const btn = getSettingsButtonRect();
      const cx = btn.x + btn.w / 2;
      const cy = btn.y + btn.h / 2;

      ctx.save();

      drawRoundedRect(btn.x, btn.y, btn.w, btn.h, 9);
      ctx.fillStyle = "#101018";
      ctx.fill();
      ctx.strokeStyle = game.ruby;
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.translate(cx, cy);
      ctx.rotate(game.time * 0.35);
      ctx.strokeStyle = "rgba(255,255,255,0.88)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.stroke();

      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 10, Math.sin(a) * 10);
        ctx.lineTo(Math.cos(a) * 13, Math.sin(a) * 13);
        ctx.stroke();
      }

      ctx.restore();
    }



    function syncSettingsCheatBox(panel = getSettingsPanelRect()) {
      if (!game.settingsOpen) {
        settingsCheatBox.style.display = "none";
        return;
      }

      const layout = getSettingsLayout(panel);
      const r = layout.rects.command;
      const p = canvasToClientPoint(layout.x + r.x * layout.scale, layout.y + r.y * layout.scale);
      settingsCheatBox.style.left = `${Math.round(p.x)}px`;
      settingsCheatBox.style.top = `${Math.round(p.y)}px`;
      settingsCheatBox.style.transformOrigin = "top left";
      settingsCheatBox.style.transform = `scale(${layout.scale})`;
      settingsCheatInput.style.width = `${r.w}px`;
      settingsCheatApply.style.width = `${layout.rects.apply.w}px`;
      settingsCheatBox.style.display = "flex";
    }

    function drawSettingsPanel() {
      if (!game.settingsOpen) {
        syncSettingsCheatBox();
        if (document.activeElement === settingsCheatInput) settingsCheatInput.blur();
        return;
      }

      const panel = getSettingsPanelRect();
      const layout = getSettingsLayout(panel);
      const s = layout.scale;

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.76)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawRoundedRect(panel.x, panel.y, panel.w, panel.h, 24);
      const settingsGradient = ctx.createLinearGradient(panel.x, panel.y, panel.x, panel.y + panel.h);
      settingsGradient.addColorStop(0, "#151521");
      settingsGradient.addColorStop(1, "#080812");
      ctx.fillStyle = settingsGradient;
      ctx.fill();
      ctx.strokeStyle = "rgba(236,0,116,0.9)";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.strokeStyle = "rgba(236,0,116,0.18)";
      ctx.lineWidth = 1;
      ctx.strokeRect(panel.x + 16, panel.y + 16, panel.w - 32, panel.h - 32);

      ctx.translate(layout.x, layout.y);
      ctx.scale(s, s);

      const r = layout.rects;
      ctx.font = "900 24px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("CONFIGURACIÓN", layout.virtualW / 2, 34);

      drawSettingsCloseButton(r.closeX.x, r.closeX.y, r.closeX.w, r.closeX.h, "×");

      drawDashOption(r.wasd.x, r.wasd.y, r.wasd.w, r.wasd.h, "Dash por WASD", game.dashMode === "wasd");
      drawDashOption(r.cursor.x, r.cursor.y, r.cursor.w, r.cursor.h, "Dash por CURSOR", game.dashMode === "cursor");

      drawSettingsSectionTitle("CONTROLES CELULAR", 18, 143);
      drawToggleOption(r.mobileToggle.x, r.mobileToggle.y, r.mobileToggle.w, r.mobileToggle.h, game.mobileControlsEnabled ? "ACTIVADOS" : "DESACTIVADOS", game.mobileControlsEnabled);

      drawSettingsSectionTitle("TAMAÑO DEL CAMPO", 18, 207);
      drawFieldScaleButton(r.fieldMinus.x, r.fieldMinus.y, r.fieldMinus.w, r.fieldMinus.h, "ACHICAR", game.ruby);
      drawFieldScaleButton(r.fieldPlus.x, r.fieldPlus.y, r.fieldPlus.w, r.fieldPlus.h, "AGRANDAR", game.ruby);
      ctx.textAlign = "center";
      ctx.font = "900 17px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = game.ruby;
      ctx.fillText(`${Math.round(game.arenaScale * 100)}%`, layout.virtualW / 2, r.fieldMinus.y + r.fieldMinus.h / 2 + 1);

      drawSettingsSectionTitle("OPACIDAD DE LA UI", 18, 271);
      drawFieldScaleButton(r.opacityMinus.x, r.opacityMinus.y, r.opacityMinus.w, r.opacityMinus.h, "BAJAR", game.ruby);
      drawFieldScaleButton(r.opacityPlus.x, r.opacityPlus.y, r.opacityPlus.w, r.opacityPlus.h, "SUBIR", game.ruby);
      ctx.textAlign = "center";
      ctx.font = "900 17px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = game.ruby;
      ctx.fillText(`${Math.round(game.touchControlsOpacity * 100)}%`, layout.virtualW / 2, r.opacityMinus.y + r.opacityMinus.h / 2 + 1);

      drawSettingsSectionTitle("COMANDO", 18, 331);
      drawFieldScaleButton(r.apply.x, r.apply.y, r.apply.w, r.apply.h, "APLICAR", game.ruby);
      drawFieldScaleButton(r.fullscreen.x, r.fullscreen.y, r.fullscreen.w, r.fullscreen.h, "PANTALLA COMPLETA", game.ruby);

      ctx.font = "800 10px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = game.settingsCommandMessageTimer > 0 ? game.ruby : "rgba(255,255,255,0.42)";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(game.settingsCommandMessageTimer > 0 ? game.settingsCommandMessage : "Número, arma, H, P, SI, V, -V o I", 18, 390);

      ctx.restore();
      syncSettingsCheatBox(panel);
    }

    function drawSettingsSectionTitle(label, x, y) {
      ctx.font = "900 12px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.74)";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x, y);
    }

    function drawDashOption(x, y, w, h, label, active) {
      drawRoundedRect(x, y, w, h, h / 2);
      ctx.fillStyle = active ? "rgba(42,5,25,0.96)" : "rgba(13,14,23,0.96)";
      ctx.fill();
      ctx.strokeStyle = active ? "rgba(236,0,116,0.88)" : "rgba(255,255,255,0.16)";
      ctx.lineWidth = active ? 2.5 : 1.5;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x + 18, y + h / 2, 6.5, 0, Math.PI * 2);
      ctx.fillStyle = active ? game.ruby : "rgba(255,255,255,0.16)";
      ctx.fill();

      ctx.font = "900 12px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = active ? "rgba(255,255,255,0.96)" : "rgba(255,255,255,0.56)";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + 38, y + h / 2 + 1);
    }

    function drawSettingsCloseButton(x, y, w, h, label) {
      drawRoundedRect(x, y, w, h, h / 2);
      ctx.fillStyle = "rgba(28,8,21,0.94)";
      ctx.fill();
      ctx.strokeStyle = "rgba(236,0,116,0.86)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = label === "×" ? "900 22px Inter, Segoe UI, Arial, Helvetica, sans-serif" : "900 11px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.94)";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + w / 2, y + h / 2 + (label === "×" ? -1 : 1));
    }

    function drawFieldScaleButton(x, y, w, h, label, accent = "#42dfff") {
      drawRoundedRect(x, y, w, h, h / 2);
      ctx.fillStyle = "rgba(12,12,20,0.96)";
      ctx.fill();
      ctx.strokeStyle = accent === game.ruby ? "rgba(236,0,116,0.64)" : "rgba(66,223,255,0.52)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = "900 11px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    }

    function drawToggleOption(x, y, w, h, label, active) {
      drawRoundedRect(x, y, w, h, h / 2);
      ctx.fillStyle = active ? "rgba(42,5,25,0.92)" : "rgba(13,14,23,0.96)";
      ctx.fill();
      ctx.strokeStyle = active ? "rgba(236,0,116,0.82)" : "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.stroke();

      const knobRadius = 7;
      const knobX = active ? x + w - 18 : x + 18;
      ctx.beginPath();
      ctx.arc(knobX, y + h / 2, knobRadius, 0, Math.PI * 2);
      ctx.fillStyle = active ? game.ruby : "rgba(255,255,255,0.22)";
      ctx.fill();

      ctx.font = "900 11px Inter, Segoe UI, Arial, Helvetica, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    }

    /* UI FULLSCREEN POLISH alpha-09: menús integrados, consistencia visual e idioma español. */
    function getMenuLeftPanelRect() {
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      if (portrait) {
        const w = Math.min(canvas.width - 32, 430);
        const h = Math.min(canvas.height - 64, 620);
        return { x: canvas.width / 2 - w / 2, y: canvas.height / 2 - h / 2, w, h };
      }
      if (compact) {
        const w = Math.min(390, canvas.width * 0.52);
        const h = Math.min(canvas.height - 48, 440);
        return { x: 28, y: canvas.height / 2 - h / 2, w, h };
      }
      const w = Math.min(520, Math.max(430, canvas.width * 0.30));
      return { x: Math.max(96, canvas.width * 0.065), y: 96, w, h: canvas.height - 192 };
    }

    function getMenuRoomPanelRect() {
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      if (portrait) {
        const marginX = 14;
        const marginY = 26;
        return {
          x: marginX,
          y: marginY,
          w: canvas.width - marginX * 2,
          h: canvas.height - marginY * 2,
        };
      }
      const marginX = compact ? 32 : Math.max(128, canvas.width * 0.13);
      const marginY = compact ? 22 : 92;
      if (game.menuMode === "roomLobby" && game.multiplayer?.roomMode === "versus") {
        const leftReserve = compact ? 300 : 370;
        const x = Math.max(marginX, leftReserve);
        return {
          x,
          y: marginY,
          w: canvas.width - x - marginX,
          h: canvas.height - marginY * 2,
        };
      }
      return {
        x: marginX,
        y: marginY,
        w: canvas.width - marginX * 2,
        h: canvas.height - marginY * 2,
      };
    }

    function getMenuButtonRects() {
      const p = getMenuLeftPanelRect();
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const w = Math.min(p.w - (portrait ? 54 : 58), compact ? 300 : 360);
      const h = portrait ? 48 : (compact ? 42 : 56);
      const gap = portrait ? 12 : 14;
      const x = p.x + p.w / 2 - w / 2;
      const y = p.y + p.h - h * 3 - gap * 2 - (portrait ? 42 : 36);
      return {
        play: { x, y, w, h },
        multiplayer: { x, y: y + h + gap, w, h },
        settings: { x, y: y + (h + gap) * 2, w, h },
      };
    }

    function getMultiplayerButtonRects() {
      const p = getMenuLeftPanelRect();
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const w = Math.min(p.w - (portrait ? 54 : 58), compact ? 310 : 370);
      const h = portrait ? 44 : (compact ? 38 : 50);
      const gap = portrait ? 9 : 12;
      const x = p.x + p.w / 2 - w / 2;
      const y = p.y + p.h - h * 4 - gap * 3 - (portrait ? 34 : 30);
      return {
        create: { x, y, w, h },
        createNormal: { x, y, w, h },
        createVersus: { x, y: y + h + gap, w, h },
        join: { x, y: y + (h + gap) * 2, w, h },
        back: { x, y: y + (h + gap) * 3, w, h },
      };
    }

    function getJoinRoomButtonRects() {
      const p = getMenuRoomPanelRect();
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const w = Math.min(p.w - 54, portrait ? 330 : compact ? 360 : 430);
      const h = portrait ? 48 : compact ? 44 : 54;
      return { cancel: { x: p.x + p.w / 2 - w / 2, y: p.y + p.h - h - (portrait ? 34 : compact ? 28 : 38), w, h } };
    }

    function getRoomLobbyButtonRects() {
      const p = getMenuRoomPanelRect();
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const w = Math.min(p.w - 54, portrait ? 340 : compact ? 390 : 460);
      const h = portrait ? 46 : compact ? 42 : 54;
      const gap = portrait ? 10 : 14;
      const x = p.x + p.w / 2 - w / 2;
      const y = p.y + p.h - h * 2 - gap - (portrait ? 30 : compact ? 24 : 46);
      return { start: { x, y, w, h }, cancel: { x, y: y + h + gap, w, h } };
    }

    function getSettingsPanelRect() {
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const marginX = portrait ? 14 : (compact ? 24 : Math.max(86, canvas.width * 0.08));
      const marginY = portrait ? 24 : (compact ? 18 : Math.max(54, canvas.height * 0.07));
      return { x: marginX, y: marginY, w: canvas.width - marginX * 2, h: canvas.height - marginY * 2 };
    }

    function getSettingsLayout(panel = getSettingsPanelRect()) {
      const virtualW = 720;
      const virtualH = 430;
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const scale = Math.min(portrait ? 0.86 : compact ? 0.92 : 1.25, (panel.w - 36) / virtualW, (panel.h - 40) / virtualH);
      const x = panel.x + (panel.w - virtualW * scale) / 2;
      const y = panel.y + (panel.h - virtualH * scale) / 2;
      return {
        panel, virtualW, virtualH, scale, x, y,
        rects: {
          closeX: { x: 670, y: 16, w: 34, h: 34 },
          wasd: { x: 40, y: 96, w: 300, h: 42 },
          cursor: { x: 356, y: 96, w: 324, h: 42 },
          mobileToggle: { x: 40, y: 184, w: 300, h: 42 },
          fieldMinus: { x: 40, y: 278, w: 124, h: 38 },
          fieldPlus: { x: 278, y: 278, w: 124, h: 38 },
          opacityMinus: { x: 438, y: 278, w: 124, h: 38 },
          opacityPlus: { x: 556, y: 278, w: 124, h: 38 },
          command: { x: 40, y: 364, w: 260, h: 38 },
          apply: { x: 314, y: 364, w: 110, h: 38 },
          fullscreen: { x: 438, y: 364, w: 242, h: 38 },
        }
      };
    }

    function drawMenuBackground() {
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, "#020207");
      bg.addColorStop(0.48, "#080813");
      bg.addColorStop(1, "#030205");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.strokeStyle = "rgba(236,0,116,0.24)";
      ctx.lineWidth = 1;
      const grid = 64;
      for (let x = (game.time * 3) % grid; x < canvas.width + grid; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height + grid; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.20;
      ctx.strokeStyle = "rgba(236,0,116,0.44)";
      ctx.lineWidth = 2;
      const cx = canvas.width * 0.58;
      const cy = canvas.height * 0.56;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(cx, cy, 170 + i * 120, -0.35, Math.PI * 1.08);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "rgba(236,0,116,0.32)";
      ctx.beginPath();
      ctx.moveTo(canvas.width * 0.08, canvas.height);
      ctx.lineTo(canvas.width * 0.20, canvas.height);
      ctx.lineTo(canvas.width * 0.36, 0);
      ctx.lineTo(canvas.width * 0.30, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      const vignette = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 80, canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.72);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,0.82)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawFullscreenSurface(x, y, w, h, opts = {}) {
      ctx.save();
      const r = opts.radius || 10;
      drawRoundedRect(x, y, w, h, r);
      const g = ctx.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, opts.strong ? "rgba(17,17,28,0.82)" : "rgba(12,13,22,0.54)");
      g.addColorStop(1, "rgba(5,6,12,0.80)");
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = opts.accent === "cyan" ? "rgba(66,223,255,0.38)" : "rgba(236,0,116,0.45)";
      ctx.lineWidth = opts.lineWidth || 1.5;
      ctx.stroke();
      ctx.restore();
    }

    function drawMenuPanelDecor(panel) {
      drawFullscreenSurface(panel.x, panel.y, panel.w, panel.h, { strong: false, radius: 6, lineWidth: 1.5 });
      ctx.save();
      const accent = ctx.createLinearGradient(panel.x + 24, panel.y + 28, panel.x + 24, panel.y + panel.h * 0.38);
      accent.addColorStop(0, game.ruby);
      accent.addColorStop(1, "#42dfff");
      ctx.fillStyle = accent;
      drawRoundedRect(panel.x + 28, panel.y + 28, 6, Math.max(120, panel.h * 0.24), 4);
      ctx.fill();
      ctx.globalAlpha = 0.10;
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      for (let i = 0; i < 8; i++) {
        const px = panel.x + panel.w * (0.16 + i * 0.12);
        ctx.beginPath();
        ctx.moveTo(px, panel.y + 24);
        ctx.lineTo(px - panel.h * 0.28, panel.y + panel.h - 24);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMenuButton(rect, label, primary = false) {
      ctx.save();
      const hovered = pointInRect(mouse.x, mouse.y, rect);
      const r = 8;
      drawRoundedRect(rect.x, rect.y, rect.w, rect.h, r);
      const g = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
      if (primary) {
        g.addColorStop(0, hovered ? "#ff1b91" : "#ec0074");
        g.addColorStop(1, "#62002f");
      } else {
        g.addColorStop(0, hovered ? "rgba(23,21,34,0.98)" : "rgba(12,13,22,0.92)");
        g.addColorStop(1, "rgba(5,6,12,0.96)");
      }
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = primary ? "rgba(255,255,255,0.18)" : "rgba(66,223,255,0.36)";
      ctx.lineWidth = primary ? 2 : 1.8;
      ctx.stroke();
      ctx.font = `950 ${rect.h >= 54 ? 18 : 15}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,255,255,0.94)";
      ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
      if (primary) {
        ctx.globalAlpha = 0.42;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(rect.x + rect.w - 38, rect.y + rect.h / 2 - 7);
        ctx.lineTo(rect.x + rect.w - 23, rect.y + rect.h / 2);
        ctx.lineTo(rect.x + rect.w - 38, rect.y + rect.h / 2 + 7);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMenuKicker(text, x, y, align = "left") {
      ctx.save();
      ctx.font = "950 11px Inter, Segoe UI, Arial, sans-serif";
      ctx.fillStyle = "#42dfff";
      ctx.textAlign = align;
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawMenuTitle(lines, x, y, align = "left", size = 58) {
      ctx.save();
      ctx.textAlign = align;
      ctx.textBaseline = "middle";
      ctx.font = `950 ${size}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.fillText(lines[0], x, y);
      if (lines[1]) {
        ctx.fillStyle = game.ruby;
        ctx.fillText(lines[1], x, y + size * 0.92);
      }
      ctx.restore();
    }

    function drawIOSFullscreenInstallHint() {
      if (!isIOSDevice() || isIOSStandaloneMode()) return;
      if (game.menuMode !== "main") return;

      const portrait = isPortraitMenuLayout();
      const panel = getMenuLeftPanelRect();
      const b = getMenuButtonRects();
      const w = Math.min(panel.w - 48, portrait ? 330 : 360);
      const h = portrait ? 42 : 44;
      const x = panel.x + panel.w / 2 - w / 2;
      const y = Math.min(panel.y + panel.h - h - 12, b.settings.y + b.settings.h + (portrait ? 14 : 18));

      ctx.save();
      drawRoundedRect(x, y, w, h, 8);
      ctx.fillStyle = "rgba(6,8,14,0.78)";
      ctx.fill();
      ctx.strokeStyle = "rgba(66,223,255,0.42)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${portrait ? 9 : 10}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = "#42dfff";
      ctx.fillText("iPhone: compartir -> Agregar a pantalla de inicio", x + w / 2, y + h / 2 - 6);
      ctx.fillStyle = "rgba(255,255,255,0.54)";
      ctx.fillText("desde ahí abre sin barra del navegador", x + w / 2, y + h / 2 + 8);
      ctx.restore();
    }

    function drawMainMenu() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMenuBackground();
      const panel = (game.menuMode === "joinRoom" || game.menuMode === "roomLobby") ? getMenuRoomPanelRect() : getMenuLeftPanelRect();
      drawMenuPanelDecor(panel);
      const portrait = isPortraitMenuLayout();
      const compact = isCompactLandscapeMenuLayout();
      const titleX = portrait ? panel.x + panel.w / 2 : panel.x + 60;
      const titleY = panel.y + (portrait ? 82 : compact ? 78 : 110);
      const align = portrait ? "center" : "left";

      if (game.menuMode === "main") {
        drawMenuTitle(["DUNGEON", "SHAPES"], titleX, titleY, align, portrait ? 42 : compact ? 44 : 60);
        ctx.save();
        ctx.font = "900 12px Inter, Segoe UI, Arial, sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.50)";
        ctx.textAlign = align;
        ctx.fillText("DASH / DODGE / SURVIVE", titleX, titleY + (portrait ? 94 : compact ? 88 : 126));
        ctx.fillStyle = "#42dfff";
        ctx.fillText("ROGUELIKE ROOM BASE", titleX, titleY + (portrait ? 118 : compact ? 110 : 150));
        ctx.restore();
        const b = getMenuButtonRects();
        drawMenuButton(b.play, "JUGAR", true);
        drawMenuButton(b.multiplayer, "MULTIJUGADOR", false);
        drawMenuButton(b.settings, "AJUSTES", false);
        drawIOSFullscreenInstallHint();
        drawMenuPreview();
      } else if (game.menuMode === "multiplayer") {
        drawMultiplayerMenu(panel);
      } else if (game.menuMode === "joinRoom") {
        drawJoinRoomMenu(panel);
      } else if (game.menuMode === "roomLobby") {
        drawRoomLobbyMenu(panel);
      }

      drawVersionWatermark();
      if (!game.settingsOpen) syncSettingsCheatBox();
      drawSettingsPanel();
    }

    function drawMenuPreview() {
      if (isPortraitMenuLayout()) return;
      const left = getMenuLeftPanelRect();
      const x = left.x + left.w + 90;
      const y = Math.max(116, canvas.height * 0.23);
      const w = canvas.width - x - Math.max(86, canvas.width * 0.06);
      const h = Math.min(430, canvas.height * 0.48);
      drawFullscreenSurface(x, y, w, h, { accent: "ruby", radius: 10, lineWidth: 2 });
      ctx.save();
      ctx.fillStyle = "rgba(236,0,116,0.18)";
      ctx.fillRect(x, y, w, 46);
      ctx.font = "900 12px Inter, Segoe UI, Arial, sans-serif";
      ctx.textBaseline = "middle";

    function drawGameOverText() {
      if (game.state !== "gameOver" && game.state !== "fadeOut") return;

      const t = Math.min(game.gameOverTextTimer / 0.28, 1);
      const alpha = easeOutCubic(t);
      const blackAlpha = 0.92 * easeOutCubic(Math.min(game.gameOverTextTimer / 0.22, 1));
      const pulse = 0.5 + 0.5 * Math.sin(game.time * 5.8);
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const mobile = isMobileLikeDevice();
      const panelW = Math.min(mobile ? 330 : 520, canvas.width - 34);
      const panelH = mobile ? 210 : 250;
      const panelX = cx - panelW / 2;
      const panelY = cy - panelH / 2;

      ctx.save();

      // Apagón rápido: cubre todo el gameplay y las UIs de canvas casi al instante,
      // pero la pantalla de muerte se dibuja encima y queda visible.
      ctx.globalAlpha = blackAlpha;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalAlpha = alpha;

      const vignette = ctx.createRadialGradient(cx, cy, panelW * 0.10, cx, cy, Math.max(canvas.width, canvas.height) * 0.72);
      vignette.addColorStop(0, "rgba(236,0,116,0.00)");
      vignette.addColorStop(0.55, "rgba(236,0,116,0.08)");
      vignette.addColorStop(1, "rgba(236,0,116,0.34)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Líneas de ruptura horizontales, baratas y con estética JSAB.
      ctx.save();
      ctx.globalAlpha = alpha * (0.25 + pulse * 0.12);
      ctx.strokeStyle = "rgba(236,0,116,0.55)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 9; i++) {
        const y = panelY - 72 + i * 31 + Math.sin(game.time * 1.7 + i) * 5;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y + Math.sin(i * 1.9) * 8);
        ctx.stroke();
      }
      ctx.restore();

      // Panel principal sólido.
      drawRoundedRect(panelX, panelY, panelW, panelH, 28);
      const g = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
      g.addColorStop(0, "rgba(18,10,20,0.96)");
      g.addColorStop(0.48, "rgba(8,9,16,0.98)");
      g.addColorStop(1, "rgba(5,5,10,0.98)");
      ctx.fillStyle = g;
      ctx.fill();

      drawRoundedRect(panelX, panelY, panelW, panelH, 28);
      ctx.strokeStyle = "rgba(236,0,116,0.92)";
      ctx.lineWidth = mobile ? 3 : 4;
      ctx.stroke();

      // Borde interior.
      drawRoundedRect(panelX + 12, panelY + 12, panelW - 24, panelH - 24, 22);
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();

      // Icono de jugador/rombo roto.
      const coreY = panelY + (mobile ? 42 : 52);
      ctx.save();
      ctx.translate(cx, coreY);
      ctx.rotate(Math.PI / 4 + Math.sin(game.time * 2.5) * 0.04);
      ctx.fillStyle = "rgba(236,0,116,0.88)";
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.rect(-13, -13, 26, 26);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = "rgba(5,5,10,0.72)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-10, -1);
      ctx.lineTo(-1, -5);
      ctx.lineTo(4, 3);
      ctx.lineTo(12, 0);
      ctx.stroke();
      ctx.restore();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.font = `900 ${mobile ? 42 : 64}px Inter, Segoe UI, Arial, Helvetica, sans-serif`;
      ctx.fillStyle = "rgba(236,0,116,0.22)";
      ctx.fillText("PARTIDA FALLADA", cx + 3, panelY + (mobile ? 88 : 112) + 3);

      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.fillText("PARTIDA FALLADA", cx, panelY + (mobile ? 88 : 112));

      ctx.font = `800 ${mobile ? 12 : 14}px Inter, Segoe UI, Arial, Helvetica, sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.58)";
      ctx.fillText("JUGADOR ELIMINADO", cx, panelY + (mobile ? 121 : 151));

      // Stats simples.

      drawDeathStat(cx, statY, "PUNTOS", String(game.deathPoints ?? game.points), mobile);
      drawDeathStat(cx + gap, statY, "TIEMPO", formatDeathTime(game.deathTime || game.time), mobile);

      drawSkipGameOverHint(alpha, panelY + panelH + (mobile ? 18 : 24), mobile);

      ctx.restore();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);

    function drawFade() {
      if (game.fade <= 0) return;

    function drawFearOverlay() {
      const fear = getFearVisualAmount();
      if (fear <= 0.01) return;
      const heartbeat = getFearHeartbeatAmount() * fear;
      const r = room.getRect();

      // Efecto de 1 vida optimizado:
      // - sin ctx.filter, sin blur real sobre todo el canvas;
      // - mantiene sensación de baja saturación con una capa gris oscura;
      // - mantiene heartbeat/shake con borde ruby y viñeta suave.
      ctx.save();
      ctx.globalAlpha = (0.16 + heartbeat * 0.035) * fear;
      ctx.fillStyle = "#0b0b10";
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = (0.050 + heartbeat * 0.075) * fear;
      ctx.strokeStyle = game.ruby;
      ctx.lineWidth = 4 + heartbeat * 5;
      ctx.strokeRect(Math.round(r.x) + 3, Math.round(r.y) + 3, Math.round(r.w) - 6, Math.round(r.h) - 6);
      ctx.restore();

      ctx.save();
      const grd = ctx.createRadialGradient(
        player.x, player.y, Math.min(r.w, r.h) * 0.12,
        player.x, player.y, Math.max(r.w, r.h) * 0.78
      );
      grd.addColorStop(0, "rgba(0,0,0,0)");
      grd.addColorStop(0.62, `rgba(18,0,12,${(0.035 + heartbeat * 0.025) * fear})`);
      grd.addColorStop(1, `rgba(70,0,34,${(0.18 + heartbeat * 0.08) * fear})`);
      ctx.fillStyle = grd;
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.restore();
    }

    function drawWaveFlash() {
      if (game.waveFlashTimer <= 0) return;

      const t = game.waveFlashTimer / game.waveFlashDuration;
      ctx.save();
      ctx.globalAlpha = t * 0.18;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = t * 0.20;
      ctx.fillStyle = game.ruby;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function currentCombatWaveHasTopBoss() {
      return game.waveState === "combat" && (game.wave === 10 || game.wave === 20 || game.wave === 2000);

    function getBossEnemy() {
      if (!currentCombatWaveHasTopBoss()) return null;
      return enemies.find(enemy => enemy.type === "linebreaker" || enemy.type === "doupulserFinal" || enemy.type === "doupulser" || enemy.type === "secretBoss") || null;
    }

    function drawBossUI() {
      const boss = getBossEnemy();
      if (!boss || game.state === "menu") return;

      const info = getBossDisplayInfo(boss);
      const barW = Math.min(620, canvas.width * 0.56);
      const barH = 16;
      const x = canvas.width / 2 - barW / 2;
      const y = 34;
      const hpPercent = Math.max(0, boss.hpVisual / boss.maxHp);
      if (boss.type === "linebreaker") sanitizeLinebreakerShield(boss);
      const shieldActive = boss.type === "linebreaker" && Number.isFinite(boss.shieldHp) && boss.shieldHp > 0;
      const shieldPercent = shieldActive ? clamp(boss.shieldHp / Math.max(0.001, boss.maxHp), 0, 1) : 0;
      const shieldFull = shieldActive && boss.shieldHp >= (boss.shieldMaxHp || 20) - 0.001;
      const shieldFitsInMain = shieldActive && !shieldFull && hpPercent + shieldPercent <= 1;
      const panelH = shieldActive && !shieldFitsInMain ? 68 : 54;

      ctx.save();
      drawRoundedRect(x - 18, y - 26, barW + 36, panelH, 18);
      ctx.fillStyle = "rgba(8,10,16,0.72)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.font = "900 24px Inter, Montserrat, Arial, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.fillText(info.name, canvas.width / 2, y - 6);

      if (info.sub) {
        ctx.font = "800 11px Inter, Montserrat, Arial, sans-serif";
        ctx.fillStyle = info.color;
        ctx.fillText(info.sub.toUpperCase(), canvas.width / 2, y - 28);
      }

      drawRoundedRect(x, y, barW, barH, barH / 2);
      ctx.fillStyle = "rgba(12,12,18,0.92)";
      ctx.fill();

      if (boss.hpBackVisual == null) boss.hpBackVisual = boss.maxHp;
      boss.hpBackVisual += ((boss.hpVisual ?? boss.hp) - boss.hpBackVisual) * 0.09;
      const backPercent = Math.max(0, boss.hpBackVisual / boss.maxHp);
      if (backPercent > 0) {
        drawRoundedRect(x, y, barW * backPercent, barH, barH / 2);
        ctx.fillStyle = "rgba(255,255,255,0.14)";
        ctx.fill();
      }

      if (hpPercent > 0) {
        drawRoundedRect(x, y, barW * hpPercent, barH, barH / 2);
        ctx.fillStyle = info.color;
        ctx.fill();
      }

      if (shieldFitsInMain) {
        const sx = x + barW * hpPercent;
        const sw = Math.min(barW - barW * hpPercent, barW * shieldPercent);
        if (sw > 1) {
          drawRoundedRect(sx, y, sw, barH, barH / 2);
          ctx.fillStyle = "#42dfff";
          ctx.fill();
        }
      }

      drawRoundedRect(x, y, barW, barH, barH / 2);
      ctx.strokeStyle = info.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      if (shieldActive && !shieldFitsInMain) {
        const shieldY = y + barH + 7;
        const shieldW = barW * clamp(boss.shieldHp / Math.max(0.001, boss.shieldMaxHp || 20), 0, 1);
        drawRoundedRect(x, shieldY, barW, 7, 3.5);
        ctx.fillStyle = "rgba(6,22,28,0.92)";
        ctx.fill();
        if (shieldW > 0) {
          drawRoundedRect(x, shieldY, shieldW, 7, 3.5);
          ctx.fillStyle = "#42dfff";
          ctx.fill();
        }
      }

      ctx.restore();
    }

      const barY = y + 64;
      const barW = cardW - 36;

        ctx.textAlign = "left";

      ctx.restore();

    function drawWaveBanner() {
      if (game.waveBannerTimer <= 0) return;
      const mobileBanner = mobileInput.enabled;
      const p = 1 - game.waveBannerTimer / game.waveBannerDuration;
      const fadeOutPoint = mobileBanner ? 0.24 : 0.45;
      const alpha = p < 0.18 ? p / 0.18 : (game.waveBannerTimer < fadeOutPoint ? game.waveBannerTimer / fadeOutPoint : 1);
      const slide = (1 - Math.min(1, p * 2.2)) * (mobileBanner ? 10 : 18);
      const title = game.waveBannerText || "";
      const sub = game.waveBannerSubText || "";

      ctx.save();
      ctx.globalAlpha = alpha * (mobileBanner ? 0.82 : 0.95);
      const w = mobileBanner ? Math.min(260, canvas.width - 96) : Math.min(360, canvas.width - 40);
      const h = mobileBanner ? (sub ? 48 : 40) : (sub ? 72 : 56);
      const x = canvas.width / 2 - w / 2;
      const y = mobileBanner ? 76 - slide : canvas.height * 0.17 - slide;
      drawRoundedRect(x, y, w, h, mobileBanner ? 13 : 18);
      ctx.fillStyle = mobileBanner ? "rgba(7,9,15,0.52)" : "rgba(7,9,15,0.78)";
      ctx.fill();
      ctx.strokeStyle = mobileBanner ? "rgba(255,255,255,0.045)" : "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = mobileBanner ? "900 15px Inter, Montserrat, Arial, sans-serif" : "900 22px Inter, Montserrat, Arial, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.fillText(title, canvas.width / 2, y + (sub ? (mobileBanner ? 18 : 28) : (mobileBanner ? 21 : 30)));
      if (sub) {
        ctx.font = mobileBanner ? "800 9px Inter, Montserrat, Arial, sans-serif" : "800 11px Inter, Montserrat, Arial, sans-serif";
        ctx.fillStyle = game.ruby;
        ctx.fillText(sub.toUpperCase(), canvas.width / 2, y + (mobileBanner ? 34 : 50));
      }
      ctx.restore();
    }

      const pickup = game.healPickup;
      if (!pickup) return;

      const pulse = 1 + Math.sin(game.time * 6) * 0.18;
      const radius = pickup.radius * pulse;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.beginPath();
      ctx.arc(pickup.x, pickup.y, radius + 10, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(66,255,202,0.10)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(pickup.x, pickup.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = pickup.color;
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.75)";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function drawUpgradePickup() {
      const pickup = game.upgradePickup;
      if (!pickup || game.upgradeShopOpen) return;

      const pulse = 1 + Math.sin(game.time * 6) * 0.18;
      const radius = pickup.radius * pulse;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.beginPath();
      ctx.arc(pickup.x, pickup.y, radius + 10, 0, Math.PI * 2);

      ctx.globalCompositeOperation = "source-over";
      ctx.beginPath();
      ctx.arc(pickup.x, pickup.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = pickup.color || "#42dfff";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(pickup.x, pickup.y, radius + 5, 0, Math.PI * 2);
      ctx.strokeStyle = pickup.type === "pulsador" ? "rgba(66,255,202,0.85)" : "rgba(66,223,255,0.85)";

      ctx.stroke();
      ctx.restore();

    function drawDebugHitboxes() {
      if (!game.showHitboxes) return;

      const HITBOX_COLORS = {
        player: "#26ff00",
        danger: "#ff0022",
        wall: "#1200d6",
        playerShot: "#00bdd6",
      };

      const drawCircleHitbox = (x, y, radius, color, label) => {
        if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(radius) || radius <= 0) return;
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([7, 4]);
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        if (label) {
          ctx.font = "800 9px Inter, Segoe UI, Arial, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = color;
          ctx.fillText(label, x, y - radius - 9);
        }
        ctx.restore();
      };

      const drawRectHitbox = (x, y, w, h, color, label) => {
        if (![x, y, w, h].every(Number.isFinite) || w <= 0 || h <= 0) return;
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([7, 4]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);
        if (label) {
          ctx.font = "800 9px Inter, Segoe UI, Arial, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = color;
          ctx.fillText(label, x + w / 2, y - 8);
        }
        ctx.restore();
      };

      ctx.save();
      ctx.globalCompositeOperation = "source-over";

      // Jugador: verde.
      drawCircleHitbox(player.x, player.y, getPlayerHitRadius(), HITBOX_COLORS.player, "PLAYER");

      // Enemigos: hitbox grande para recibir daño/disparos.
      // Si dañan por contacto, además muestran una hitbox chica de daño.
      for (const enemy of enemies) {
        drawCircleHitbox(enemy.x, enemy.y, getEnemyBodyHitRadius(enemy), HITBOX_COLORS.danger, enemy.type.toUpperCase());
        if (enemy.type === "kamikaze") {
          drawCircleHitbox(enemy.x, enemy.y, getEnemyContactHitRadius(enemy), HITBOX_COLORS.danger, "DMG");
        }
      }

      // Proyectiles: rojos si dañan al jugador, celestes si los lanza el jugador.
      for (const p of projectiles) {
        const r = p.enemyProjectile ? getEnemyProjectileHitHalfSize(p) : getPlayerProjectileHitHalfSize(p);
        drawCircleHitbox(
          p.x,
          p.y,
          r,
          p.enemyProjectile ? HITBOX_COLORS.danger : HITBOX_COLORS.playerShot,
          p.enemyProjectile ? "E BULLET" : "BULLET"
        );
      }

      // Pulsos: rojo si dañan al jugador, celeste si los lanza el jugador.
      for (const ring of pulserRings) {
        const band = getRingHitHalfThickness(ring);
        const ringColor = ring.damageEnemies ? HITBOX_COLORS.playerShot : HITBOX_COLORS.danger;
        drawCircleHitbox(ring.x, ring.y, Math.max(0, ring.radius - band), ringColor, "");
        drawCircleHitbox(ring.x, ring.y, ring.radius + band, ringColor, ring.damageEnemies ? "PULSE P" : "PULSE");
      }

      // Hazards/boss attacks: rojo.
      for (const hazard of bossHazards) {
        if (hazard.type === "linebreakerLaser") {
          const pos = getLinebreakerHazardPos(hazard);
          const w = getDangerLineHitWidth(hazard.width || 1);
          if (hazard.axis === "h") drawRectHitbox(-140, pos - w / 2, canvas.width + 280, w, HITBOX_COLORS.danger, "LINE");
          else drawRectHitbox(pos - w / 2, -140, w, canvas.height + 280, HITBOX_COLORS.danger, "LINE");
        } else if (hazard.type === "doupBlaster") {
          drawCircleHitbox(hazard.x, hazard.y, hazard.radius, HITBOX_COLORS.danger, "BLAST");
        } else if (hazard.type === "doupDroub") {
          const rayHalf = getDangerRayHitHalfWidth(hazard.rayWidth);
          for (let i = 0; i < hazard.rays; i++) {
            const angle = hazard.rotation - Math.PI / 2 + i * Math.PI * 2 / hazard.rays;
            const cx = hazard.x + Math.cos(angle) * hazard.rayLength / 2;
            const cy = hazard.y + Math.sin(angle) * hazard.rayLength / 2;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            drawRectHitbox(-hazard.rayLength / 2, -rayHalf, hazard.rayLength, rayHalf * 2, HITBOX_COLORS.danger, "RAY");
            ctx.restore();
          }
        }
      }

      // Paredes/obstáculos: azul.
      const rr = room.getRect();
      drawRectHitbox(rr.x, rr.y, rr.w, rr.h, HITBOX_COLORS.wall, "ROOM");
      for (const obstacle of obstacles) {
        drawRectHitbox(obstacle.x, obstacle.y, obstacle.w, obstacle.h, HITBOX_COLORS.wall, "WALL");
      }

      ctx.restore();
    }

    function drawDebugOverlay() {
      if (!game.debugOverlay) return;

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "800 10px Inter, Segoe UI, Arial, sans-serif";

      const lines = [
        `online: ${isOnlineMatchActive() ? "open" : onlineRoom.reconnecting ? "reconnecting" : "off"} ${onlineRoom.playerId || "-"}`,
        `players: ${getOnlineConnectedPlayerIds().join(",") || "-"}`,
        `wave: ${game.wave} ${game.waveState}`,
        `aimLock: ${game.preciseAimLockId || "-"}`
      ];

      const w = 210;
      const h = 18 + lines.length * 14;
      drawRoundedRect(12, 12, w, h, 8);
      ctx.fillStyle = "rgba(0,0,0,0.68)";
      ctx.fill();
      ctx.strokeStyle = "rgba(66,223,255,0.65)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = "#42dfff";
      lines.forEach((line, i) => ctx.fillText(line, 22, 22 + i * 14));

      for (const enemy of enemies) {
        if (!isPreciseAimTargetValid(enemy)) continue;
        const id = getPreciseAimTargetId(enemy);
        const locked = id === game.preciseAimLockId;
        const vx = Number(enemy.netVx) || 0;
        const vy = Number(enemy.netVy) || 0;

        ctx.save();
        ctx.textAlign = "center";
        ctx.font = "800 9px Inter, Segoe UI, Arial, sans-serif";
        ctx.fillStyle = locked ? "#42dfff" : "rgba(255,255,255,0.65)";
        ctx.fillText(`${id} ${enemy.type}`, enemy.x, enemy.y - enemy.size / 2 - 24);
        if (Math.hypot(vx, vy) > 4) {
          ctx.strokeStyle = locked ? "#42dfff" : "rgba(255,255,255,0.38)";
          ctx.lineWidth = locked ? 2 : 1;
          ctx.beginPath();
          ctx.moveTo(enemy.x, enemy.y);
          ctx.lineTo(enemy.x + vx * 0.18, enemy.y + vy * 0.18);
          ctx.stroke();
        }
        ctx.restore();
      }

      ctx.restore();
    }

    function draw() {
      syncMobileControlsState();
      if (game.state === "menu") {
        drawMainMenu();
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const fear = getFearVisualAmount();
      ctx.save();
      if (fear > 0.01) {
        // El ctx.filter con blur/saturate en todo el canvas era el causante del lag.
        // Conservamos el heartbeat shake, pero sin filtros globales pesados.
        const beat = getFearHeartbeatAmount();
        const heartbeatShake = beat * 1.85 * fear;
        const sx = Math.sin(game.time * 72.0) * heartbeatShake;
        const sy = Math.cos(game.time * 64.0) * heartbeatShake;
        ctx.translate(sx, sy);
      }

      drawStageBackground();

      ctx.save();
      ctx.translate(game.screenShakeX || 0, game.screenShakeY || 0);
      drawRoom();
      drawRoomPulses();
      drawObstacles();
      drawDashTrail();
      drawDashBursts();
      drawHazards();
      drawBossHazards();
      drawUpgradePickup();
      drawHealPickup();
      drawEnemies();
      drawRemoteOnlinePlayer();
      drawPlayer();
      drawFloatingTexts();
      ctx.restore();

      drawWaveUI();
      if (!isOnlineVersusMode()) drawBossUI();
      drawWaveBanner();
      drawWaveFlash();
      drawStaminaBar();
      if (!isOnlineVersusMode()) drawXPBar();
      drawLives();
      drawFearOverlay();
      ctx.restore();

      drawSettingsIcon();
      drawSettingsPanel();
      if (!isOnlineVersusMode()) {
        drawUpgradeShop();
        drawXPChoiceUI();
        drawOnlineReviveUI();
      }

      // En muerte/fadeOut, el fade negro no debe tapar la pantalla de muerte.
      // Primero dibujamos el negro y después el panel de muerte por encima.
      if (game.state === "gameOver" || game.state === "fadeOut") {
        drawFade();
        drawGameOverText();
      } else {
        drawGameOverText();
        drawFade();
      }

      // Debug por encima de TODO: juego, HUD, paneles y fades.
      drawDebugHitboxes();
      drawDebugOverlay();
    }

    function keepPlayerOutsideObstacles() {
      for (const obstacle of obstacles) {
        pushCircleOutsideRect(player, obstacle);
      }
    }

    function keepEnemyOutsideObstacles(enemy) {
      const enemyCircle = {
        x: enemy.x,
        y: enemy.y,
        radius: enemy.size / 2,
      };

      for (const obstacle of obstacles) {
        pushCircleOutsideRect(enemyCircle, obstacle);
      }

      enemy.x = enemyCircle.x;
      enemy.y = enemyCircle.y;
    }

    function pushCircleOutsideRect(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      let dx = circle.x - closestX;
      let dy = circle.y - closestY;
      let distSq = dx * dx + dy * dy;

      if (distSq === 0) {
        const left = Math.abs(circle.x - rect.x);
        const right = Math.abs(circle.x - (rect.x + rect.w));
        const top = Math.abs(circle.y - rect.y);
        const bottom = Math.abs(circle.y - (rect.y + rect.h));
        const min = Math.min(left, right, top, bottom);

        dx = 0;
        dy = 0;

        if (min === left) dx = -1;
        else if (min === right) dx = 1;
        else if (min === top) dy = -1;
        else dy = 1;

        distSq = 1;
      }

      const radiusSq = circle.radius * circle.radius;

      if (distSq < radiusSq) {
        const dist = Math.sqrt(distSq);
        const push = circle.radius - dist;
        circle.x += (dx / dist) * push;
        circle.y += (dy / dist) * push;
      }
    }

    function projectileHitsObstacle(p) {
      const projectileRect = {
        x: p.x - p.size / 2,
        y: p.y - p.size / 2,
        w: p.size,
        h: p.size,
      };

      return obstacles.some(obstacle => rectsOverlap(projectileRect, obstacle));
    }

    function lineIntersectsRect(x1, y1, x2, y2, rect) {
      let tMin = 0;
      let tMax = 1;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const minX = rect.x;
      const maxX = rect.x + rect.w;
      const minY = rect.y;
      const maxY = rect.y + rect.h;

      if (Math.abs(dx) < 0.000001) {
        if (x1 < minX || x1 > maxX) return false;
      } else {
        const invDx = 1 / dx;
        let tx1 = (minX - x1) * invDx;
        let tx2 = (maxX - x1) * invDx;
        if (tx1 > tx2) { const temp = tx1; tx1 = tx2; tx2 = temp; }
        tMin = Math.max(tMin, tx1);
        tMax = Math.min(tMax, tx2);
        if (tMin > tMax) return false;
      }

      if (Math.abs(dy) < 0.000001) {
        if (y1 < minY || y1 > maxY) return false;
      } else {
        const invDy = 1 / dy;
        let ty1 = (minY - y1) * invDy;
        let ty2 = (maxY - y1) * invDy;
        if (ty1 > ty2) { const temp = ty1; ty1 = ty2; ty2 = temp; }
        tMin = Math.max(tMin, ty1);
        tMax = Math.min(tMax, ty2);
        if (tMin > tMax) return false;
      }

      return true;
    }

    function hasLineOfSight(x1, y1, x2, y2) {
      return !obstacles.some(obstacle => lineIntersectsRect(x1, y1, x2, y2, obstacle));
    }

    let last = performance.now();

    function loop(now) {
      resizeCanvasToDisplay();
      const dt = Math.min((now - last) / 1000, 0.033);
      last = now;

      try {
        update(dt);
        draw();
      } catch (err) {
        console.error("Runtime recovery:", err);
        // Recuperación silenciosa: limpia ataques problemáticos sin tapar la partida con una pantalla negra.
        bossHazards.length = 0;
        hazards.length = 0;
        pulserRings.length = 0;
        game.fade = 0;
        try {
          ctx.save();
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = "source-over";
          draw();
          ctx.restore();
        } catch (_) {
          ctx.restore?.();
        }
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);

    // FIREBASE AUTH LOGIC PATCH
    function setAuthStatus(message, mode = "") {
      if (!authStatus) return;
      authStatus.textContent = message || "";
      authStatus.classList.toggle("error", mode === "error");
      authStatus.classList.toggle("ok", mode === "ok");
    }
    function getCleanAuthName() {
      const raw = (authNameInput?.value || "").trim();
      return raw || "Jugador";
    }
    function setAuthScreenVisible(visible) {
      if (authScreen) authScreen.classList.toggle("visible", !!visible);
      if (authUserBadge) authUserBadge.classList.toggle("visible", !visible && !!game.authUser && game.state === "menu");
      if (visible) clearInputs();
    }
    function syncAuthUserUI(user) {
      game.authUser = user || null;
      game.authReady = true;
      if (user) {
        game.playerName = user.displayName || getCleanAuthName() || user.email || "Jugador";
        if (authUserLabel) authUserLabel.textContent = game.playerName;
        setAuthScreenVisible(false);
        setAuthStatus("Sesión iniciada.", "ok");
      } else {
        setAuthScreenVisible(true);
        if (authUserLabel) authUserLabel.textContent = "SIN USUARIO";
        setAuthStatus(game.firebaseReady ? "Iniciá sesión o registrate para jugar online." : "Conectando con Firebase...");
      }
    }
    function getFirebaseAuthBridge() { return window.firebaseAuthBridge || null; }
    async function handleLoginWithFirebase() {
      const bridge = getFirebaseAuthBridge();
      if (!bridge) return setAuthStatus("Firebase todavía no cargó.", "error");
      const email = (authEmailInput?.value || "").trim();
      const pass = authPasswordInput?.value || "";
      if (!email || !pass) return setAuthStatus("Completá correo y contraseña.", "error");
      try {
        setAuthStatus("Entrando...");
        await bridge.signInWithEmailAndPassword(bridge.auth, email, pass);
      } catch (err) { setAuthStatus(formatFirebaseAuthError(err), "error"); }
    }
    async function handleRegisterWithFirebase() {
      const bridge = getFirebaseAuthBridge();
      if (!bridge) return setAuthStatus("Firebase todavía no cargó.", "error");
      const email = (authEmailInput?.value || "").trim();
      const pass = authPasswordInput?.value || "";
      const name = getCleanAuthName();
      if (!email || !pass) return setAuthStatus("Completá correo y contraseña.", "error");
      if (pass.length < 6) return setAuthStatus("La contraseña debe tener mínimo 6 caracteres.", "error");
      try {
        setAuthStatus("Registrando...");
        const result = await bridge.createUserWithEmailAndPassword(bridge.auth, email, pass);
        await bridge.updateProfile(result.user, { displayName: name });
        game.playerName = name;
        syncAuthUserUI(result.user);
      } catch (err) { setAuthStatus(formatFirebaseAuthError(err), "error"); }
    }
    async function handleLogoutFirebase() {
      const bridge = getFirebaseAuthBridge();
      if (!bridge) return;
      try {
        await bridge.signOut(bridge.auth);
        clearInputs();
        if (game.state !== "menu") { resetGame(); game.state = "menu"; }
      } catch (err) { setAuthStatus(formatFirebaseAuthError(err), "error"); }
    }
    function formatFirebaseAuthError(err) {
      const code = err?.code || "";
      if (code.includes("invalid-credential") || code.includes("wrong-password")) return "Correo o contraseña incorrectos.";
      if (code.includes("user-not-found")) return "No existe una cuenta con ese correo.";
      if (code.includes("email-already-in-use")) return "Ese correo ya está registrado.";
      if (code.includes("invalid-email")) return "Correo inválido.";
      if (code.includes("weak-password")) return "Contraseña demasiado débil.";
      if (code.includes("network-request-failed")) return "Error de red.";
      return "Error de Firebase: " + (code || "desconocido");
    }
    function initFirebaseAuthUI() {
      authLoginBtn?.addEventListener("click", handleLoginWithFirebase);
      authRegisterBtn?.addEventListener("click", handleRegisterWithFirebase);
      authLogoutBtn?.addEventListener("click", handleLogoutFirebase);
      [authNameInput, authEmailInput, authPasswordInput].forEach(input => {
        input?.addEventListener("keydown", e => {
          e.stopPropagation();
          if (e.key === "Enter") { e.preventDefault(); handleLoginWithFirebase(); }
        });
        input?.addEventListener("keyup", e => e.stopPropagation());
        input?.addEventListener("mousedown", e => e.stopPropagation());
      });
      window.addEventListener("firebase-auth-ready", () => {
        const bridge = getFirebaseAuthBridge();
        if (!bridge) return;
        game.firebaseReady = true;
        setAuthStatus("Iniciá sesión o registrate para jugar online.");
        bridge.onAuthStateChanged(bridge.auth, user => syncAuthUserUI(user));
      });
    }
    initFirebaseAuthUI();

  </script>

  <script type="module">

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDkh2ebBVy47JFA2i26HMudDNXSSnJOoX0",
      authDomain: "dungeonshapes.firebaseapp.com",
      projectId: "dungeonshapes",
      storageBucket: "dungeonshapes.firebasestorage.app",
      messagingSenderId: "778813296861",
      appId: "1:778813296861:web:fc559982bb5803c4d68b34",
      measurementId: "G-200XN7BH3P"
    };

    try {
      const app = initializeApp(firebaseConfig);

      window.firebaseAuthBridge = {
        auth,
        createUserWithEmailAndPassword,

        onAuthStateChanged,
        updateProfile
      };

      window.dispatchEvent(new CustomEvent("firebase-auth-ready"));
    } catch (err) {
      console.error("Firebase init error:", err);
      window.dispatchEvent(new CustomEvent("firebase-auth-error", { detail: err }));
    }
  </script>
