    function getUpgradeShopButtonRects() {
      const panel = getUpgradeShopPanelRect();
      const config = getUpgradeConfig();
      const h = 44;
      const gap = 16;
      const y = panel.y + panel.h - 74;

      if (config.chooseSlot) {
        const w = 118;
        const totalW = w * 3 + gap * 2;
        const startX = panel.x + panel.w / 2 - totalW / 2;
        return {
          left: { x: startX, y, w, h },
          right: { x: startX + w + gap, y, w, h },
          ignore: { x: startX + (w + gap) * 2, y, w, h },
        };
      }

      const w = 142;
      const startX = panel.x + panel.w / 2 - w - gap / 2;
      return {
        buy: { x: startX, y, w, h },
        ignore: { x: startX + w + gap, y, w, h },
      };
    }

    function getUpgradeShopPanelRect() {
      const w = 430;
      const h = 230;
      return {
        x: canvas.width / 2 - w / 2,
        y: canvas.height / 2 - h / 2,
        w,
        h,
      };
    }

    function handleUpgradeShopClick(x, y) {
      const buttons = getUpgradeShopButtonRects();
      const config = getUpgradeConfig();

      if (config.chooseSlot) {
        if (pointInRect(x, y, buttons.left)) {
          buyUpgradeForSlot(config, "left");
          return true;
        }

        if (pointInRect(x, y, buttons.right)) {
          buyUpgradeForSlot(config, "right");
          return true;
        }

        if (pointInRect(x, y, buttons.ignore)) {
          clearUpgradePickup();
          game.waveFlashTimer = game.waveFlashDuration;
          if (!isOnlineMatchActive()) startWave(config.nextWave);
          return true;
        }

        return false;
      }

      if (pointInRect(x, y, buttons.buy)) {
        buyUpgradeForSlot(config, "left");
        return true;
      }

      if (pointInRect(x, y, buttons.ignore)) {
        clearUpgradePickup();
        game.waveFlashTimer = game.waveFlashDuration;
        if (!isOnlineMatchActive()) startWave(config.nextWave);
        return true;
      }

      return false;
    }

    function buyUpgradeForSlot(config, slot) {
      if (game.points < config.cost) {
        game.upgradeShopMessageTimer = 0.9;
        return false;
      }

      game.points -= config.cost;

      if (config.type === "pulsador") {
        game.hasPulsador = true;
        game.rightAbility = "pulsador";
        game.pulsadorCooldown = 0;
      } else if (config.type === "curador") {
        game.hasCurador = true;
        game.curadorCooldown = 0;
      } else if (config.type === "preciseShot") {
        if (slot === "right") {
          game.rightAbility = "preciseShot";
          game.hasPulsador = false;
          game.preciseShotCooldown = 0;
        } else {
          game.weaponMode = "preciseShot";
          game.preciseShotCooldown = 0;
        }
      } else {
        game.weaponMode = "multiShot";
        game.multiShotCooldown = 0;
      }

      clearUpgradePickup();
      game.waveFlashTimer = game.waveFlashDuration;
      if (!isOnlineMatchActive()) startWave(config.nextWave);
      return true;
    }


    function getPlayerHitRadius() {
      // Hitbox real del jugador: más chica que el dibujo para que el esquive sea justo.
      return player.hitboxRadius || player.radius * 0.44;
    }

    function getEnemyContactHitRadius(enemy) {
      // Hitbox de daño por contacto: chica y más justa que el dibujo.
      if (!enemy) return 0;
      if (enemy.type === "kamikaze") return enemy.size * 0.20;
      if (enemy.type === "shooter") return enemy.size * 0.18;
      if (enemy.type === "miniPulser") return enemy.size * 0.20;
      if (enemy.type === "pulser" || enemy.type === "duopulser") return enemy.size * 0.22;
      if (enemy.type === "drouber") return enemy.size * 0.22;
      if (enemy.type === "doupulser" || enemy.type === "doupulserFinal" || enemy.type === "linebreaker") return enemy.size * 0.24;
      return enemy.size * 0.20;
    }

    function getEnemyBodyHitRadius(enemy) {
      // Hitbox para pegarle al enemigo: más grande que la hitbox de daño.
      // Esto hace que disparar/dashear a enemigos se sienta menos injusto.
      if (!enemy) return 0;
      if (enemy.type === "kamikaze") return enemy.size * 0.46;
      if (enemy.type === "shooter") return enemy.size * 0.48;
      if (enemy.type === "miniPulser") return enemy.size * 0.48;
      if (enemy.type === "pulser" || enemy.type === "duopulser") return enemy.size * 0.50;
      if (enemy.type === "drouber") return enemy.size * 0.48;
      if (enemy.type === "doupulser" || enemy.type === "doupulserFinal" || enemy.type === "linebreaker") return enemy.size * 0.50;
      return enemy.size * 0.46;
    }

    function getEnemyProjectileHitHalfSize(projectile) {
      const baseSize = projectile.hitboxSize || projectile.size || 8;
      return Math.max(2.0, baseSize * 0.22);
    }

    function getPlayerProjectileHitHalfSize(projectile) {
      const baseSize = projectile.hitboxSize || projectile.size || 8;
      return Math.max(2.4, baseSize * 0.34);
    }

    function getRingHitHalfThickness(ring) {
      return Math.max(2.5, (ring.thickness || 20) * 0.18);
    }

    function getDangerLineHitWidth(width) {
      return Math.max(3, width * 0.22);
    }

    function getDangerRayHitHalfWidth(width) {
      return Math.max(2.5, width * 0.24);
    }

    function isPlayerDamageInvulnerable() {
      return player.invincible || player.dashTimer > 0 || player.dashGraceTimer > 0;
    }

    function startDash() {
      if (game.state !== "playing" || game.settingsOpen || game.upgradeShopOpen) return;
      if (game.waveState !== "combat" && game.waveState !== "intermission") return;
      if (player.downed) return;
      if (player.dashTimer > 0) return;
      const dashCost = 0.75 * (hasRogueUpgrade("dashAcotado") ? 0.75 : 1);
      if (player.stamina < dashCost) return;

      let dx = 0;
      let dy = 0;

      if (mobileInput.enabled && mobileInput.magnitude > 0.12) {
        dx = mobileInput.moveX;
        dy = mobileInput.moveY;
      } else if (game.dashMode === "cursor") {
        dx = mouse.x - player.x;
        dy = mouse.y - player.y;
      } else {
        if (keyDown("w") || keyDown("keyw")) dy -= 1;
        if (keyDown("s") || keyDown("keys")) dy += 1;
        if (keyDown("a") || keyDown("keya")) dx -= 1;
        if (keyDown("d") || keyDown("keyd")) dx += 1;

        if (dx === 0 && dy === 0) {
          dx = player.lastMoveX;
          dy = player.lastMoveY;
        }
      }

      let len = Math.hypot(dx, dy);
      if (len <= 0.0001) {
        dx = player.lastMoveX || 1;
        dy = player.lastMoveY || 0;
        len = Math.hypot(dx, dy) || 1;
      }

      dx /= len;
      dy /= len;

      spendStamina(dashCost);
      spawnDashBurst(player.x, player.y, "#42dfff");
      triggerScreenShake(2.2, 0.07);

      player.dashDirX = dx;
      player.dashDirY = dy;
      player.dashTimer = player.dashDuration;
      player.dashGraceTimer = 0;
      player.dashCutHitEnemies = new Set();
      player.wasDashing = true;
      player.trailLastX = player.x;
      player.trailLastY = player.y;
      player.invincible = true;
    }

    function spendStamina(amount) {
      if (game.state === "playing" && game.waveState === "intermission") {
        return;
      }

      if (player.infiniteStamina) {
        player.stamina = player.staminaSegments;
        player.staminaVisual = player.staminaSegments;
        player.staminaRegenTimer = 0;
        return;
      }

      player.stamina = Math.max(0, player.stamina - amount);
      player.staminaRegenTimer = player.staminaRegenDelay;
    }

    function isMovementInputActive() {
      const keyboardMoving =
        keyDown("w") || keyDown("keyw") ||
        keyDown("s") || keyDown("keys") ||
        keyDown("a") || keyDown("keya") ||
        keyDown("d") || keyDown("keyd");

      const mobileMoving = mobileInput.enabled && mobileInput.magnitude > 0.08;
      return keyboardMoving || mobileMoving || player.dashTimer > 0;
    }

    function isStationaryComboActive() {
      return game.state === "playing" &&
        game.waveState === "combat" &&
        game.roomStartTimer <= 0 &&
        !game.settingsOpen &&
        !game.upgradeShopOpen &&
        !isMovementInputActive();
    }

    function getShootStaminaCost(multiplier = 1) {
      const comboMultiplier = isStationaryComboActive() ? game.stationaryComboStaminaMultiplier : 1;
      const recorteMultiplier = hasRogueUpgrade("recorteBalas") ? 0.70 : 1;
      return player.shootStaminaCost * multiplier * comboMultiplier * recorteMultiplier;
    }

    function getAutoShootInterval() {
      const stationaryMultiplier = isStationaryComboActive() ? game.stationaryComboFireMultiplier : 1;
      const ballisticMultiplier = hasRogueUpgrade("furiaBalistica") && game.stationaryFireHold >= 2 ? 0.75 : 1;
      return game.shootInterval * stationaryMultiplier * ballisticMultiplier;
    }

    function getMultiShotInterval() {
      const comboMultiplier = isStationaryComboActive() ? game.stationaryComboShotgunMultiplier : 1;
      const upgradeMultiplier = hasRogueUpgrade("multidisparoRapido") ? 0.80 : 1;
      return game.multiShotInterval * comboMultiplier * upgradeMultiplier;
    }

    function getPreciseAimTargetId(enemy) {
      if (!enemy) return "";
      if (!enemy._preciseAimId) {
        enemy._preciseAimId = enemy._onlineId || `aim-${preciseAimTargetIdCounter++}`;
      }
      return enemy._preciseAimId;
    }

    function isPreciseAimTargetValid(enemy) {
      return !!enemy &&
        Number(enemy.hp || 0) > 0 &&
        Number.isFinite(Number(enemy.x)) &&
        Number.isFinite(Number(enemy.y));
    }

    function getPreciseAimLockedEnemy() {
      const lockId = game.preciseAimLockId || "";
      if (!lockId) return null;

      const enemy = enemies.find(e => isPreciseAimTargetValid(e) && getPreciseAimTargetId(e) === lockId);
      if (!enemy) {
        clearPreciseAimLock();
        return null;
      }

      return enemy;
    }

    function clearPreciseAimLock() {
      game.preciseAimLockId = "";
      game.preciseAimLockStartedAt = 0;
      game.preciseAimReleaseTimer = 0;
    }

    function getPreciseAimPointForEnemy(enemy, origin = null, projectileSpeed = 680) {
      if (!enemy) return { x: player.x, y: player.y };

      const base = { x: enemy.x, y: enemy.y };
      const ox = Number(origin?.x);
      const oy = Number(origin?.y);
      const fromX = Number.isFinite(ox) ? ox : player.x;
      const fromY = Number.isFinite(oy) ? oy : player.y;
      const dist = Math.hypot(enemy.x - fromX, enemy.y - fromY);
      const travelLead = dist / Math.max(1, projectileSpeed) * (enemy.type === "kamikaze" ? 0.40 : 0.18);
      const snapshotLead = isOnlineGuest() ? 0.12 : 0.035;
      const leadTime = Math.min(enemy.type === "kamikaze" ? 0.28 : 0.16, snapshotLead + travelLead);

      let vx = Number(enemy.netVx);
      let vy = Number(enemy.netVy);
      if (!Number.isFinite(vx) || !Number.isFinite(vy) || Math.hypot(vx, vy) < 4) {
        if (enemy.type !== "kamikaze") return base;
        const speed = Number(enemy.speed) || 150;
        const rot = Number(enemy.rotation) || 0;
        vx = Math.cos(rot) * speed;
        vy = Math.sin(rot) * speed;
      }

      return {
        x: enemy.x + vx * leadTime,
        y: enemy.y + vy * leadTime,
      };
    }

    function acquirePreciseAimTarget() {
      const locked = getPreciseAimLockedEnemy();
      if (locked) return locked;

      const aimDx = mouse.x - player.x;
      const aimDy = mouse.y - player.y;
      const aimLen = Math.hypot(aimDx, aimDy) || 1;
      const nx = aimDx / aimLen;
      const ny = aimDy / aimLen;

      let best = null;
      let bestScore = Infinity;

      for (const enemy of enemies) {
        if (!isPreciseAimTargetValid(enemy)) continue;

        const point = getPreciseAimPointForEnemy(enemy, player, 680);
        const ex = point.x - player.x;
        const ey = point.y - player.y;
        const dist = Math.hypot(ex, ey);
        const forward = ex * nx + ey * ny;
        if (forward < -80) continue;

        const perpendicular = Math.abs(ex * ny - ey * nx);
        const cursorDist = Math.hypot(point.x - mouse.x, point.y - mouse.y);
        const allowedMiss = Math.max(118, enemy.size * 2.8);
        if (perpendicular > allowedMiss && cursorDist > allowedMiss * 1.45) continue;

        const underAim = perpendicular <= allowedMiss || cursorDist <= allowedMiss * 1.1;
        const closeThreatBonus = enemy.type === "kamikaze" && underAim ? -Math.max(0, 220 - dist) * 0.18 : 0;
        const score = perpendicular * 0.78 + cursorDist * 0.20 + Math.max(0, forward) * 0.032 + closeThreatBonus;

        if (score < bestScore) {
          bestScore = score;
          best = enemy;
        }
      }

      if (best) {
        game.preciseAimLockId = getPreciseAimTargetId(best);
        game.preciseAimLockStartedAt = game.time || 0;
      }

      return best;
    }

    function isPreciseFireHeld() {
      return game.state === "playing" &&
        !game.settingsOpen &&
        !game.upgradeShopOpen &&
        (
          (game.weaponMode === "preciseShot" && mouse.down) ||

    function updateStationaryFireHold(dt) {
      const firingCommonWeapon = game.weaponMode === "normal" && mouse.down;
      if (firingCommonWeapon && isStationaryComboActive()) {

    function applyDashCutDamage() {
      if (!hasRogueUpgrade("corteEnergia") || player.dashTimer <= 0) return;
      if (!player.dashCutHitEnemies) player.dashCutHitEnemies = new Set();

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (player.dashCutHitEnemies.has(enemy)) continue;
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const hitDist = getPlayerHitRadius() + getEnemyBodyHitRadius(enemy);
        if (dx * dx + dy * dy <= hitDist * hitDist) {
          player.dashCutHitEnemies.add(enemy);
          const damage = Math.max(1, enemy.maxHp * 0.15);
          if (!damageEnemyShield(enemy, damage)) {
            enemy.hp -= damage;
            enemy.hitFlash = 1;
            spawnHitParticles(enemy.x, enemy.y, "#00ffbb", 8);
            spawnFloatingText(`-${Math.round(damage * 10) / 10}`, enemy.x, enemy.y - enemy.size * 0.7, "#00ffbb", 13);
            if (enemy.hp <= 0) {
              addEnemyKillPoints(enemy);
              spawnEnemyDeathPulse(enemy.x, enemy.y, "#00ffbb");
              enemies.splice(i, 1);
            }
          }
        }
      }
    }

    function updateStamina(dt) {
      if (player.infiniteStamina) {
        player.stamina = player.staminaSegments;
        player.staminaVisual = player.staminaSegments;
        player.staminaRegenTimer = 0;
        return;
      }

      const rechargeSpeed = player.staminaSegments / player.staminaRechargeTime;

      if (mouse.down && game.state === "playing") {
        player.staminaRegenTimer = player.staminaRegenDelay;
      }

      if (player.staminaRegenTimer > 0) {
        player.staminaRegenTimer -= dt;
      } else if (player.stamina < player.staminaSegments) {
        player.stamina += rechargeSpeed * dt;

        if (player.stamina > player.staminaSegments) {
          player.stamina = player.staminaSegments;
        }
      }

      player.staminaVisual += (player.stamina - player.staminaVisual) * Math.min(1, dt * 14);
    }

    function updatePlayer(dt) {
      // Cooldown eliminado: la stamina controla los dashes.
      if (player.hitTimer > 0) player.hitTimer -= dt;
      if (player.dashGraceTimer > 0) {
        player.dashGraceTimer = Math.max(0, player.dashGraceTimer - dt);
        if (player.dashGraceTimer <= 0 && player.dashTimer <= 0 && player.hitTimer <= 0) {
          player.invincible = false;
          player.wasDashing = false;
        }
      }

      if (player.hitTimer <= 0 && player.dashTimer <= 0 && player.dashGraceTimer <= 0 && !player.downed) {
        player.invincible = false;
        player.wasDashing = false;
      }

      if (player.dashTimer > 0) {
        const oldX = player.x;
        const oldY = player.y;

        player.x += player.dashDirX * player.dashSpeed * dt;
        player.y += player.dashDirY * player.dashSpeed * dt;
        player.dashTimer -= dt;

        addDashTrailSegment(oldX, oldY, player.x, player.y);

        if (player.dashTimer <= 0) {
          spawnDashBurst(player.x, player.y, "#42dfff");
          player.dashGraceTimer = player.dashIFrameGrace;
          player.invincible = true;
          player.wasDashing = true;
        }
      } else {
        let dx = 0;
        let dy = 0;

        if (keyDown("w") || keyDown("keyw")) dy -= 1;
        if (keyDown("s") || keyDown("keys")) dy += 1;
        if (keyDown("a") || keyDown("keya")) dx -= 1;
        if (keyDown("d") || keyDown("keyd")) dx += 1;

        if (mobileInput.enabled && mobileInput.magnitude > 0.08) {
          dx += mobileInput.moveX;
          dy += mobileInput.moveY;
        }

        const len = Math.hypot(dx, dy);

        if (len > 0) {
          dx /= len;
          dy /= len;
          player.lastMoveX = dx;
          player.lastMoveY = dy;
        }

        player.x += dx * player.speed * dt;
        player.y += dy * player.speed * dt;
      }

      keepPlayerInsideRoom();
      keepPlayerOutsideObstacles();
      applyDashCutDamage();
    }

    function keepPlayerInsideRoom() {
      const r = room.getRect();
      const left = r.x + player.radius;
      const right = r.x + r.w - player.radius;
      const top = r.y + player.radius;
      const bottom = r.y + r.h - player.radius;

      player.x = Math.max(left, Math.min(right, player.x));
      player.y = Math.max(top, Math.min(bottom, player.y));
    }

    function keepEnemyInsideRoom(enemy) {
      const r = room.getRect();
      const margin = Math.max(14, (enemy.size || 34) * 0.45);
      enemy.x = clamp(enemy.x, r.x + margin, r.x + r.w - margin);
      enemy.y = clamp(enemy.y, r.y + margin, r.y + r.h - margin);
    }

    function isFearModeActive() {
      return game.state === "playing" && player.hp === 1;

    function getFearVisualAmount() {
      return Math.max(0, Math.min(1, game.fearVisual || 0));

    function getFearHeartbeatAmount() {
      if (!isFearModeActive()) return 0;
      // Latido doble como el original, pero más liviano que el efecto viejo completo.
      const cycle = (game.time * 1.35) % 1;
      const beatA = Math.exp(-Math.pow((cycle - 0.08) / 0.045, 2));
      const beatB = Math.exp(-Math.pow((cycle - 0.25) / 0.055, 2)) * 0.58;
      return Math.min(1, beatA + beatB);
    }

    function damagePlayer(amount = 1) {
      if (game.immortalMode) return;
      if (isPlayerDamageInvulnerable() || player.hitTimer > 0) return;

      amount = Math.max(1, Math.min(amount, player.hp));
      spawnFloatingText(`-${amount}`, player.x, player.y - 32, game.ruby, 17);

      for (let i = 0; i < amount; i++) {
        spawnLifePulse(player.hp - 1 - i);
        spawnLifeFade(player.hp - 1 - i);
      }

      player.hp -= amount;
      player.hitTimer = 1;
      player.invincible = true;
      triggerScreenShake(6 + amount * 2.2, 0.14 + amount * 0.04);

      if (player.hp <= 0) {
        if (game.salvavidasReady) {
          game.salvavidasReady = false;
          game.upgrades.salvavidas = false;
          player.hp = 1;
          player.hitTimer = 1.2;

          triggerRoomPulse("#00ffbb", 0.65);
          triggerScreenShake(4, 0.12);
        } else {
          if (isOnlineMatchActive()) {
            if (isOnlineVersusMode()) {
              requestOnlineVersusRoundLost();
            } else {
              setLocalPlayerDowned();
            }
          } else {
            startGameOver();
          }

      } else {
        setTimeout(() => {
          if (player.dashTimer <= 0 && player.dashGraceTimer <= 0 && game.state === "playing") {
            player.invincible = false;
            player.wasDashing = false;
          }

    }

    function getMultiplayerEnemyHpMultiplier(enemy) {
      if (!isOnlineSessionActive()) return 1;
      const players = getOnlineBalancePlayerCount();
      if (isBossEnemy(enemy)) return players >= 3 ? 4 : 2;
      return 2;
    }

    function applyMultiplayerEnemyHpScaling() {
      if (!isOnlineSessionActive()) return;
      for (const enemy of enemies) {
        if (!enemy) continue;
        const multiplier = getMultiplayerEnemyHpMultiplier(enemy);
        if (enemy._mpHpMultiplier === multiplier) continue;

        const currentMultiplier = Number(enemy._mpHpMultiplier) || 1;
        const baseHp = Number.isFinite(Number(enemy._mpBaseHp)) ? Number(enemy._mpBaseHp) : (Number(enemy.hp) || 1) / currentMultiplier;
        const baseMaxHp = Number.isFinite(Number(enemy._mpBaseMaxHp)) ? Number(enemy._mpBaseMaxHp) : (Number(enemy.maxHp) || Number(enemy.hp) || 1) / currentMultiplier;
        const baseShieldHp = Number.isFinite(Number(enemy._mpBaseShieldHp)) ? Number(enemy._mpBaseShieldHp) : (Number(enemy.shieldHp) || 0) / currentMultiplier;
        const baseShieldMaxHp = Number.isFinite(Number(enemy._mpBaseShieldMaxHp)) ? Number(enemy._mpBaseShieldMaxHp) : (Number(enemy.shieldMaxHp) || 0) / currentMultiplier;

        enemy._mpBaseHp = baseHp;
        enemy._mpBaseMaxHp = baseMaxHp;
        enemy._mpBaseShieldHp = baseShieldHp;
        enemy._mpBaseShieldMaxHp = baseShieldMaxHp;
        enemy._mpHpMultiplier = multiplier;

        enemy.hp = Math.ceil(baseHp * multiplier);
        enemy.maxHp = Math.ceil(baseMaxHp * multiplier);
        enemy.hpVisual = enemy.hp;
        if (baseShieldHp > 0) enemy.shieldHp = Math.ceil(baseShieldHp * multiplier);
        if (baseShieldMaxHp > 0) enemy.shieldMaxHp = Math.ceil(baseShieldMaxHp * multiplier);
      }
    }

    function normalizeSettingsCommand(text) {
      return text
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");

    function giveWeaponByCommand(command) {
      const c = normalizeSettingsCommand(command);

      if (["curador", "cura", "healer", "heal", "especial 1", "especial1"].includes(c)) {
        game.hasCurador = true;
        game.curadorCooldown = 0;
        showSettingsCommandMessage("Habilidad: Curador");
        return true;
      }

      if (["pulsar", "pulse", "pulsador", "pulser", "anillo", "anillo celeste"].includes(c)) {
        game.hasPulsador = true;
        game.rightAbility = "pulsador";
        game.pulsadorCooldown = 0;
        showSettingsCommandMessage("Arma: Pulsador");
        return true;
      }

      if (["tiro multiple", "tiro multiple", "escopeta", "shotgun", "multishot", "tiro triple", "triple"].includes(c)) {
        game.weaponMode = "multiShot";
        game.multiShotCooldown = 0;
        showSettingsCommandMessage("Arma: Tiro Multiple");
        return true;
      }

      if (["disparo preciso", "preciso", "precision", "tiro preciso", "precise", "precise shot"].includes(c)) {
        game.weaponMode = "preciseShot";
        game.preciseShotCooldown = 0;
        showSettingsCommandMessage("Arma: Disparo preciso");
        return true;
      }

      if (["normal", "metralla", "arma normal", "basica", "basico", "default"].includes(c)) {
        game.weaponMode = "normal";
        game.multiShotCooldown = 0;
        game.preciseShotCooldown = 0;
        showSettingsCommandMessage("Arma: Normal");
        return true;
      }

      return false;
    }

    function applySettingsCommand() {
      const raw = settingsCheatInput.value.trim();
      if (!raw) return;

      const command = raw.toUpperCase();
      const normalizedCommand = normalizeSettingsCommand(raw);

      if (/^\d+(\.5)?$/.test(command)) {
        const parsedWave = parseFloat(command);
        const targetWave = Math.max(1, Math.min(2000, parsedWave));
        goToIntermissionBeforeWave(targetWave);
        showSettingsCommandMessage(`Intermisión ${targetWave}`);
        settingsCheatInput.value = "";
        settingsCheatInput.blur();
        return;
      }

      if (command === "P") {
        game.points = 99999;
        showSettingsCommandMessage("Puntos: 99999");
      } else if (command === "SI") {
        player.infiniteStamina = true;
        player.stamina = player.staminaSegments;
        player.staminaVisual = player.staminaSegments;
        showSettingsCommandMessage("Stamina infinita");
      } else if (command === "V") {
        addExtraLifePoint();
      } else if (command === "-V") {
        removeLifePoint();
      } else if (command === "I") {
        game.immortalMode = true;
        showSettingsCommandMessage("Inmortalidad activada");
      } else if (command === "H") {
        game.showHitboxes = !game.showHitboxes;
        showSettingsCommandMessage(game.showHitboxes ? "Hitboxes visibles" : "Hitboxes ocultas");
      } else if (command === "D" || normalizedCommand === "debug") {
        game.debugOverlay = !game.debugOverlay;
        showSettingsCommandMessage(game.debugOverlay ? "Debug online visible" : "Debug online oculto");
      } else if (giveWeaponByCommand(normalizedCommand)) {
        // El mensaje ya lo muestra giveWeaponByCommand().
      } else {
        showSettingsCommandMessage("Comando inválido");
      }

      settingsCheatInput.value = "";
      settingsCheatInput.focus();
    }

    function goToIntermissionBeforeWave(targetWave) {
      game.state = "playing";
      game.settingsOpen = false;
      game.gameOverTimer = 0;
      game.gameOverTextTimer = 0;
      game.fade = 0;
      game.wave = targetWave === 18.5 ? 18 : Math.max(0, targetWave - 1);
      game.waveState = "combat";
      game.waveTimer = 0;
      game.intermissionTimer = 0;
      game.roomStartTimer = 0;
      game.shootTimer = 0;
      game.upgradeShopOpen = false;
      game.upgradeShopMessageTimer = 0;
      mouse.down = false;

      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      player.dashTimer = 0;
      player.dashCooldownTimer = 0;
      player.hitTimer = 0;
      player.invincible = false;
      player.stamina = player.staminaSegments;
      player.staminaVisual = player.staminaSegments;

      enemies.length = 0;
      projectiles.length = 0;
      onlineRemoteProjectiles.length = 0;
      impactParticles.length = 0;
      enemyDeathPulses.length = 0;
      pulserRings.length = 0;
      bossHazards.length = 0;
      clearUpgradePickup();
      clearHealPickup();

      startIntermission();
      clearInputs();
    }

    function addExtraLifePoint() {
      const maxExtraLives = 7;
      const absoluteMaxHp = 3 + maxExtraLives;

      if (player.maxHp < absoluteMaxHp) {
        player.maxHp++;
        player.hp = Math.min(player.maxHp, player.hp + 1);
        spawnLifePulse(player.hp - 1);
        showSettingsCommandMessage(`Vida +1 (${player.maxHp}/${absoluteMaxHp})`);
      } else {
        showSettingsCommandMessage("Máximo de vidas extra");
      }
    }

    function removeLifePoint() {
      if (player.maxHp <= 1) {
        showSettingsCommandMessage("Mínimo de vida");
        return;
      }

      spawnLifeFade(player.maxHp - 1);
      player.maxHp--;
      player.hp = Math.max(1, Math.min(player.hp, player.maxHp));
      showSettingsCommandMessage("Vida -1");
    }

    function grantPostBossReward() {
      if (!isBossWaveNumber(game.wave) || game.wave === 2000) return;

      if (player.hp >= player.maxHp) {
        game.points += 5;
        game.pointsPulse = 1;
        spawnFloatingText(player.x, player.y - player.radius - 24, "+5P", game.ruby);
        showWaveBanner("BONUS", "vida completa +5 puntos");
      } else {
        const healedIndex = player.hp;
        player.hp = Math.min(player.maxHp, player.hp + 1);
        spawnLifePulse(healedIndex);
        spawnFloatingText(player.x, player.y - player.radius - 24, "+1 VIDA", "#42ffca");
        showWaveBanner("CURACIÓN", "+1 vida");
      }
    }

    function spawnPostBossUpgradeOrb() {
      if (game.wave === 5) {
        spawnCuradorPickup();
        return;
      }

      if (game.wave === 10) {
        spawnMultiShotPickup();
        return;
      }

      if (game.wave === 20) {
        spawnPulsadorPickup();
        return;
      }

      // Post-15 queda reservado para una mejora futura. Por ahora solo cura/bonus.
    }

    function startIntermission() {
      if (game.waveState === "intermission") return;

      game.waveState = "intermission";
      game.intermissionTimer = game.intermissionDuration;
      resetOnlineIntermissionSkipVotes(game.wave);
      game.shootTimer = 0;
      mouse.down = false;
      clearUpgradePickup();
      clearHealPickup();
      enemies.length = 0;
      projectiles.length = 0;
      onlineRemoteProjectiles.length = 0;
      pulserRings.length = 0;
      bossHazards.length = 0;

      if (isBossWaveNumber(game.wave)) {
        grantPostBossReward();
        spawnPostBossUpgradeOrb();
      }

      triggerRoomPulse("#42dfff", 0.48);
      if (!isBossWaveNumber(game.wave)) {
        showWaveBanner("INTERMISIÓN", "respirá y preparate");
      }
    }

    function updateWaveSystem(dt) {
      if (game.state !== "playing" || game.settingsOpen) return;

      if (game.waveState === "combat") {
        if (game.upgradePickup || game.upgradeShopOpen) {
          return;
        }

        const bossWave = currentCombatWaveHasBoss();

        if (!bossWave && game.roomStartTimer <= 0) {
          game.waveTimer = Math.max(0, game.waveTimer - dt);
        }

        if ((enemies.length === 0 && game.roomStartTimer <= 0) || (!bossWave && game.waveTimer <= 0)) {
          startIntermission();
        }
        return;
      }

      if (game.waveState === "intermission") {
        // Si hay una orbe de compra post-boss, la intermisión queda pausada
        // hasta comprar o ignorar para que no se pierda la recompensa.
        if (game.upgradePickup || game.upgradeShopOpen || isOnlineCoopOrbBlocking()) {
          return;
        }

        game.intermissionTimer = Math.max(0, game.intermissionTimer - dt);

        if (game.intermissionTimer <= 0) {
          startNextWave();
        }
      }
    }

    function resetPlayer() {
      player.hp = player.maxHp;
      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      player.dashTimer = 0;
      player.dashCooldownTimer = 0;
      player.invincible = false;
      player.hitTimer = 0;
      player.downed = false;
      player.stamina = player.staminaSegments;
      player.staminaVisual = player.staminaSegments;
      player.staminaRechargeProgress = 0;
      player.staminaRegenTimer = 0;
      dashTrail.length = 0;
      dashBursts.length = 0;
      lifePulses.length = 0;
      lifeFades.length = 0;
    }

    function addDashTrailSegment(x1, y1, x2, y2) {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      if (dist < 2) return;

      dashTrail.push({
        x1,
        y1,
        x2,
        y2,
        life: 0.22,
        maxLife: 0.22,
      });

      if (dashTrail.length > 28) {
        dashTrail.shift();
      }
    }

    function updateDashTrail(dt) {
      for (let i = dashTrail.length - 1; i >= 0; i--) {
        dashTrail[i].life -= dt;

        if (dashTrail[i].life <= 0) {
          dashTrail.splice(i, 1);
        }
      }
    }

    function spawnLifeFade(lifeIndex) {
      if (lifeIndex < 0) return;

      lifeFades.push({
        index: lifeIndex,
        life: 0.25,
        maxLife: 0.25,
      });
    }

    function updateLifeFades(dt) {
      for (let i = lifeFades.length - 1; i >= 0; i--) {
        lifeFades[i].life -= dt;

        if (lifeFades[i].life <= 0) {
          lifeFades.splice(i, 1);
        }
      }
    }

    function getLifeFadeAmount(index) {
      for (const fade of lifeFades) {
        if (fade.index === index) {
          return 1 - fade.life / fade.maxLife;
        }
      }

      return 1;
    }

    function spawnLifePulse(lifeIndex) {
      if (lifeIndex < 0) return;

      lifePulses.push({
        index: lifeIndex,
        life: 0.42,
        maxLife: 0.42,
      });
    }

    function updateLifePulses(dt) {
      for (let i = lifePulses.length - 1; i >= 0; i--) {
        lifePulses[i].life -= dt;

        if (lifePulses[i].life <= 0) {
          lifePulses.splice(i, 1);
        }
      }
    }

    

    function spawnEnemyDeathPulse(x, y, color = game.ruby) {
      enemyDeathPulses.push({
        x,
        y,
        color,
        life: 0.34,
        maxLife: 0.34,
      });
    }

    function updateEnemyDeathPulses(dt) {
      for (let i = enemyDeathPulses.length - 1; i >= 0; i--) {
        enemyDeathPulses[i].life -= dt;

        if (enemyDeathPulses[i].life <= 0) {
          enemyDeathPulses.splice(i, 1);
        }
      }
    }

    function getEnemyPointReward(enemy) {
      if (!enemy) return 0;
      if (enemy.type === "kamikaze") return 2;
      if (enemy.type === "shooter") return 5;
      if (enemy.type === "pulser") return 6;
      if (enemy.type === "miniPulser") return 3;
      if (enemy.type === "drouber") return 12;
      if (enemy.type === "duopulser") return 15;
      if (enemy.type === "doupulser") return 40;
      if (enemy.type === "doupulserFinal") return 60;
      if (enemy.type === "linebreaker") return 60;
      if (enemy.type === "secretBoss") return 35;
      return 0;
    }

    function addEnemyKillPoints(enemy) {
      const reward = getEnemyPointReward(enemy);
      if (reward > 0) {
        game.points += reward;
        game.pointsPulse = 1;
        game.pointsPulseValue = reward;
      }

      // Online: puntos y XP se ganan de forma compartida.
      // El gasto de puntos y la elección de mejoras siguen siendo locales/separados.
      if (isOnlineHost()) {
        sendOnlinePlayerRewardToRemotePlayers(enemy, true);
      }

      grantEnemyXP(enemy);
      if (hasRogueUpgrade("recargaEnergetica")) {
        player.stamina = Math.min(player.staminaSegments, player.stamina + player.staminaSegments * 0.05);
        player.staminaVisual = Math.max(player.staminaVisual, player.stamina);
      }
    }

    const rogueUpgradeCatalog = [
      {
        id: "dashAcotado",
        title: "Dash Acotado",
        desc: "El gasto de energía del Dash se reduce en un 25%.",
      },
      {
        id: "furia",
        title: "Furia",
        desc: "Con 1 vida, tu daño aumenta un 25%.",
      },
      {
        id: "corteEnergia",
        title: "Corte de energía",
        desc: "Atravesar enemigos con dash les resta 15% de su vida máxima.",
      },
      {
        id: "recorteBalas",
        title: "Recorte de balas",
        desc: "Tus proyectiles cuestan 30% menos energía.",
      },
      {
        id: "pulsoMagnetico",
        title: "Pulso magnético",
        desc: "Tu pulso también empuja enemigos hacia atrás.",
        requires: () => game.hasPulsador,
      },
      {
        id: "furiaBalistica",
        title: "Furia Balística",
        desc: "Si disparás quieto 2s, el arma común dispara 25% más rápido.",
      },
      {
        id: "recargaEnergetica",
        title: "Recarga Energética",
        desc: "Al eliminar enemigos, recuperás 5% de la energía total.",
      },
      {
        id: "multidisparoRapido",
        title: "Multidisparo Rápido",
        desc: "Tiro Múltiple tiene 20% menos cooldown.",
        requires: () => game.weaponMode === "multiShot",
      },
      {
        id: "salvavidas",
        title: "Salvavidas",
        desc: "La próxima vez que pierdas tu última vida, te salvás con 1 vida.",
      },
    ];

    function getRogueUpgradeById(id) {
      return rogueUpgradeCatalog.find(u => u.id === id) || null;
    }

    function hasRogueUpgrade(id) {
      return !!(game.upgrades && game.upgrades[id]);
    }

    function isRogueUpgradeEligible(upgrade) {
      return !upgrade.requires || upgrade.requires();
    }

    function isRogueUpgradeLocked(upgrade) {
      const chosenWave = game.xpChosenWave && game.xpChosenWave[upgrade.id];
      if (chosenWave != null && game.wave < chosenWave + 20) return true;
      if (hasRogueUpgrade(upgrade.id) && upgrade.id !== "salvavidas") return true;
      if (upgrade.id === "salvavidas" && hasRogueUpgrade("salvavidas")) return true;
      return false;
    }

    function getRogueUpgradeLockLabel(upgrade) {
      if (hasRogueUpgrade(upgrade.id)) return "YA ACTIVA";
      const chosenWave = game.xpChosenWave && game.xpChosenWave[upgrade.id];
      if (chosenWave != null && game.wave < chosenWave + 20) {
        return `BLOQ. ${Math.ceil(chosenWave + 20 - game.wave)} OLEADAS`;
      }
      return "BLOQUEADA";
    }

    function getEnemyXPReward(enemy) {
      if (!enemy) return 0;
      if (enemy.type === "kamikaze") return 0.5;
      if (enemy.type === "miniPulser") return 1;
      if (enemy.type === "pulser") return 2;
      if (enemy.type === "drouber") return 1.5;
      if (enemy.type === "doupulser") return 5;
      if (enemy.type === "duopulser") return 2.5;
      if (enemy.type === "linebreaker") return 7.5;
      if (enemy.type === "shooter") return 1;
      return 0;
    }

    function grantEnemyXP(enemy) {
      const xp = getEnemyXPReward(enemy);
      if (xp <= 0) return;
      game.xp += xp;
      game.xpPulse = Math.max(game.xpPulse || 0, 1);
      while (!game.xpChoiceOpen && game.xp >= game.xpRequired) {
        openXPChoiceUI();
      }
    }

    function updateXPVisual(dt) {
      const required = Math.max(1, game.xpRequired || 10);
      const target = Math.max(0, Math.min(required, game.xp || 0));

      if (game.xpVisual == null) game.xpVisual = target;
      if (game.xpBackVisual == null) game.xpBackVisual = target;

      const speed = target >= game.xpVisual ? 18 : 12;
      game.xpVisual += (target - game.xpVisual) * Math.min(1, dt * speed);
      game.xpBackVisual += (target - game.xpBackVisual) * Math.min(1, dt * 6);
      game.xpPulse = Math.max(0, (game.xpPulse || 0) - dt * 3.2);
    }

    function shuffleArray(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function tickXPOfferCooldowns() {
      for (const id of Object.keys(game.xpOfferCooldown || {})) {
        game.xpOfferCooldown[id] -= 1;
        if (game.xpOfferCooldown[id] <= 0) delete game.xpOfferCooldown[id];
      }
    }

    function generateXPChoices() {
      tickXPOfferCooldowns();
      const eligible = rogueUpgradeCatalog.filter(isRogueUpgradeEligible);
      const fresh = shuffleArray(eligible.filter(u => !game.xpOfferCooldown[u.id] && !isRogueUpgradeLocked(u)));
      const backup = shuffleArray(eligible.filter(u => !fresh.includes(u)));
      const choices = fresh.concat(backup).slice(0, 3);
      for (const up of choices) game.xpOfferCooldown[up.id] = 2;
      return choices;
    }

    function openXPChoiceUI() {
      game.xpChoiceOpen = true;
      game.xpChoices = generateXPChoices();
      mouse.down = false;
      mouse.rightDown = false;
      clearInputs();
      sendOnlineLocalChoiceStateNow();
    }

    function chooseXPUpgrade(index) {
      if (!game.xpChoiceOpen) return false;
      const upgrade = game.xpChoices[index];
      if (!upgrade || isRogueUpgradeLocked(upgrade)) return false;

      game.upgrades[upgrade.id] = true;
      game.xpChosenWave[upgrade.id] = game.wave;
      if (upgrade.id === "salvavidas") game.salvavidasReady = true;

      game.xp -= game.xpRequired;
      if (game.xp < 0) game.xp = 0;
      game.xpPulse = Math.max(game.xpPulse || 0, 1);
      game.xpLevel += 1;
      game.xpRequired = Math.round(game.xpRequired * 1.5 * 10) / 10;
      game.xpChoiceOpen = false;
      game.xpChoices = [];
      sendOnlineLocalChoiceStateNow();
      showWaveBanner(upgrade.title.toUpperCase(), "mejora elegida");
      triggerRoomPulse("#00ffbb", 0.55);

      if (game.xp >= game.xpRequired) openXPChoiceUI();
      return true;
    }

    function applyPlayerDamageModifiers(amount) {
      let damage = amount;
      if (hasRogueUpgrade("furia") && player.hp === 1) damage *= 1.25;
      return damage;
    }

    function updateGuestSyncedEnemyVisuals(dt) {
      for (const enemy of enemies) {
        enemy.hitFlash = Math.max(0, (enemy.hitFlash || 0) - dt * 4.2);
        enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

        // Ya no movemos enemigos hacia targets interpolados: el host manda el estado real.
        // Solo mantenemos animaciones locales que no cambian la autoridad del host.
        if (enemy.type === "pulser" || enemy.type === "duopulser") {
          enemy.rotation += dt * 0.75;
        } else if (enemy.type === "miniPulser") {
          enemy.rotation += dt * 1.15;
        } else if (enemy.type === "drouber") {
          updateDrouberEnemy(enemy, dt, false);
          if (game.waveState === "combat" && game.roomStartTimer <= 0 && !player.downed && !isPlayerDamageInvulnerable() && drouberRaysHitPlayer(enemy)) {
            damagePlayer();
          }
        } else if (enemy.type === "shooter") {
          updateShooterEnemy(enemy, dt, false);
        } else if (enemy.type === "doupulser") {
          updateDoupulserEnemy(enemy, dt, false);
        } else if (enemy.type === "doupulserFinal") {
          updateDoupulserFinalEnemy(enemy, dt, false);
        } else if (enemy.type === "linebreaker") {
          updateLinebreakerEnemy(enemy, dt, false);
        } else if (enemy.type === "secretBoss") {
          updateSecretBossEnemy(enemy, dt, false);
        }
      }
    }

    function updateEnemies(dt) {
      if (game.roomStartTimer > 0 || game.waveState !== "combat") {
        for (const enemy of enemies) {
          enemy.hitFlash = Math.max(0, (enemy.hitFlash || 0) - dt * 4.2);
          enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);
          if (enemy.type === "pulser" || enemy.type === "duopulser") enemy.rotation += dt * 0.75;
          if (enemy.type === "miniPulser") enemy.rotation += dt * 1.15;
          if (enemy.type === "shooter") updateShooterEnemy(enemy, dt, false);
          if (enemy.type === "drouber") updateDrouberEnemy(enemy, dt, false);
          if (enemy.type === "doupulser") updateDoupulserEnemy(enemy, dt, false);
          if (enemy.type === "doupulserFinal") updateDoupulserFinalEnemy(enemy, dt, false);
          if (enemy.type === "linebreaker") updateLinebreakerEnemy(enemy, dt, false);
          if (enemy.type === "secretBoss") updateSecretBossEnemy(enemy, dt, false);
        }

        updateEnemyDeathPulses(dt);
        return;
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.hitFlash = Math.max(0, (enemy.hitFlash || 0) - dt * 4.2);

        if (enemy.type === "kamikaze") {
          const target = getClosestOnlineEnemyTarget(enemy);
          if (!target) {
            enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);
            continue;
          }

          const dx = target.x - enemy.x;
          const dy = target.y - enemy.y;
          const dist = Math.hypot(dx, dy) || 1;

          enemy.rotation = Math.atan2(dy, dx);
          enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);
          enemy.x += (dx / dist) * enemy.speed * dt;
          enemy.y += (dy / dist) * enemy.speed * dt;

          const hitDist = getPlayerHitRadius() + getEnemyContactHitRadius(enemy);
          const nowDx = target.x - enemy.x;
          const nowDy = target.y - enemy.y;

          if (nowDx * nowDx + nowDy * nowDy < hitDist * hitDist) {
            if (target.isLocal && !isPlayerDamageInvulnerable()) {
              spawnEnemyDeathPulse(enemy.x, enemy.y);
              enemies.splice(i, 1);
              damagePlayer();
            } else if (!target.isLocal) {
              const remote = onlineRoom.players?.[target.id];
              if (!isRemoteOnlinePlayerDamageInvulnerable(remote) && sendOnlinePlayerDamage(target.id, 1, "kamikaze")) {
                spawnEnemyDeathPulse(enemy.x, enemy.y);
                enemies.splice(i, 1);
              }
            }
          }
        } else if (enemy.type === "pulser" || enemy.type === "miniPulser" || enemy.type === "duopulser") {
          if (enemy.type === "miniPulser") {
            enemy.rotation += dt * 1.15;
          } else {
            enemy.rotation += dt * 0.75;
          }

          enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);
          enemy.pulseTimer -= dt;

          if (enemy.pulseTimer <= 0) {
            if (enemy.type === "miniPulser") {
              spawnMiniPulserRing(enemy.x, enemy.y);
            } else if (enemy.type === "duopulser") {
              spawnDuopulserRing(enemy.x, enemy.y);
            } else {
              spawnPulserRing(enemy.x, enemy.y);
            }
            enemy.pulseTimer += enemy.pulseInterval;
          }
        } else if (enemy.type === "shooter") {
          updateShooterEnemy(enemy, dt, true);
        } else if (enemy.type === "drouber") {
          updateDrouberEnemy(enemy, dt, true);
        } else if (enemy.type === "doupulser") {
          updateDoupulserEnemy(enemy, dt, true);
        } else if (enemy.type === "doupulserFinal") {
          updateDoupulserFinalEnemy(enemy, dt, true);
        } else if (enemy.type === "linebreaker") {
          updateLinebreakerEnemy(enemy, dt, true);
        } else if (enemy.type === "secretBoss") {
          updateSecretBossEnemy(enemy, dt, true);
        }
      }

      updateEnemyDeathPulses(dt);
    }

    function updateShooterEnemy(enemy, dt, canAttack) {
      const r = room.getRect();
      const target = getClosestOnlineEnemyTarget(enemy);
      if (!target) {
        enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);
        return;
      }

      const dx = target.x - enemy.x;
      const dy = target.y - enemy.y;
      const dist = Math.hypot(dx, dy) || 1;
      const nx = dx / dist;
      const ny = dy / dist;

      // El tubo siempre mira al jugador más cercano.
      enemy.rotation = Math.atan2(dy, dx);
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      // Movimiento de distancia: no persigue como kamikaze, se reposiciona y strafea.
      enemy.strafeSwapTimer = Math.max(0, (enemy.strafeSwapTimer || 0) - dt);
      if (enemy.strafeSwapTimer <= 0) {
        enemy.strafeSwapTimer = 1.6 + Math.random() * 1.4;
        enemy.strafeDir *= -1;
      }

      let mx = 0;
      let my = 0;
      if (dist < enemy.minDistance) {
        mx -= nx * 1.20;
        my -= ny * 1.20;
      } else if (dist > enemy.maxDistance) {
        // Se acerca solo lo justo para mantener rango, no para chocar.
        mx += nx * 0.42;
        my += ny * 0.42;
      } else {
        mx += -ny * enemy.strafeDir;
        my += nx * enemy.strafeDir;
      }

      // Pequeña corrección para no quedarse pegado a paredes.
      const wallMargin = enemy.size * 0.72;
      if (enemy.x < r.x + wallMargin) mx += 1.4;
      if (enemy.x > r.x + r.w - wallMargin) mx -= 1.4;
      if (enemy.y < r.y + wallMargin) my += 1.4;
      if (enemy.y > r.y + r.h - wallMargin) my -= 1.4;

      const mLen = Math.hypot(mx, my) || 1;
      enemy.x += (mx / mLen) * enemy.speed * dt;
      enemy.y += (my / mLen) * enemy.speed * dt;
      enemy.x = clamp(enemy.x, r.x + wallMargin, r.x + r.w - wallMargin);
      enemy.y = clamp(enemy.y, r.y + wallMargin, r.y + r.h - wallMargin);

      if (!canAttack) return;
      enemy.shootTimer -= dt;
      if (enemy.shootTimer <= 0) {
        shootEnemyShotgun(enemy);
        enemy.shootTimer += enemy.shootInterval;
      }
    }

    function shootEnemyShotgun(enemy) {
      const target = getClosestOnlineEnemyTarget(enemy);
      if (!target) return;
      const baseAngle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
      const speed = 680; // Igual de rápidas que las balas del jugador.
      const spread = 0.18;
      const spawnDist = enemy.size * 0.62;

      for (let i = -1; i <= 1; i++) {
        const angle = baseAngle + i * spread;
        projectiles.push({
          enemyProjectile: true,
          x: enemy.x + Math.cos(angle) * spawnDist,
          y: enemy.y + Math.sin(angle) * spawnDist,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 10,
          hitboxSize: 5.4,
          damage: 1,
          rotation: angle,
          rotateTimer: 0,
          life: 1.8,
          color: game.ruby,
        });
      }

      spawnHitParticles(
        enemy.x + Math.cos(baseAngle) * spawnDist,
        enemy.y + Math.sin(baseAngle) * spawnDist,
        game.ruby,
        5
      );
    }

    function updateDrouberEnemy(enemy, dt, canDamage) {
      enemy.rotation += enemy.rotationSpeed * dt;
      enemy.innerRotation -= enemy.rotationSpeed * dt;
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      if (canDamage && !player.invincible && drouberRaysHitPlayer(enemy)) {
        damagePlayer();
      }
    }

    function updateSecretBossEnemy(enemy, dt, canAttack) {
      enemy.rotation += dt * 0.92;
      enemy.innerRotation -= dt * 1.35;
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      if (!canAttack) return;

      enemy.ringTimer -= dt;
      if (enemy.ringTimer <= 0) {
        spawnSecretBossRing(enemy.x, enemy.y, enemy.color || "#42ffca");
        enemy.ringTimer += enemy.ringInterval;
      }
    }

    function updateDoupulserEnemy(enemy, dt, canAttack) {
      enemy.rotation += dt * 0.72;
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      for (let i = enemy.events.length - 1; i >= 0; i--) {
        const event = enemy.events[i];
        event.time -= dt;

        if (event.time <= 0) {
          if (event.type === "secondPulse") spawnPulserRing(enemy.x, enemy.y, enemy.color);
          enemy.events.splice(i, 1);
        }
      }

      if (enemy.attackLockTimer > 0) {
        enemy.attackLockTimer = Math.max(0, enemy.attackLockTimer - dt);
      }

      if (!canAttack) return;

      const busy = enemy.attackLockTimer > 0 || enemy.events.length > 0 || bossHazards.some(h => h.type === "doupDroub" || h.type === "doupBlaster");
      if (busy) return;

      enemy.attackTimer -= dt;
      if (enemy.attackTimer <= 0) {
        runDoupulserAttack(enemy);
        enemy.attackTimer = enemy.attackCooldown;
      }
    }

    function runDoupulserAttack(enemy) {
      const attacks = ["doublePulse", "magneto", "droub", "blaster"].filter(a => a !== enemy.lastAttack);
      const attack = attacks[Math.floor(Math.random() * attacks.length)];
      enemy.lastAttack = attack;

      if (attack === "doublePulse") {
        spawnPulserRing(enemy.x, enemy.y, enemy.color);
        enemy.events.push({ type: "secondPulse", time: 2 });
        enemy.attackLockTimer = 8.0;
        return;
      }

      if (attack === "magneto") {
        spawnMagnetoRing(enemy.x, enemy.y, enemy.color);
        enemy.attackLockTimer = 6.2;
        return;
      }

      if (attack === "droub") {
        spawnDoupulserDroub(enemy.x, enemy.y, enemy.color);
        enemy.attackLockTimer = 6.35;
        return;
      }

      if (attack === "blaster") {
        spawnDoupulserBlaster(player.x, player.y, enemy.color);
        enemy.attackLockTimer = 5.25;
      }
    }

    function getBoss19AttackCenter(enemy) {
      const r = room.getRect();
      return {
        x: enemy.baseX || r.x + r.w / 2,
        y: enemy.baseY || r.y + r.h / 2,
      };
    }

    function getBoss19Color(enemy) {
      return enemy.hp <= 50 ? (enemy.darkColor || "#92002f") : (enemy.color || "#f0024e");
    }

    function updateDoupulserFinalEnemy(enemy, dt, canAttack) {
      const r = room.getRect();
      const center = getBoss19AttackCenter(enemy);
      enemy.baseX = center.x;
      enemy.baseY = center.y;
      enemy.moveTime += dt;
      enemy.x = enemy.baseX;
      enemy.y = enemy.baseY + Math.sin(enemy.moveTime * 1.15) * Math.min(120, r.h * 0.22);
      enemy.phase2 = enemy.hp <= 50;
      enemy.rotation += dt * 0.72;
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      for (let i = enemy.events.length - 1; i >= 0; i--) {
        const event = enemy.events[i];
        event.time -= dt;

        if (event.time <= 0) {
          if (event.type === "secondPulse") spawnBoss19Ring(center.x, center.y, getBoss19Color(enemy), 1.3, 1);
          if (event.type === "phasePulse") spawnBoss19Ring(event.x, event.y, getBoss19Color(enemy), event.speedMultiplier || 1.04, 1);
          enemy.events.splice(i, 1);
        }
      }

      if (enemy.attackLockTimer > 0) enemy.attackLockTimer = Math.max(0, enemy.attackLockTimer - dt);
      if (!canAttack) return;

      const busy = enemy.attackLockTimer > 0 || enemy.events.length > 0 || bossHazards.some(h => h.type === "doupDroub" || h.type === "doupBlaster");
      if (busy) return;

      const shieldSlow = enemy.shieldHp > 0 ? 1.2 : 1;
      enemy.attackTimer -= dt;
      if (enemy.attackTimer <= 0) {
        if (enemy.phase2) runDoupulserFinalPhase2Attack(enemy, shieldSlow);
        else runDoupulserFinalPhase1Attack(enemy);
        enemy.attackTimer = enemy.attackCooldown * shieldSlow;
      }
    }

    function runDoupulserFinalPhase1Attack(enemy) {
      const attacks = ["doublePulse", "magneto", "droub", "blaster"].filter(a => a !== enemy.lastAttack);
      const attack = attacks[Math.floor(Math.random() * attacks.length)];
      const center = getBoss19AttackCenter(enemy);
      const color = getBoss19Color(enemy);
      enemy.lastAttack = attack;

      if (attack === "doublePulse") {
        spawnBoss19Ring(center.x, center.y, color, 1.3, 1);
        enemy.events.push({ type: "secondPulse", time: 2 / 1.3 });
        enemy.attackLockTimer = 8.0 / 1.3;
        return;
      }

      if (attack === "magneto") {
        spawnBoss19MagnetoRing(center.x, center.y, color, 1.3);
        enemy.attackLockTimer = 6.2 / 1.3;
        return;
      }

      if (attack === "droub") {
        spawnBoss19Droub(center.x, center.y, color, 1.3);
        enemy.attackLockTimer = 6.35 / 1.3;
        return;
      }

      if (attack === "blaster") {
        spawnBoss19Blaster(player.x, player.y, color, 1.3);
        enemy.attackLockTimer = 5.25 / 1.3;
      }
    }

    function runDoupulserFinalPhase2Attack(enemy, shieldSlow = 1) {
      const attacks = ["randomPulses", "shield", "summon"].filter(a => a !== enemy.lastAttack);
      const attack = attacks[Math.floor(Math.random() * attacks.length)];
      const color = getBoss19Color(enemy);
      enemy.lastAttack = attack;

      if (attack === "randomPulses") {
        const centers = getSafeRandomPulseCenters(4);
        centers.forEach((p, index) => {
          enemy.events.push({
            type: "phasePulse",
            time: index * 0.48 * shieldSlow,
            x: p.x,
            y: p.y,
            // Nerf fase 2: pulses random 50% más lentas.
            speedMultiplier: 0.52,
          });
        });
        enemy.attackLockTimer = 5.2 * shieldSlow;
        return;
      }

      if (attack === "shield") {
        enemy.shieldHp = enemy.shieldMaxHp;
        enemy.attackLockTimer = 2.6 * shieldSlow;
        return;
      }

      if (attack === "summon") {
        const r = room.getRect();
        const spots = [
          { x: r.x + r.w * 0.18, y: r.y + r.h * 0.18 },
          { x: r.x + r.w * 0.82, y: r.y + r.h * 0.18 },
          { x: r.x + r.w * 0.50, y: r.y + r.h * 0.82 },
        ];
        for (const p of spots) spawnKamikaze(p.x, p.y);
        enemy.attackLockTimer = 3.25 * shieldSlow;
      }
    }


    function getLinebreakerColor(enemy) {
      return enemy.phase2 ? (enemy.darkColor || "#92002f") : (enemy.color || "#f0024e");
    }

    function getLinebreakerHazardCount() {
      let count = 0;
      for (const hazard of bossHazards) {
        if (hazard.type === "linebreakerLaser") count++;
      }
      return count;
    }

    function capLinebreakerHazards(maxCount = 14) {
      let count = 0;
      for (let i = bossHazards.length - 1; i >= 0; i--) {
        const hazard = bossHazards[i];
        if (hazard.type !== "linebreakerLaser") continue;
        count++;
        if (count > maxCount) bossHazards.splice(i, 1);
      }
    }

    function sanitizeLinebreakerShield(enemy) {
      if (!enemy || enemy.type !== "linebreaker") return;
      enemy.shieldMaxHp = Number.isFinite(enemy.shieldMaxHp) && enemy.shieldMaxHp > 0 ? enemy.shieldMaxHp : 20;
      enemy.shieldHp = Number.isFinite(enemy.shieldHp) ? clamp(enemy.shieldHp, 0, enemy.shieldMaxHp) : 0;
      enemy.shieldInterval = Number.isFinite(enemy.shieldInterval) && enemy.shieldInterval > 0 ? enemy.shieldInterval : 20;
      enemy.shieldTimer = Number.isFinite(enemy.shieldTimer) ? Math.max(0, enemy.shieldTimer) : enemy.shieldInterval;
    }

    function damageEnemyShield(enemy, amount) {
      if (!enemy || !Number.isFinite(amount) || amount <= 0) return false;
      if ((enemy.type !== "doupulserFinal" && enemy.type !== "linebreaker") || !(enemy.shieldHp > 0)) return false;
      enemy.shieldMaxHp = Number.isFinite(enemy.shieldMaxHp) && enemy.shieldMaxHp > 0 ? enemy.shieldMaxHp : 20;
      enemy.shieldHp = clamp((Number.isFinite(enemy.shieldHp) ? enemy.shieldHp : 0) - amount, 0, enemy.shieldMaxHp);
      return true;
    }

    function updateLinebreakerEnemy(enemy, dt, canAttack) {
      sanitizeLinebreakerShield(enemy);
      const r = room.getRect();
      enemy.moveTime += dt;
      enemy.phase2 = enemy.hp <= enemy.maxHp * 0.5;
      enemy.rotation += dt * (enemy.phase2 ? 1.15 : 0.92);
      enemy.innerRotation -= dt * (enemy.phase2 ? 1.65 : 1.28);
      enemy.hpVisual += (enemy.hp - enemy.hpVisual) * Math.min(1, dt * 14);

      enemy.shieldTimer = Math.max(0, (enemy.shieldTimer ?? enemy.shieldInterval ?? 20) - dt);
      if (canAttack && enemy.shieldTimer <= 0) {
        enemy.shieldHp = enemy.shieldMaxHp || 20;
        enemy.shieldTimer = enemy.shieldInterval || 20;
        spawnHitParticles(enemy.x, enemy.y, "#42dfff", 12);
      }

      // Se mueve poco: es un jefe de control de arena, no de persecución.
      enemy.x = enemy.baseX + Math.sin(enemy.moveTime * 1.12) * Math.min(64, r.w * 0.075);
      enemy.y = enemy.baseY + Math.cos(enemy.moveTime * 0.96) * Math.min(52, r.h * 0.065);

      if (enemy.attackLockTimer > 0) enemy.attackLockTimer = Math.max(0, enemy.attackLockTimer - dt);
      if (!canAttack) return;
      if (enemy.attackLockTimer > 0) return;
      enemy.attackTimer -= dt;
      if (enemy.attackTimer <= 0) {
        runLinebreakerAttack(enemy);
        enemy.attackTimer = enemy.attackCooldown * (enemy.phase2 ? 0.72 : 0.92);
      }
    }

    function runLinebreakerAttack(enemy) {
      const phase2 = !!enemy.phase2;
      const target = getClosestOnlineEnemyTarget(enemy);
      if (!target) {
        enemy.attackLockTimer = 0.35;
        return;
      }

      // Evita acumulaciones raras de lasers si el juego cae de FPS o entra en focus/blur.
      if (getLinebreakerHazardCount() >= 12) {
        enemy.attackLockTimer = 0.28;
        return;
      }
      const attacks = (phase2
        ? ["doubleCut", "cross", "sweep", "aimedCombo"]
        : ["horizontal", "vertical", "cross", "sweep"]
      ).filter(a => a !== enemy.lastAttack);
      const attack = attacks[Math.floor(Math.random() * attacks.length)];
      enemy.lastAttack = attack;

      if (attack === "horizontal") {
        spawnLinebreakerCut("h", target.y, { warningTime: 0.62, activeTime: 0.24, width: 61 });
        enemy.attackLockTimer = 0.82;
        return;
      }

      if (attack === "vertical") {
        spawnLinebreakerCut("v", target.x, { warningTime: 0.62, activeTime: 0.24, width: 61 });
        enemy.attackLockTimer = 0.82;
        return;
      }

      if (attack === "cross") {
        spawnLinebreakerCut("h", target.y, { warningTime: phase2 ? 0.52 : 0.64, activeTime: 0.24, width: phase2 ? 67 : 61 });
        spawnLinebreakerCut("v", target.x, { warningTime: phase2 ? 0.52 : 0.64, activeTime: 0.24, width: phase2 ? 67 : 61 });
        enemy.attackLockTimer = phase2 ? 0.95 : 1.05;
        return;
      }

      if (attack === "doubleCut") {
        const r = room.getRect();
        const gap = Math.max(70, Math.min(r.w, r.h) * 0.14);
        const horizontalFirst = Math.random() < 0.5;
        if (horizontalFirst) {
          spawnLinebreakerCut("h", clamp(target.y - gap, r.y + 45, r.y + r.h - 45), { warningTime: 0.50, activeTime: 0.22, width: 62 });
          spawnLinebreakerCut("h", clamp(target.y + gap, r.y + 45, r.y + r.h - 45), { warningTime: 0.58, activeTime: 0.22, width: 62 });
        } else {
          spawnLinebreakerCut("v", clamp(target.x - gap, r.x + 45, r.x + r.w - 45), { warningTime: 0.50, activeTime: 0.22, width: 62 });
          spawnLinebreakerCut("v", clamp(target.x + gap, r.x + 45, r.x + r.w - 45), { warningTime: 0.58, activeTime: 0.22, width: 62 });
        }
        enemy.attackLockTimer = 0.98;
        return;
      }

      if (attack === "aimedCombo") {
        spawnLinebreakerCut("h", target.y, { warningTime: 0.50, activeTime: 0.22, width: 64 });
        spawnLinebreakerCut("v", target.x, { warningTime: 0.70, activeTime: 0.22, width: 64 });
        enemy.attackLockTimer = 1.05;
        return;
      }

      if (attack === "sweep") {
        spawnLinebreakerSweep(Math.random() < 0.5 ? "h" : "v", phase2);
        enemy.attackLockTimer = phase2 ? 1.85 : 2.05;
      }
    }

    function spawnLinebreakerCut(axis, pos, opts = {}) {
      const r = room.getRect();
      const margin = 28;
      const isH = axis === "h";
      const min = isH ? r.y + margin : r.x + margin;
      const max = isH ? r.y + r.h - margin : r.x + r.w - margin;
      const safePos = clamp(pos, min, max);
      const hazard = {
        type: "linebreakerLaser",
        axis,
        pos: safePos,
        fromPos: null,
        toPos: null,
        color: opts.color || "#f0024e",
        width: opts.width || 76,
        warningTime: opts.warningTime || 0.7,
        activeTime: opts.activeTime || 0.3,
        fadeTime: opts.fadeTime || 0.18,
        timer: 0,
        phase: "warning",
        hitTimer: 0,
        remoteHitTimer: 0,
      };
      bossHazards.push(hazard);
      capLinebreakerHazards(14);
      const normPos = isH
        ? (r.h > 0 ? (safePos - r.y) / r.h : 0.5)
        : (r.w > 0 ? (safePos - r.x) / r.w : 0.5);
      sendOnlineEnemyAttackEvent({
        attack: `linebreaker_laser_cut_${axis}`,
        lineKind: "cut",
        axis,
        x: isH ? 0.5 : normPos,
        y: isH ? normPos : 0.5,
        normPos,
        color: opts.color || "#f0024e",
        width: opts.width || 76,
        warningTime: opts.warningTime || 0.7,
        activeTime: opts.activeTime || 0.3,
        fadeTime: opts.fadeTime || 0.18,
      });
      return hazard;
    }

    function spawnLinebreakerSweep(axis, phase2 = false, forcedReverse = null) {
      const screenPad = 120;
      const isH = axis === "h";
      // La línea barre desde fuera de la pantalla hasta fuera de la pantalla.
      const start = isH ? -screenPad : -screenPad;
      const end = isH ? canvas.height + screenPad : canvas.width + screenPad;
      const reverse = forcedReverse === null ? Math.random() < 0.5 : !!forcedReverse;
      const hazard = {
        type: "linebreakerLaser",
        axis,
        pos: reverse ? end : start,
        fromPos: reverse ? end : start,
        toPos: reverse ? start : end,
        isSweep: true,
        color: phase2 ? "#92002f" : "#f0024e",
        width: phase2 ? 69 : 61,
        warningTime: phase2 ? 0.70 : 0.82,
        activeTime: phase2 ? 1.73 : 2.10,
        fadeTime: 0.20,
        timer: 0,
        phase: "warning",
        hitTimer: 0,
        remoteHitTimer: 0,
      };
      bossHazards.push(hazard);
      capLinebreakerHazards(14);
      sendOnlineEnemyAttackEvent({
        attack: `linebreaker_laser_sweep_${axis}_${reverse ? "r" : "f"}_${phase2 ? "p2" : "p1"}`,
        lineKind: "sweep",
        axis,
        x: axis === "h" ? 0.5 : (reverse ? 1 : 0),
        y: axis === "h" ? (reverse ? 1 : 0) : 0.5,
        phase2: !!phase2,
        reverse,
      });
      return hazard;
    }

    function getLinebreakerHazardPos(hazard) {
      if (hazard.fromPos == null || hazard.toPos == null || hazard.phase !== "active") return hazard.pos;
      const t = clamp(hazard.timer / Math.max(0.001, hazard.activeTime), 0, 1);
      return lerp(hazard.fromPos, hazard.toPos, t);
    }

    function linebreakerLaserHitsPoint(hazard, x, y, hitRadius = getPlayerHitRadius()) {
      const pos = getLinebreakerHazardPos(hazard);
      const screenPad = 120;
      const ax = hazard.axis === "h" ? -screenPad : pos;
      const ay = hazard.axis === "h" ? pos : -screenPad;
      const bx = hazard.axis === "h" ? canvas.width + screenPad : pos;
      const by = hazard.axis === "h" ? pos : canvas.height + screenPad;
      const dist = distancePointToSegment(x, y, ax, ay, bx, by);
      return dist <= hitRadius + getDangerLineHitWidth(hazard.width) / 2;
    }

    function linebreakerLaserHitsPlayer(hazard) {
      return linebreakerLaserHitsPoint(hazard, player.x, player.y);
    }

    function getSafeRandomPulseCenters(count) {
      const r = room.getRect();
      const result = [];
      const margin = 110;
      let attempts = 0;

      while (result.length < count && attempts < 160) {
        attempts++;
        const point = {
          x: r.x + margin + Math.random() * Math.max(1, r.w - margin * 2),
          y: r.y + margin + Math.random() * Math.max(1, r.h - margin * 2),
        };

        const playerDist = Math.hypot(point.x - player.x, point.y - player.y);
        const tooNearPlayer = playerDist < 190;
        const tooNearOther = result.some(other => Math.hypot(point.x - other.x, point.y - other.y) < 170);

        if (!tooNearPlayer && !tooNearOther) result.push(point);
      }

      while (result.length < count) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 210 + Math.random() * 120;
        result.push({
          x: Math.max(r.x + margin, Math.min(r.x + r.w - margin, player.x + Math.cos(angle) * dist)),
          y: Math.max(r.y + margin, Math.min(r.y + r.h - margin, player.y + Math.sin(angle) * dist)),
        });
      }

      return result;
    }

    function spawnBoss19Ring(x, y, color = "#f0024e", speedMultiplier = 1.3, damage = 1) {
      const r = room.getRect();
      const maxRadius = Math.hypot(r.w, r.h);
      const speed = player.speed * 0.7 * speedMultiplier;

      pulserRings.push({
        x,
        y,
        radius: 8,
        speed,
        thickness: 24,
        maxRadius,
        minRadius: 8,
        color,
        hitPlayer: false,
        damagePlayerAmount: damage,
        life: maxRadius / speed,
      });
      const pos = normalizeRoomPoint(x, y);
      sendOnlineEnemyAttackEvent({
        attack: "pulser_ring",
        ringKind: "boss19",
        bossKind: "boss19",
        x: pos.x,
        y: pos.y,
        color,
        speedMultiplier,
        damagePlayerAmount: damage,
      });
    }

    function getDrouberVertices(enemy, rotation = enemy.rotation) {
      const radius = enemy.size / 2;
      const vertices = [];

      for (let i = 0; i < 4; i++) {
        const angle = rotation - Math.PI / 2 + i * Math.PI / 2;
        vertices.push({
          x: enemy.x + Math.cos(angle) * radius,
          y: enemy.y + Math.sin(angle) * radius,
          angle,
        });
      }

      return vertices;
    }

    function distancePointToSegment(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const abLenSq = abx * abx + aby * aby || 1;
      const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / abLenSq));
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function drouberRaysHitPlayer(enemy) {
      const vertices = getDrouberVertices(enemy);
      const rayHalfWidth = getDangerRayHitHalfWidth(enemy.rayWidth);

      for (const vertex of vertices) {
        const endX = vertex.x + Math.cos(vertex.angle) * enemy.rayLength;
        const endY = vertex.y + Math.sin(vertex.angle) * enemy.rayLength;
        const dist = distancePointToSegment(player.x, player.y, vertex.x, vertex.y, endX, endY);

        if (dist <= getPlayerHitRadius() + rayHalfWidth) {
          return true;
        }
      }

      return false;
    }

    function updatePulserRings(dt) {
      for (let i = pulserRings.length - 1; i >= 0; i--) {
        const ring = pulserRings[i];
        ring.radius += ring.speed * dt;
        ring.life -= dt;

        if (ring.damageEnemies) {
          for (let j = enemies.length - 1; j >= 0; j--) {
            const enemy = enemies[j];
            if (ring.hitEnemies && ring.hitEnemies.has(enemy)) continue;

            const dx = enemy.x - ring.x;
            const dy = enemy.y - ring.y;
            const dist = Math.hypot(dx, dy);
            const band = ring.thickness / 2 + enemy.size / 2;

            if (Math.abs(dist - ring.radius) <= band) {
              if (ring.hitEnemies) ring.hitEnemies.add(enemy);

              const ringDamage = applyPlayerDamageModifiers(ring.damageEnemies);
              if (damageEnemyShield(enemy, ringDamage)) {
                spawnHitParticles(enemy.x, enemy.y, "#42dfff", 7);
                continue;
              }

              if (hasRogueUpgrade("pulsoMagnetico")) {
                const pushLen = Math.hypot(dx, dy) || 1;
                enemy.x += (dx / pushLen) * 34;
                enemy.y += (dy / pushLen) * 34;
                keepEnemyInsideRoom(enemy);
              }

              enemy.hitFlash = 1;
              spawnHitParticles(enemy.x, enemy.y, ring.color || "#42dfff", 7);
              enemy.hp -= ringDamage;

              if (enemy.hp <= 0) {
                addEnemyKillPoints(enemy);
                spawnEnemyDeathPulse(enemy.x, enemy.y, ring.color || "#42dfff");
                enemies.splice(j, 1);
              }
            }
          }
        } else if (!ring.hitPlayer && !isPlayerDamageInvulnerable()) {
          const dx = player.x - ring.x;
          const dy = player.y - ring.y;
          const dist = Math.hypot(dx, dy);
          const band = getRingHitHalfThickness(ring) + getPlayerHitRadius();

          if (Math.abs(dist - ring.radius) <= band) {
            if (player.dashTimer > 0 || player.wasDashing) {
              ring.hitPlayer = true;
            } else {
              ring.hitPlayer = true;
              damagePlayer(ring.damagePlayerAmount || 1);
            }
          }
        }

        if (ring.life <= 0 || ring.radius > ring.maxRadius || ring.radius < ring.minRadius) {
          pulserRings.splice(i, 1);
        }
      }
    }

    function updateBossHazards(dt) {
      for (let i = bossHazards.length - 1; i >= 0; i--) {
        const hazard = bossHazards[i];
        if (!hazard || !Number.isFinite(hazard.timer ?? 0)) {
          bossHazards.splice(i, 1);
          continue;
        }

        if (hazard.type === "linebreakerLaser") {
          if (!Number.isFinite(hazard.pos) || !Number.isFinite(hazard.width) || hazard.width <= 0 ||
              !Number.isFinite(hazard.warningTime) || !Number.isFinite(hazard.activeTime) || !Number.isFinite(hazard.fadeTime)) {
            bossHazards.splice(i, 1);
            continue;
          }
          if (hazard.fromPos != null && !Number.isFinite(hazard.fromPos)) hazard.fromPos = null;
          if (hazard.toPos != null && !Number.isFinite(hazard.toPos)) hazard.toPos = null;
          hazard.timer += dt;
          hazard.hitTimer = Math.max(0, (hazard.hitTimer || 0) - dt);
          hazard.remoteHitTimer = Math.max(0, (hazard.remoteHitTimer || 0) - dt);

          if (hazard.phase === "warning" && hazard.timer >= hazard.warningTime) {
            hazard.phase = "active";
            hazard.timer = 0;
            hazard.hitTimer = 0;
            hazard.remoteHitTimer = 0;
          } else if (hazard.phase === "active") {
            if (hazard.hitTimer <= 0 && !player.downed && !isPlayerDamageInvulnerable() && linebreakerLaserHitsPlayer(hazard)) {
              hazard.hitTimer = 0.55;
              damagePlayer();
            }
            if (isOnlineHost() && hazard.remoteHitTimer <= 0) {
              for (const remotePos of getRemoteOnlinePlayerWorldPositionsForHost()) {
                const remote = onlineRoom.players?.[remotePos.id];
                if (remote && remote.connected && !isRemoteOnlinePlayerDamageInvulnerable(remote) &&
                    linebreakerLaserHitsPoint(hazard, remotePos.x, remotePos.y) &&
                    sendOnlinePlayerDamage(remotePos.id, 1, "linebreaker_laser")) {
                  hazard.remoteHitTimer = 0.55;
                  break;
                }
              }
            }
            if (hazard.timer >= hazard.activeTime) {
              hazard.phase = "fade";
              hazard.timer = 0;
            }
          } else if (hazard.phase === "fade" && hazard.timer >= hazard.fadeTime) {
            bossHazards.splice(i, 1);
          }
          continue;
        }

        if (hazard.type === "doupDroub") {
          hazard.rotation += hazard.rotationSpeed * dt;
          hazard.hitTimer = Math.max(0, hazard.hitTimer - dt);

          if (hazard.warningTimer > 0) {
            hazard.warningTimer -= dt;

            if (hazard.warningTimer <= 0) {
              hazard.warningTimer = 0;
              hazard.active = true;
            }

            continue;
          }

          hazard.active = true;
          hazard.life -= dt;

          if (hazard.hitTimer <= 0 && !isPlayerDamageInvulnerable() && doupDroubHitsPlayer(hazard)) {
            hazard.hitTimer = 0.75;
            damagePlayer();
          }

          if (hazard.life <= 0) bossHazards.splice(i, 1);
          continue;
        }

        if (hazard.type === "doupBlaster") {
          hazard.timer += dt;

          if (hazard.phase === "warning" && hazard.timer >= hazard.warningTime) {
            hazard.phase = "active";
            hazard.timer = 0;
            hazard.exploded = true;
            hazard.damaged = false;

            const dx = player.x - hazard.x;
            const dy = player.y - hazard.y;
            const hitDist = getPlayerHitRadius() + hazard.radius;

            if (!isPlayerDamageInvulnerable() && dx * dx + dy * dy <= hitDist * hitDist) {
              hazard.damaged = true;
              damagePlayer(2);
            }
          } else if (hazard.phase === "active" && hazard.timer >= hazard.activeTime) {
            hazard.phase = "fade";
            hazard.timer = 0;
          } else if (hazard.phase === "fade" && hazard.timer >= hazard.fadeTime) {
            hazard.repeat++;

            if (hazard.repeat >= hazard.maxRepeats) {
              bossHazards.splice(i, 1);
            } else {
              hazard.x = player.x;
              hazard.y = player.y;
              hazard.phase = "warning";
              hazard.timer = 0;
              hazard.exploded = false;
              hazard.damaged = false;
            }
          }
        }
      }
    }

    function doupDroubHitsPlayer(hazard) {
      const rayHalfWidth = getDangerRayHitHalfWidth(hazard.rayWidth);

      for (let i = 0; i < hazard.rays; i++) {
        const angle = hazard.rotation - Math.PI / 2 + i * Math.PI * 2 / hazard.rays;
        const startX = hazard.x;
        const startY = hazard.y;
        const endX = startX + Math.cos(angle) * hazard.rayLength;
        const endY = startY + Math.sin(angle) * hazard.rayLength;
        const dist = distancePointToSegment(player.x, player.y, startX, startY, endX, endY);

        if (dist <= getPlayerHitRadius() + rayHalfWidth) return true;
      }

      return false;
    }

    function findPreciseProjectileTarget(p) {
      if (p.preciseTargetId) {
        const locked = enemies.find(enemy => isPreciseAimTargetValid(enemy) && getPreciseAimTargetId(enemy) === p.preciseTargetId);
        if (locked) return locked;
        p.preciseTargetId = "";
      }

      let best = null;
      let bestScore = Infinity;
      const speed = Math.hypot(p.vx, p.vy) || 1;
      const nx = p.vx / speed;
      const ny = p.vy / speed;

      for (const enemy of enemies) {
        const ex = enemy.x - p.x;
        const ey = enemy.y - p.y;
        const forward = ex * nx + ey * ny;
        if (forward < -12) continue;
        if (forward > 420) continue;

        const perpendicular = Math.abs(ex * ny - ey * nx);
        const allowedMiss = p.lockDistance + enemy.size * 0.85;
        if (perpendicular > allowedMiss) continue;

        const score = perpendicular + forward * 0.12;
        if (score < bestScore) {
          bestScore = score;
          best = enemy;
        }
      }

      if (best) p.preciseTargetId = getPreciseAimTargetId(best);
      return best;
    }

    function updatePreciseProjectileHoming(p, dt) {
      if (!p.precise) return;
      const target = findPreciseProjectileTarget(p);
      if (!target) return;

      const point = getPreciseAimPointForEnemy(target);
      const angle = Math.atan2(point.y - p.y, point.x - p.x);
      const speed = p.speed || Math.hypot(p.vx, p.vy) || 680;
      const targetVx = Math.cos(angle) * speed;
      const targetVy = Math.sin(angle) * speed;
      const t = Math.min(1, dt * (p.homingStrength || 8));

      p.vx += (targetVx - p.vx) * t;
      p.vy += (targetVy - p.vy) * t;
    }
